<style>
  html { scroll-behavior: smooth; } body { background:#F4F7F5; }
  ::selection { background:#CFEAE0; }
  .view-enter { animation: viewIn .25s cubic-bezier(.22,.61,.36,1); }
  @keyframes viewIn { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }

  .field{font-family:'JetBrains Mono',monospace;font-size:.9em;color:#075444;background:#EAF6F1;border:none;border-bottom:1.5px dashed #66BCA1;padding:1px 6px;border-radius:4px 4px 0 0;min-width:90px;transition:background .15s,border-color .15s,box-shadow .15s;outline:none;}
  .field:hover{background:#DCF0E7;}
  .field:focus{background:#fff;border-bottom-color:#0B7A5F;box-shadow:0 2px 0 0 #0B7A5F,0 0 0 3px rgba(11,122,95,.12);}
  .field.field-date{min-width:140px;} .field.field-num{text-align:right;min-width:130px;}
  .field:disabled{color:#0A3B32;background:transparent;border-bottom:1.5px solid #CFEAE0;-webkit-text-fill-color:#0A3B32;opacity:1;cursor:default;font-weight:600;}

  .scroll-thin::-webkit-scrollbar{width:8px;height:8px;}
  .scroll-thin::-webkit-scrollbar-thumb{background:#CFEAE0;border-radius:8px;}
  .scroll-thin::-webkit-scrollbar-track{background:transparent;}

  .live-dot{position:relative;}
  .live-dot::after{content:'';position:absolute;inset:-4px;border-radius:9999px;background:currentColor;opacity:.4;animation:ping 1.8s cubic-bezier(0,0,.2,1) infinite;}
  @keyframes ping{75%,100%{transform:scale(2.2);opacity:0;}}

  .seal-in{animation:sealIn .5s cubic-bezier(.34,1.56,.64,1);}
  @keyframes sealIn{from{opacity:0;transform:scale(.9) rotate(-3deg);}to{opacity:1;transform:none;}}
  .toast-in{animation:toastIn .3s cubic-bezier(.22,.61,.36,1);}
  @keyframes toastIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}

  .nav-item.active{background:rgba(255,255,255,.08);color:#fff;}
  .nav-item.active .nav-rail{opacity:1;}

  /* AI panel slide-over */
  #ai-panel{transform:translateX(105%);transition:transform .3s cubic-bezier(.22,.61,.36,1);}
  #ai-panel.open{transform:none;}
  #ai-scrim{opacity:0;pointer-events:none;transition:opacity .25s;}
  #ai-scrim.open{opacity:1;pointer-events:auto;}
  .ai-msg{animation:viewIn .25s cubic-bezier(.22,.61,.36,1);}
  .typing span{display:inline-block;width:5px;height:5px;border-radius:9999px;background:#66BCA1;margin-right:3px;animation:blink 1.2s infinite;}
  .typing span:nth-child(2){animation-delay:.2s;} .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.25;transform:translateY(0);}40%{opacity:1;transform:translateY(-2px);}}

  .anchor-flash{animation:anchorFlash 1.8s ease;border-radius:8px;}
  @keyframes anchorFlash{0%{background:#FBF2DC;box-shadow:0 0 0 4px rgba(199,154,62,.30);}100%{background:transparent;box-shadow:0 0 0 4px transparent;}}
  .scan-pulse{animation:scanPulse 1s ease infinite;}
  @keyframes scanPulse{0%,100%{opacity:.45;}50%{opacity:1;}}

  .mlink{stroke:#C9D8D0;stroke-width:1.4;fill:none;opacity:.6;transition:stroke .15s,opacity .15s,stroke-width .15s;}
  .mlink.hi{stroke:#0B7A5F;opacity:1;stroke-width:2.2;}
  .mlink.dim{opacity:.08;}
  .mlabel{fill:#5c7a6e;font-size:9.5px;font-family:'JetBrains Mono',monospace;pointer-events:none;opacity:0;transition:opacity .15s;}
  .mlabel.show{opacity:1;}
  .mnode{cursor:pointer;}
  .mnode .chipbg{fill:#fff;stroke:#CFEAE0;stroke-width:1.4;transition:stroke .15s;}
  .mnode.hi .chipbg{stroke:#0B7A5F;stroke-width:2;}
  .mnode.sel .chipbg{stroke:#C79A3E;stroke-width:2.4;}
  .mnode.dim{opacity:.18;transition:opacity .15s;}
  #map-svg{cursor:grab;}
  #map-svg.panning{cursor:grabbing;}

  .qdot{cursor:pointer;transition:r .15s;}
  .qdot:hover{stroke:#08211E;stroke-width:2;}
  #party-scrim{opacity:0;pointer-events:none;transition:opacity .25s;}
  #party-scrim.open{opacity:1;pointer-events:auto;}

  .modal-in{animation:viewIn .2s cubic-bezier(.22,.61,.36,1);}

  /* PDF export — print only the prepared document */
  #print-root{display:none;}
  @media print{
    body>*{display:none!important;}
    #print-root{display:block!important;}
    body{background:#fff;}
  }

  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important;}}
</style>

        <span class="nav-rail absolute left-0 top-1.5 bottom-1.5 w-[3px] rounded-full bg-gold-500 opacity-0 transition"></span>
        <span data-ic="users"></span> Team &amp; Settings

      <div class="pt-5 pb-2 px-3 text-[10px] font-semibold uppercase tracking-[0.16em] text-brand-300/70">Folders</div>
      <div id="side-folders" class="space-y-0.5"></div>

      <div class="pt-5 pb-2 px-3 text-[10px] font-semibold uppercase tracking-[0.16em] text-brand-300/70">Quick create</div>
      <div id="side-templates" class="space-y-0.5"></div>
    </nav>

    <div class="px-3 pb-3">
      <button id="ai-open-side" class="w-full flex items-center gap-2.5 rounded-xl bg-gradient-to-r from-gold-500 to-gold-400 text-brand-900 px-3.5 py-3 text-sm font-semibold hover:brightness-105 transition shadow-lg shadow-black/20">
        <span data-ic="sparkle"></span> Ask Mkataba AI
      </button>
    </div>

    <div class="px-4 py-4 border-t border-white/10" id="side-user"></div>
  </aside>

  <!-- ================= MAIN ================= -->
  <main class="flex-1 ml-[248px] min-w-0">
    <div id="content"></div>
  </main>
</div>

<!-- ================= AI ASSISTANT (slide-over) ================= -->
<div id="ai-scrim" class="fixed inset-0 bg-brand-900/30 backdrop-blur-[2px] z-40"></div>
<section id="ai-panel" class="fixed top-0 right-0 bottom-0 w-full max-w-[420px] bg-white z-50 flex flex-col border-l border-brand-100 shadow-2xl shadow-brand-900/20">
  <header class="px-5 py-4 border-b border-brand-100/70 flex items-center gap-3 bg-brand-900 text-white">
    <div class="h-9 w-9 rounded-xl bg-gold-500 text-brand-900 grid place-items-center shrink-0" data-ic-big="sparkle"></div>
    <div class="flex-1 leading-tight">
      <div class="font-display font-600">Mkataba AI</div>
      <div class="text-[11px] text-brand-200 flex items-center gap-1.5"><span class="h-1.5 w-1.5 rounded-full bg-brand-300 live-dot"></span>Searching your live contract data</div>
    </div>
    <button id="ai-close" class="h-8 w-8 grid place-items-center rounded-lg hover:bg-white/10 transition text-brand-100" data-ic-big="x"></button>
  </header>

  <div id="ai-feed" class="flex-1 overflow-y-auto scroll-thin px-5 py-4 space-y-4"></div>

  <div id="ai-suggest" class="px-5 pb-2 flex flex-wrap gap-1.5"></div>

  <footer class="px-5 pb-5 pt-2 border-t border-brand-100/70">
    <div class="flex items-center gap-2">
      <input id="ai-input" type="text" placeholder="Search, summarize, or ask about your contracts…" class="flex-1 rounded-xl border border-brand-100 bg-canvas px-3.5 py-2.5 text-sm outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-100 transition"/>
      <button id="ai-send" class="h-10 w-10 shrink-0 grid place-items-center rounded-xl bg-brand-900 text-white hover:bg-brand-800 transition" data-ic-big="send"></button>
    </div>
  </footer>
</section>

<div id="modal-root"></div>
<div id="toast-root" class="fixed bottom-6 right-6 z-[60] space-y-2"></div>

/* ============================================================ STATE */

let PORTAL_MODE = false;                     // true when rendering the counterparty share portal

/* Folders follow the FMCG value stream, from raw materials to market. */
const FOLDERS = {
  proc:  { id:'proc',  name:'Procurement & Raw Materials', ic:'leaf',      desc:'Ingredient, commodity and packaging supply into the plants.' },

async function sha256(str){
  try{ const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
    return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(e){ let h=0; for(let i=0;i<str.length;i++){h=(h*31+str.charCodeAt(i))>>>0;} return h.toString(16).padStart(8,'0').repeat(8).slice(0,64); }
}
const generatePseudo = seed => { let h=0; for(const ch of seed) h=(h*33+ch.charCodeAt(0))>>>0; return h.toString(16).padStart(60,'0').slice(0,60); };

async function api(path, method='GET', body){
  const res=await fetch('api/'+path,{ method,
    headers:body?{'Content-Type':'application/json'}:undefined,
    body:body?JSON.stringify(body):undefined, credentials:'same-origin' });
  let data=null; try{ data=await res.json(); }catch(e){}
  if(!res.ok) throw new Error(data?.error||('Request failed ('+res.status+')'));
  return data;
}
async function loadBootstrap(){
  const b=await api('bootstrap');
  REMOTE={ org:b.org, me:b.me, users:b.users };
  if(b.data && Array.isArray(b.data.contracts)){
    uid=b.data.uid||uid;
    state.contracts=b.data.contracts.map(migrateContract);
  } else state.contracts=[];
  // screen position is per-device, not shared with teammates
  const ui=lsGet(LS.ui)||{};
  state.view=ui.view||'dashboard';
  state.activeId=(ui.activeId&&state.contracts.some(c=>c.id===ui.activeId))?ui.activeId:null;
  state.folderId=ui.folderId||null;
  if(state.view==='workspace'&&!state.activeId) state.view='dashboard';
}

function persist(){
  if(API_MODE()){
    lsSet(LS.ui,{ view:state.view, activeId:state.activeId, folderId:state.folderId });
    if(!canEdit()) return; // server rejects viewer writes
    const snapshot={ uid, contracts:state.contracts };
    clearTimeout(syncTimer);
    syncTimer=setTimeout(()=>api('data','PUT',snapshot).catch(e=>toast('Sync failed: '+e.message,'err')),400);
    return;
  }
  lsSet(LS.data, { uid, contracts:state.contracts, view:state.view, activeId:state.activeId, folderId:state.folderId });

function hydrate(){
  const d = lsGet(LS.data);
  if(d && Array.isArray(d.contracts)){
    uid = d.uid || uid;
    state.contracts = d.contracts.map(migrateContract);
    state.view = d.view || 'dashboard';
    state.activeId = d.activeId || null;
    state.folderId = d.folderId || null;
  }
  else state.contracts = state.contracts.map(migrateContract);
}

function logAudit(c, action, detail, actor){
  c.audit = c.audit || [];
  const user = actor || currentUser()?.name || 'System';
  const last = c.audit[c.audit.length-1];
  // coalesce rapid repeats (e.g. keystrokes on the same field) into one entry
  if(last && last.action===action && last.detail===detail && last.user===user
     && (Date.now()-new Date(last.at).getTime())<60000){ last.at=nowISO(); return; }
  c.audit.push({ at:nowISO(), user, action, detail });
}

async function verifySeal(c){
  if(!c.hash){ toast('Document is not sealed yet','err'); return; }
  if(c.hash==='PRE-SEEDED'){ toast('Sample contract — sealed before hashing was enabled','err'); return; }
  const h=await sha256(canonicalDoc(c));
  if(h===c.hash) toast('Seal valid — document matches its SHA-256 hash');
  else toast('Seal MISMATCH — document changed after signing','err');

async function applyResponse(c, r, opts={}){
  if(!r || r.kind!=='mkataba-response'){ if(!opts.background) toast('That code is not a valid Mkataba response','err'); return false; }
  if(r.id!==c.id){ toast(`This response is for ${r.id}, not ${c.id}`,'err'); return false; }
  const currentHash=await sha256(canonicalDoc(c));
  if(r.docHash && r.docHash!==currentHash && r.docHash!==c.hash)
    toast('Note: the document changed after this share link was created','err');
  const who=r.name+(r.title?', '+r.title:'');
  if(r.action==='sign'){
    c.signatures=c.signatures||[];
    c.signatures.push({ party:'counterparty', name:r.name, title:r.title||'', email:r.email||'', at:r.at, docHash:r.docHash });
    c.comments.push({ author:r.name, role:'Counterparty — Signed', side:'external', text:r.comment||'Approved and signed via secure share link.', ts:fmtDT(r.at) });
    logAudit(c,'Countersigned',`${who} signed via share link`);
    toast(`${r.name} has signed — countersignature recorded`);
  } else if(r.action==='changes'){
    c.comments.push({ author:r.name, role:'Counterparty — Changes requested', side:'external', text:r.comment, ts:fmtDT(r.at) });
    logAudit(c,'Changes requested',`${who} requested changes via share link`);
    toast(`${r.name} requested changes — see comments`);
  } else if(r.action==='decline'){
    c.status='Declined';
    c.comments.push({ author:r.name, role:'Counterparty — Declined', side:'external', text:r.comment, ts:fmtDT(r.at) });
    logAudit(c,'Declined',`${who} declined via share link`);
    toast(`${r.name} declined the agreement`,'err');
  } else { if(!opts.background) toast('Unknown response type','err'); return false; }
  c.lastAction=todayStr(); persist();
  if(opts.background) setView(state.view||'dashboard'); else renderWorkspace();
  return true;
}

/* poll the server for counterparty responses and apply them */
async function pollPendingResponses(){
  if(!API_MODE() || !canEdit()) return;
  try{
    const list=await api('shares/pending');
    for(const item of list){
      const c=getContract(item.response?.id);
      if(!c) continue;
      const ok=await applyResponse(c, item.response, {background:true});
      if(ok) await api('shares/'+item.token+'/applied','POST');
    }
  }catch(e){ /* transient network issues — next poll retries */ }
}

/* ============================================================
   VIEW: FOLDER (filtered register + local search)
   ============================================================ */
function renderFolder(){
  const f=FOLDERS[state.folderId];
  if(!f){ setView('dashboard'); return; }
  const q=state.folderQuery.trim().toLowerCase();
  let cs=folderContracts(f.id);
  if(q) cs=cs.filter(c=>(c.name+' '+c.counterparty+' '+c.id).toLowerCase().includes(q));
  const val=cs.filter(c=>c.status!=='Declined').reduce((s,c)=>s+Number(c.value||0),0);

  document.getElementById('content').innerHTML=`
  <div class="view-enter">
    <header class="sticky top-0 z-20 bg-canvas/85 backdrop-blur border-b border-brand-100/70">
      <div class="px-8 py-4 flex items-center justify-between gap-4">
        <div class="flex items-center gap-3 min-w-0">
          <button id="back-dash" class="h-9 w-9 grid place-items-center rounded-lg border border-brand-100 bg-white text-brand-700 hover:bg-brand-50 transition shrink-0">${icon('arrowLeft')}</button>
          <span class="h-9 w-9 grid place-items-center rounded-lg bg-brand-900 text-gold-400 shrink-0">${icon(f.ic)}</span>
          <div class="min-w-0">
            <h1 class="font-display font-700 text-lg tracking-tight text-brand-900 truncate">${f.name}</h1>
            <p class="text-[11px] font-mono text-brand-800/45">${cs.length} contracts · ${fmtKESshort(val)} active value</p>
          </div>
        </div>
        <div class="flex items-center gap-2 rounded-xl border border-brand-100 bg-white px-3 py-2 w-72 focus-within:border-brand-400 focus-within:ring-2 focus-within:ring-brand-100 transition">
          ${icon('search','w-4 h-4 text-brand-800/40')}
          <input id="folder-search" value="${state.folderQuery.replace(/"/g,'&quot;')}" type="text" placeholder="Search in this folder…" class="flex-1 text-sm outline-none bg-transparent"/>
        </div>
      </div>
    </header>

    <div class="px-8 py-6 max-w-[1000px]">
      <section class="bg-white rounded-2xl border border-brand-100/70 overflow-hidden">
        ${cs.length ? cs.map(c=>contractRow(c)).join('') : `
          <div class="px-5 py-10 text-center">
            <div class="mx-auto h-12 w-12 grid place-items-center rounded-xl bg-canvas border border-brand-100 text-brand-300 mb-3">${icon('search','w-5 h-5')}</div>
            <div class="text-sm font-medium text-brand-900">No contracts match "${state.folderQuery}"</div>
            <div class="text-xs text-brand-800/50 mt-1">Clear the search, or ask Mkataba AI to look across all folders.</div>
          </div>`}
      </section>
    </div>
  </div>`;

  wireOpens();
  document.getElementById('back-dash').addEventListener('click',()=>setView('dashboard'));
  const si=document.getElementById('folder-search');
  si.addEventListener('input',()=>{ state.folderQuery=si.value; renderFolderListOnly(); });
  si.focus(); si.setSelectionRange(si.value.length,si.value.length);
  setActiveNav('folder');
}
// re-render only list body on keystroke (keeps input focus)
function renderFolderListOnly(){
  const f=FOLDERS[state.folderId]; if(!f) return;
  const q=state.folderQuery.trim().toLowerCase();
  let cs=folderContracts(f.id);
  if(q) cs=cs.filter(c=>(c.name+' '+c.counterparty+' '+c.id).toLowerCase().includes(q));
  const section=document.querySelector('#content section');
  if(!section) return;
  section.innerHTML = cs.length ? cs.map(c=>contractRow(c)).join('') : `
    <div class="px-5 py-10 text-center">
      <div class="mx-auto h-12 w-12 grid place-items-center rounded-xl bg-canvas border border-brand-100 text-brand-300 mb-3">${icon('search','w-5 h-5')}</div>
      <div class="text-sm font-medium text-brand-900">No contracts match "${state.folderQuery}"</div>
      <div class="text-xs text-brand-800/50 mt-1">Clear the search, or ask Mkataba AI to look across all folders.</div>
    </div>`;
  wireOpens(section);
}

/* ============================================================
   DOC BODY + WORKSPACE (as before)
   ============================================================ */
function docBody(c){
  const t=TEMPLATES[c.template];
  const locked=c.status==='Signed'||PORTAL_MODE||!canEdit();
  const dis=locked?'disabled':'';
  const fDate=(id,val)=>`<input ${dis} type="date" value="${val||''}" data-field="${id}" class="field field-date"/>`;
  const fText=(id,val,ph='')=>`<input ${dis} type="text" value="${val||''}" placeholder="${ph}" data-field="${id}" class="field"/>`;
  const fNum=(id,val,ph='')=>`<input ${dis} type="number" value="${val??''}" placeholder="${ph}" data-field="${id}" class="field field-num"/>`;
  const CP=`<input ${dis} type="text" value="${(c.counterparty||'').replace(/"/g,'&quot;')}" placeholder="Counterparty name" data-sync="counterparty" class="field"/>`;
  const VAL=`<input ${dis} type="number" value="${c.value||''}" placeholder="0" data-sync="value" class="field field-num"/>`;
  const clause=(n,title,body)=>`<div class="mb-5 px-2 -mx-2 py-1" data-anchor="c${n}"><h4 class="font-display font-600 text-brand-900 text-[13px] mb-1.5">${n}. ${title}</h4><p class="text-[13.5px] leading-[1.85] text-brand-800/85">${body}</p></div>`;
  const f=c.fields;
  const D=id=>fDate(id,f[id]);                    // date field
  const T=(id,ph)=>fText(id,f[id],ph);            // text field
  const N=(id,def,ph)=>fNum(id,(f[id]??def),ph);  // number field (with default)

  // Each builder returns { title, recital, clauses[] }. Clause 'c2' holds the
  // contract value for most types (NDA has no value; scanRules mirrors this).
  const BUILD = {
    RM:()=>({ title:'RAW MATERIAL SUPPLY AGREEMENT',
      recital:`This Raw Material Supply Agreement is made on ${D('effDate')} between <strong>${FIRST_PARTY}</strong> (the "Buyer") and ${CP} (the "Supplier") for the supply of ${T('material','e.g. refined sugar')} into the Buyer's production facilities in Kenya.`,
      clauses:[
        clause(1,'Supply & Specification',`The Supplier shall supply an estimated ${N('volume',5000)} metric tonnes per annum meeting the agreed specification and the applicable KEBS/EAS standard, delivered DDP to the Buyer's plant.`),
        clause(2,'Price & Contract Value',`The estimated annual contract value is KES ${VAL}, based on agreed per-tonne pricing reviewed quarterly against published commodity indices. Prices are exclusive of VAT.`),
        clause(3,'Quality & Rejection',`Consignments failing specification or Public Health / KEBS requirements may be rejected within ${N('inspectDays',3)} days of delivery, with replacement at the Supplier's cost.`),
        clause(4,'Governing Law',`This Agreement is governed by the laws of Kenya, with disputes referred to arbitration in Nairobi under the Nairobi Centre for International Arbitration.`),
      ]}),
    PK:()=>({ title:'PACKAGING SUPPLY AGREEMENT',
      recital:`This Packaging Supply Agreement is made on ${D('effDate')} between <strong>${FIRST_PARTY}</strong> (the "Buyer") and ${CP} (the "Supplier") for the supply of ${T('packType','e.g. PET bottles & preforms')} and related packaging materials.`,
      clauses:[
        clause(1,'Scope of Supply',`The Supplier shall manufacture and supply packaging to the Buyer's approved artwork and specification, against a rolling forecast, to the Buyer's plants in Kenya.`),
        clause(2,'Price & Contract Value',`The estimated annual contract value is KES ${VAL}, on agreed per-unit pricing. Any dedicated tooling is owned by the Buyer and listed in Annexure A.`),
        clause(3,'Forecast, Lead Time & Stock',`The Buyer issues a ${N('forecastWeeks',8)}-week rolling forecast; the Supplier holds ${N('safetyDays',14)} days of safety stock and honours agreed lead times.`),
        clause(4,'Intellectual Property & Governing Law',`All trademarks and artwork remain the Buyer's property. This Agreement is governed by the laws of Kenya.`),
      ]}),
    CM:()=>({ title:'CONTRACT MANUFACTURING & CO-PACKING AGREEMENT',
      recital:`This Contract Manufacturing Agreement is made on ${D('effDate')} between <strong>${FIRST_PARTY}</strong> (the "Brand Owner") and ${CP} (the "Co-Packer") for the manufacture of ${T('product','e.g. powdered beverages')} to the Brand Owner's specification.`,
      clauses:[
        clause(1,'Manufacturing Scope',`The Co-Packer shall manufacture, fill and pack the products to the Brand Owner's recipe and specification at its licensed facility. All formulations and recipes remain the exclusive property of the Brand Owner.`),
        clause(2,'Tolling Fee & Contract Value',`The estimated annual contract value is KES ${VAL}, billed as a per-unit conversion (tolling) fee and reconciled monthly against actual output.`),
        clause(3,'Quality, Food Safety & Licences',`The Co-Packer shall maintain FSSC 22000 / KEBS certification and valid Public Health and KRA licences, and permit the Brand Owner to audit on ${N('auditNotice',7)} days' notice.`),
        clause(4,'Liability & Governing Law',`The Co-Packer is liable for defects arising from its process, including recall costs. This Agreement is governed by the laws of Kenya.`),
      ]}),
    EQ:()=>({ title:'EQUIPMENT LEASE & MAINTENANCE AGREEMENT',
      recital:`This Equipment Lease is made on ${D('effDate')} between <strong>${FIRST_PARTY}</strong> (the "Lessee") and ${CP} (the "Lessor") for the lease of ${T('equipment','e.g. a PET filling line')} installed at the Lessee's plant.`,
      clauses:[
        clause(1,'Equipment & Title',`The Lessor shall install and commission the equipment at the Lessee's premises. Title to the equipment remains with the Lessor at all times during the term.`),
        clause(2,'Lease Charges',`The Lessee shall pay a monthly lease charge of KES ${VAL}, in advance, exclusive of VAT.`),
        clause(3,'Maintenance & Uptime',`The Lessor guarantees ${N('uptime',95)}% availability with an on-site response within ${N('respHrs',24)} hours, and holds critical spares locally.`),
        clause(4,'Term, Insurance & Governing Law',`The term is ${N('termYears',3)} years. The Lessee shall insure the equipment to full replacement value with the Lessor noted as loss payee. Kenyan law governs.`),
      ]}),
    WH:()=>({ title:'WAREHOUSING & COLD-CHAIN SERVICES AGREEMENT',
      recital:`This Warehousing Agreement is made on ${D('effDate')} between <strong>${FIRST_PARTY}</strong> (the "Client") and ${CP} (the "Provider") for third-party storage and handling at ${T('site','e.g. Industrial Area, Nairobi')}.`,
      clauses:[
        clause(1,'Storage & Handling',`The Provider shall store up to ${N('pallets',1200)} pallet positions, including ${T('tempRange','e.g. 2–8°C chilled')} temperature-controlled space, with inventory managed on the Client's WMS.`),
        clause(2,'Service Charge',`The monthly service charge is KES ${VAL}, based on pallet positions and throughput, exclusive of VAT.`),
        clause(3,'Stock Accuracy & Temperature SLA',`The Provider shall maintain not less than ${N('accuracy',99)}% stock accuracy and continuous temperature logging, reporting any excursion within ${N('excursionHrs',2)} hours.`),
        clause(4,'Liability & Governing Law',`The Provider is liable for loss or damage to goods in its custody up to their stock value. This Agreement is governed by the laws of Kenya.`),
      ]}),
    FF:()=>({ title:'FREIGHT & DISTRIBUTION AGREEMENT',
      recital:`This Freight & Distribution Agreement is made on ${D('effDate')} between <strong>${FIRST_PARTY}</strong> (the "Principal") and ${CP} (the "Carrier") for the distribution of finished goods across ${T('region','e.g. Nairobi to Coast')}.`,
      clauses:[
        clause(1,'Scope of Services',`The Carrier shall collect from the Principal's warehouse and deliver to the ${T('channel','e.g. distributors and modern trade')} within the agreed territory.`),
        clause(2,'Rates & Contract Value',`The estimated annual contract value is KES ${VAL}, billed against agreed per-drop and per-kilometre rates and reconciled monthly.`),
        clause(3,'Service Levels',`The Carrier commits to an on-time-in-full (OTIF) target of ${N('otif',98)}% with delivery within ${N('leadHrs',48)} hours of dispatch, per the KPI schedule in Annexure A.`),
        clause(4,'Liability & Governing Law',`Liability for loss in transit is capped per consignment value. This Agreement is governed by Kenyan law with arbitration seated in Nairobi.`),
      ]}),
    DA:()=>({ title:'DISTRIBUTOR AGREEMENT',
      recital:`This Distributor Agreement is made on ${D('effDate')} between <strong>${FIRST_PARTY}</strong> (the "Principal") and ${CP} (the "Distributor"), appointing the Distributor for the ${T('territory','e.g. Nyanza')} territory.`,
      clauses:[
        clause(1,'Appointment & Territory',`The Principal appoints the Distributor on a non-exclusive basis to distribute its products within the territory. The Distributor shall not actively sell outside the territory without written consent.`),
        clause(2,'Targets & Contract Value',`The estimated annual purchase value is KES ${VAL}, against agreed volume targets and a ${N('margin',12)}% distributor margin.`),
        clause(3,'Credit & Payment Terms',`A credit limit of ${N('creditDays',30)} days applies, secured by a bank guarantee. Title to goods passes on delivery.`),
        clause(4,'Term, Termination & Governing Law',`The term is ${N('termYears',2)} years, terminable on ${N('noticeDays',90)} days' written notice. Kenyan law governs.`),
      ]}),
    RL:()=>({ title:'RETAIL LISTING & SUPPLY AGREEMENT',
      recital:`This Retail Listing & Supply Agreement is made on ${D('effDate')} between <strong>${FIRST_PARTY}</strong> (the "Supplier") and ${CP} (the "Retailer") for the listing and supply of the Supplier's products into the Retailer's stores.`,
      clauses:[
        clause(1,'Listing & Range',`The Retailer shall list the agreed SKUs across ${N('stores',40)} stores, with planogram and shelf space per the trading terms in Annexure A.`),
        clause(2,'Trading Terms & Value',`The estimated annual supply value is KES ${VAL}, with a ${N('rebate',5)}% volume rebate and the agreed listing fees.`),
        clause(3,'Payment & Returns',`Payment falls due within ${N('payDays',60)} days of invoice. Short-dated or damaged stock is handled per the returns schedule.`),
        clause(4,'Compliance & Governing Law',`Products shall comply with KEBS labelling and Legal Metrology requirements. This Agreement is governed by the laws of Kenya.`),
      ]}),
    MK:()=>({ title:'MARKETING & TRADE PROMOTION SERVICES AGREEMENT',
      recital:`This Marketing Services Agreement is made on ${D('effDate')} between <strong>${FIRST_PARTY}</strong> (the "Client") and ${CP} (the "Agency") for ${T('services','e.g. creative, media and activation')} services.`,
      clauses:[
        clause(1,'Scope of Services',`The Agency shall provide the services in accordance with approved campaign briefs and the Client's annual marketing calendar.`),
        clause(2,'Fees & Contract Value',`The annual retainer / working budget is KES ${VAL}, billed ${T('billing','e.g. monthly')}, exclusive of VAT and third-party pass-through costs.`),
        clause(3,'Approvals & Media',`All spend and creative require the Client's prior written approval. Any media rebates or volume bonuses are passed back to the Client in full.`),
        clause(4,'IP, Confidentiality & Governing Law',`All work product and campaign intellectual property vest in the Client upon payment. This Agreement is governed by the laws of Kenya.`),
      ]}),
    ND:()=>({ title:'MUTUAL NON-DISCLOSURE AGREEMENT',
      recital:`This Mutual Non-Disclosure Agreement is entered into on ${D('effDate')} between <strong>${FIRST_PARTY}</strong>, a company incorporated in the Republic of Kenya, and ${CP}, collectively the "Parties".`,
      clauses:[
        clause(1,'Purpose',`The Parties wish to explore a potential business relationship and, in connection therewith, may disclose confidential and proprietary information. No monetary consideration passes under this Agreement; the mutual exchange of Confidential Information constitutes sufficient consideration.`),
        clause(2,'Confidential Information',`"Confidential Information" means all non-public information disclosed by one Party to the other, including recipes, specifications, commercial terms, pricing and customer data.`),
        clause(3,'Term',`This Agreement shall remain in force for ${N('termYears',3)} years from the effective date, unless terminated earlier by written notice to the registered office in Nairobi.`),
        clause(4,'Governing Law',`This Agreement is governed by the laws of the Republic of Kenya, and the Parties submit to the exclusive jurisdiction of the Courts at Nairobi.`),
      ]}),
    LE:()=>({ title:'COMMERCIAL PROPERTY LEASE AGREEMENT',
      recital:`This Lease is made on ${D('effDate')} between ${CP} (the "Landlord") and <strong>${FIRST_PARTY}</strong> (the "Tenant") in respect of commercial premises situated at ${T('premises','e.g. Westlands, Nairobi')}.`,
      clauses:[
        clause(1,'Demised Premises',`The Landlord leases to the Tenant premises measuring ${N('sqm',420)} square metres, together with shared access to power, water and secure parking.`),
        clause(2,'Rent',`The Tenant shall pay monthly rent of KES ${VAL}, in advance on or before the 5th day of each month, exclusive of VAT at the prevailing KRA rate.`),
        clause(3,'Term & Deposit',`The lease term is ${N('termYears',6)} years, secured by a deposit of ${N('deposit',0,'deposit KES')} held against dilapidations and refundable per clause 7.`),
        clause(4,'Governing Law',`This Lease is governed by the laws of Kenya, including the Land Act (2012), with disputes referred to the Environment and Land Court at Nairobi.`),
      ]}),
    PS:()=>({ title:'PROFESSIONAL SERVICES AGREEMENT',
      recital:`This Professional Services Agreement is made on ${D('effDate')} between <strong>${FIRST_PARTY}</strong> (the "Client") and ${CP} (the "Adviser") for ${T('services','e.g. statutory audit / legal advisory')} services.`,
      clauses:[
        clause(1,'Scope of Engagement',`The Adviser shall provide the professional services described in the engagement letter / Annexure A with reasonable skill and care.`),
        clause(2,'Fees & Contract Value',`The fees for the engagement are KES ${VAL}, billed ${T('billing','e.g. on milestones')}, exclusive of VAT and disbursements.`),
        clause(3,'Standard & Independence',`The services shall be performed to professional standards and, where regulated, in line with ICPAK / LSK requirements and applicable independence rules.`),
        clause(4,'Liability, Confidentiality & Governing Law',`The Adviser's liability is capped at the fees paid, save for negligence or wilful default. This Agreement is governed by the laws of Kenya.`),
      ]}),
  };
  const built=(BUILD[c.template]||BUILD.ND)();
  const title=built.title, recital=built.recital, clauses=built.clauses;
  return `
    <div class="mb-6 pb-5 border-b border-brand-100">
      <div class="text-[10px] font-mono uppercase tracking-[0.2em] text-brand-800/40 mb-2">${t.kind} · Republic of Kenya · ${c.id}</div>
      <h3 class="font-display font-700 text-lg tracking-tight text-brand-900">${title}</h3>
    </div>
    <p class="text-[13.5px] leading-[1.9] text-brand-800/85 mb-6 px-2 -mx-2 py-1" data-anchor="recital">${recital}</p>
    ${clauses.join('')}
    ${signatureBlock(c)}`;
}
function signatureBlock(c){
  const locked=c.status==='Signed';
  if(locked){
    const hashDisplay=c.hash&&c.hash!=='PRE-SEEDED'?c.hash:('a7f3'+generatePseudo(c.id));
    return `
    <div class="seal-in mt-8 rounded-xl border border-brand-200 bg-gradient-to-br from-brand-50 to-white p-5">
      <div class="flex items-start gap-4">
        <div class="h-14 w-14 shrink-0 grid place-items-center rounded-full bg-brand-900 text-gold-400 ring-4 ring-gold-500/15">${icon('seal','w-7 h-7')}</div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2"><span class="font-display font-700 text-brand-900">Executed &amp; Sealed</span>${statusChip('Signed')}</div>
          <div class="mt-1 text-xs text-brand-800/60">${(()=>{ const cp=(c.signatures||[]).find(s=>s.party==='counterparty');
            return `Signed by <strong>${c.signatory}</strong> for ${FIRST_PARTY}${cp?`, countersigned by <strong>${cp.name}${cp.title?', '+cp.title:''}</strong> for ${c.counterparty||'the Counterparty'} (${fmtDT(cp.at)})`:` — counterparty signature pending; share the document to collect it`}.`; })()}</div>
          <div class="mt-3 grid sm:grid-cols-2 gap-3 text-xs">
            <div class="rounded-lg bg-white border border-brand-100 p-2.5">
              <div class="text-brand-800/45 uppercase tracking-wider text-[10px] mb-1 flex items-center gap-1">${icon('finger','w-3 h-3')} IPRS Identity</div>
              <div class="font-medium text-brand-700">Verified</div>
            </div>
            <div class="rounded-lg bg-white border border-brand-100 p-2.5">
              <div class="text-brand-800/45 uppercase tracking-wider text-[10px] mb-1 flex items-center gap-1">${icon('key','w-3 h-3')} CAK PKI Token</div>
              <div class="font-medium text-brand-700">Attached</div>
            </div>
          </div>
          <div class="mt-3 rounded-lg bg-brand-900 p-3 font-mono text-[11px] leading-relaxed">
            <div class="flex items-center gap-1.5 text-gold-400 mb-1">${icon('hash','w-3 h-3')} SHA-256 DOCUMENT SEAL</div>
            <div class="text-brand-100 break-all">${hashDisplay}</div>
            <div class="text-brand-300 mt-1.5">${c.signedAt||'Timestamp recorded on ledger'}</div>
          </div>
        </div>
      </div>
    </div>`;
  }
  return `
    <div class="mt-8 rounded-xl border border-dashed border-brand-200 bg-brand-50/30 p-5 text-center" data-anchor="sig">

/* ============================================================
   VIEW: DEAL MAP  (force-directed graph of the portfolio)
   ============================================================ */
const REL_SEEDS = [ // name-matched so IDs stay dynamic \u2014 traces the value stream
  { from:'Refined Sugar Supply \u2014 Confectionery Line', to:'Co-Packing \u2014 Powdered Beverages', label:'feeds' },
  { from:'Co-Packing \u2014 Powdered Beverages', to:'Modern Trade Listing & Supply', label:'supplies' },
  { from:'Raw Milk Collection \u2014 Rift Valley Co-ops', to:'Cold-Chain Storage \u2014 Dairy & Chilled', label:'stored via' },
  { from:'Central Warehouse & 3PL \u2014 Industrial Area', to:'Last-Mile Distribution \u2014 Western Region', label:'feeds' },
  { from:'Regional Distributor \u2014 Nyanza', to:'Modern Trade Listing & Supply', label:'overlaps' },
  { from:'Crude Edible Oil Supply', to:'Tolling Agreement \u2014 Detergent Powder', label:'feeds' },
  { from:'Mutual NDA \u2014 New Product Development', to:'Contract Manufacturing \u2014 Bar Soap', label:'precedes' },
];
const STATUS_BAR = {'Draft':'#94a3b8','Under Review':'#C79A3E','Signed':'#0B7A5F','Declined':'#f43f5e'};
const KIND_TAG = {proc:{t:'PROC',c:'#2E9F80'},mfg:{t:'MFG',c:'#b45309'},dist:{t:'DIST',c:'#0369a1'},sales:{t:'SALES',c:'#C79A3E'},mktg:{t:'MKTG',c:'#7c3aed'},corp:{t:'CORP',c:'#0B7A5F'},party:{t:'PARTY',c:'#08211E'}};

function buildGraph(){
  const nodes=[], edges=[];
  const trunc=(s,n=24)=>s.length>n?s.slice(0,n-1)+'\u2026':s;
  // contract nodes
  state.contracts.forEach(c=>{
    nodes.push({ id:c.id, type:'contract', c, label:trunc(c.name), sub:c.id+' \u00b7 '+(c.value?fmtKESshort(c.value):'\u2014'),
      kind:c.folder, bar:STATUS_BAR[c.status], w:0,h:0,x:0,y:0 });
  });
  // party nodes (aggregate)
  const parties={};
  state.contracts.forEach(c=>{ if(!c.counterparty) return;
    (parties[c.counterparty]||(parties[c.counterparty]=[])).push(c); });
  Object.entries(parties).forEach(([name,cs])=>{
    const val=cs.filter(x=>x.status!=='Declined').reduce((s,x)=>s+Number(x.value||0),0);
    nodes.push({ id:'p:'+name, type:'party', party:name, cs, label:trunc(name), sub:cs.length+' deal'+(cs.length===1?'':'s')+' \u00b7 '+fmtKESshort(val),
      kind:'party', bar:'#08211E', w:0,h:0,x:0,y:0 });
    cs.forEach(c=>edges.push({from:c.id, to:'p:'+name, label:'party to'}));
  });
  // seeded contract-to-contract relations
  REL_SEEDS.forEach(r=>{
    const a=state.contracts.find(c=>c.name===r.from), b=state.contracts.find(c=>c.name===r.to);
    if(a&&b) edges.push({from:a.id, to:b.id, label:r.label});
  });
  const byId=Object.fromEntries(nodes.map(n=>[n.id,n]));
  edges.forEach(e=>{e.s=byId[e.from]; e.t=byId[e.to];});
  const adj={}; nodes.forEach(n=>adj[n.id]=new Set());
  edges.forEach(e=>{adj[e.from].add(e.to); adj[e.to].add(e.from);});
  return {nodes, edges, adj};
}

function layoutGraph(nodes, edges, W, H){
  let seed=11; const rnd=()=>{seed=(seed*1103515245+12345)&0x7fffffff; return seed/0x7fffffff;};
  const groups=[...Object.keys(FOLDERS),'party'];
  const gA={}; groups.forEach((g,i)=>gA[g]=i/groups.length*Math.PI*2 - Math.PI/3);
  nodes.forEach(n=>{
    if(state.mapPos[n.id]){ n.x=state.mapPos[n.id].x; n.y=state.mapPos[n.id].y; n.pinned=true; return; }
    const a=gA[n.kind]+(rnd()-.5)*1.1, r=Math.min(W,H)*(n.type==='party'?0.18:0.34);
    n.x=W/2+Math.cos(a)*r+(rnd()-.5)*40; n.y=H/2+Math.sin(a)*r+(rnd()-.5)*40;
  });
  for(let it=0; it<340; it++){
    const cool=1-it/340;
    for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++){
      const a=nodes[i],b=nodes[j];
      let dx=a.x-b.x, dy=a.y-b.y; const d2=dx*dx+dy*dy+1, d=Math.sqrt(d2);
      const rep=Math.min(28, 14000/d2)*cool;
      dx/=d; dy/=d;
      if(!a.pinned){a.x+=dx*rep; a.y+=dy*rep;} if(!b.pinned){b.x-=dx*rep; b.y-=dy*rep;}
    }
    edges.forEach(e=>{
      let dx=e.t.x-e.s.x, dy=e.t.y-e.s.y; const d=Math.sqrt(dx*dx+dy*dy)+.01;
      const f=(d-165)*0.02*cool; dx/=d; dy/=d;
      if(!e.s.pinned){e.s.x+=dx*f*d*0.01+dx*f; e.s.y+=dy*f;} if(!e.t.pinned){e.t.x-=dx*f; e.t.y-=dy*f;}
    });
    nodes.forEach(n=>{ if(n.pinned) return;
      n.x+=(W/2-n.x)*0.006; n.y+=(H/2-n.y)*0.006;
      n.x=Math.max(110,Math.min(W-110,n.x)); n.y=Math.max(70,Math.min(H-70,n.y)); });
  }
}

  const cs = state.contracts;
  const scanned = cs.filter(c=>c.scan);
  const allScanned = scanned.length===cs.length && cs.length>0;

  /* ---- header stats ---- */
  const openAll = scanned.flatMap(c=>openFindings(c));
  const highN = openAll.filter(f=>f.sev==='high').length;
  const atRisk = scanned.filter(c=>openFindings(c).some(f=>f.sev==='high'))
                        .reduce((s,c)=>s+Number(c.value||0),0);

  /* ---- expiry radar (independent of scan) ---- */
  const expiring = cs.filter(c=>c.expiry && c.status!=='Declined')
    .map(c=>({c, d:daysUntil(c.expiry)}))
    .filter(x=>x.d>=0 && x.d<=90)
    .sort((a,b)=>a.d-b.d);

  /* ---- quadrant data (monetary scatter + non-monetary lane) ---- */
  const pts = scanned.filter(c=>isMonetary(c)).map(c=>({c, v:Number(c.value||0), r:riskScore(c)}));
  const nmPts = scanned.filter(c=>!isMonetary(c)).map((c,i)=>({c, i, r:riskScore(c)}));
  const maxV = Math.max(1, ...pts.map(p=>p.v));
  const maxR = Math.max(6, ...pts.map(p=>p.r), ...nmPts.map(p=>p.r));
  const vals = pts.map(p=>p.v).sort((a,b)=>a-b);
  const medV = vals.length ? vals[Math.floor(vals.length/2)] : 0;
  const CW=900, CH=400, P={l:64,r:24,t:30,b:44};
  const LANE = nmPts.length ? 70 : 0;
  const X = v => P.l+LANE + (v/maxV)*(CW-P.l-LANE-P.r);
  const Y = r => CH-P.b - (r/maxR)*(CH-P.t-P.b);
  const riskLine = 5; // any high finding crosses it

  const dotCol = c => { const o=openFindings(c);
    if(!o.length) return '#0B7A5F';
    const w=worstSevOf(o); return w==='high'?'#f43f5e':w==='med'?'#C79A3E':'#94a3b8'; };

  const chart = !allScanned ? `
    <div class="grid place-items-center h-[300px] text-center">
      <div>
        <div class="mx-auto h-12 w-12 grid place-items-center rounded-xl bg-canvas border border-brand-100 text-brand-300 mb-3">${icon('scan','w-5 h-5')}</div>
        <div class="text-sm font-medium text-brand-900">${scanned.length ? scanned.length+' of '+cs.length+' contracts scanned' : 'The portfolio hasn\u2019t been scanned yet'}</div>
        <div class="text-xs text-brand-800/50 mt-1 max-w-xs">Run a portfolio scan to place every contract on the risk\u2013value map and roll up findings across the book.</div>
      </div>
    </div>` : `
    <svg viewBox="0 0 ${CW} ${CH}" class="w-full">
      <rect x="${X(medV)}" y="${P.t}" width="${CW-P.r-X(medV)}" height="${Y(riskLine)-P.t}" fill="#f43f5e" opacity="0.045"/>
      <line x1="${P.l}" y1="${Y(riskLine)}" x2="${CW-P.r}" y2="${Y(riskLine)}" stroke="#C79A3E" stroke-width="1" stroke-dasharray="4 4" opacity=".6"/>
      <line x1="${X(medV)}" y1="${P.t}" x2="${X(medV)}" y2="${CH-P.b}" stroke="#9FD5C2" stroke-width="1" stroke-dasharray="4 4"/>
      ${LANE?`<rect x="${P.l+3}" y="${P.t}" width="${LANE-14}" height="${CH-P.t-P.b}" rx="8" fill="#08211E" opacity="0.04"/>
      <line x1="${P.l+LANE-6}" y1="${P.t}" x2="${P.l+LANE-6}" y2="${CH-P.b}" stroke="#CFEAE0" stroke-width="1"/>
      <text x="${P.l+LANE/2-4}" y="${(P.t+CH-P.b)/2}" font-size="8.5" font-weight="700" letter-spacing=".12em" fill="#8aa198" transform="rotate(-90 ${P.l+LANE/2-4} ${(P.t+CH-P.b)/2})" text-anchor="middle">NON-MONETARY</text>`:''}
      <line x1="${P.l}" y1="${CH-P.b}" x2="${CW-P.r}" y2="${CH-P.b}" stroke="#CFEAE0" stroke-width="1.4"/>

      ${pts.map(p=>`<circle class="qdot" data-open="${p.c.id}" cx="${X(p.v)}" cy="${Y(p.r)}" r="${7+Math.sqrt(p.v/maxV)*6}" fill="${dotCol(p.c)}" fill-opacity=".82" stroke="transparent"><title>${p.c.name.replace(/&/g,'&amp;')} \u00b7 ${fmtKESshort(p.v)}${p.c.valueType==='estimated'?' (est.)':''} \u00b7 risk ${p.r}${openFindings(p.c).length?' \u00b7 '+openFindings(p.c).length+' open findings':' \u00b7 clean'}</title></circle>`).join('')}
      ${nmPts.map(p=>`<circle class="qdot" data-open="${p.c.id}" cx="${P.l+16+(p.i%3)*14}" cy="${Y(p.r)}" r="6.5" fill="${dotCol(p.c)}" fill-opacity=".82" stroke="transparent"><title>${p.c.name.replace(/&/g,'&amp;')} \u00b7 non-monetary \u00b7 risk ${p.r}${openFindings(p.c).length?' \u00b7 '+openFindings(p.c).length+' open findings':' \u00b7 clean'}</title></circle>`).join('')}
    </svg>`;

  /* ---- aggregated findings across the book ---- */
  const agg = {};
  scanned.forEach(c=>openFindings(c).forEach(f=>{
    (agg[f.id] || (agg[f.id]={id:f.id, title:f.title, sev:f.sev, kind:f.kind, fix:f.fix, cs:[]})).cs.push(c);
  }));
  const aggList = Object.values(agg).sort((a,b)=>SEV_RANK[b.sev]-SEV_RANK[a.sev] || b.cs.length-a.cs.length);
  const aggHtml = !allScanned ? `<div class="px-5 py-6 text-center text-xs text-brand-800/50">Run the portfolio scan to aggregate findings across the book.</div>`

    : aggList.map(a=>{
      const sm=SEV_META[a.sev];
      const exposure=a.cs.reduce((s,c)=>s+Number(c.value||0),0);
      return `
      <div class="px-5 py-3.5 border-b border-brand-100/50 last:border-0">
        <div class="flex items-center gap-2">
          <span class="h-1.5 w-1.5 rounded-full ${sm.dot} shrink-0"></span>
          <span class="text-sm font-medium text-brand-900 flex-1 min-w-0 truncate">${a.title}</span>

          ${a.cs.map(c=>`<button data-open="${c.id}" class="text-[10px] font-mono rounded-full border border-brand-100 bg-canvas hover:border-brand-400 px-2 py-0.5 text-brand-700 transition">${c.id} \u00b7 ${(c.counterparty||'draft').split(' ')[0]}</button>`).join('')}
        </div>

  /* ---- counterparty concentration ---- */
  const partyMap={};
  cs.filter(c=>c.counterparty && c.status!=='Declined').forEach(c=>{
    (partyMap[c.counterparty]||(partyMap[c.counterparty]={name:c.counterparty, cs:[], val:0})).cs.push(c);

  const totalActive = Object.values(partyMap).reduce((s,p)=>s+p.val,0)||1;
  const parties = Object.values(partyMap).sort((a,b)=>b.val-a.val);
  const concHtml = parties.map(p=>{

    return `
    <button data-party="${p.name.replace(/"/g,'&quot;')}" class="w-full text-left px-5 py-3 border-b border-brand-100/50 last:border-0 hover:bg-brand-50/50 transition group">

        <span class="text-xs font-mono text-brand-900 whitespace-nowrap">${fmtKESshort(p.val)} \u00b7 ${pct.toFixed(0)}%</span>
      </div>
      <div class="mt-1.5 h-1.5 rounded-full bg-brand-50 overflow-hidden">
        <div class="h-full rounded-full ${flag?'bg-rose-400':'bg-brand-400'}" style="width:${Math.max(2,pct)}%"></div>
      </div>
      <div class="mt-1 text-[10px] text-brand-800/45">${p.cs.length} agreement${p.cs.length===1?'':'s'}${(n=>n?` \u00b7 ${n} non-monetary`:'')(p.cs.filter(c=>!isMonetary(c)).length)} \u00b7 tap for relationship view</div>
    </button>`;
  }).join('');

  /* ---- expiry radar html ---- */
  const expHtml = expiring.length ? expiring.map(x=>{
    const urg = x.d<=30?'rose':x.d<=60?'gold':'slate';
    const cls = urg==='rose'?'bg-rose-50 text-rose-700 border-rose-200':urg==='gold'?'bg-gold-500/10 text-gold-600 border-gold-500/25':'bg-slate-100 text-slate-600 border-slate-200';
    return `
    <button data-open="${x.c.id}" class="w-full text-left flex items-center gap-3 px-5 py-3 border-b border-brand-100/50 last:border-0 hover:bg-brand-50/50 transition group">
      <span class="inline-flex flex-col items-center justify-center h-11 w-11 shrink-0 rounded-xl border ${cls}">
        <span class="text-sm font-display font-700 leading-none">${x.d}</span>

      </span>
      <span class="text-xs font-mono whitespace-nowrap ${isMonetary(x.c)?'text-brand-900':'text-brand-800/40'}">${!isMonetary(x.c)?'n/m':(x.c.value?fmtKESshort(x.c.value):'\u2014')}</span>

        </div>
        <button id="scan-all" ${intelUI.scanning?'disabled':''} class="flex items-center gap-2 rounded-xl bg-brand-900 text-white px-4 py-2.5 text-sm font-semibold hover:bg-brand-800 transition shadow-lg shadow-brand-900/15 ${intelUI.scanning?'opacity-70':''}">

      ${allScanned?`

/* ---- counterparty relationship modal: local graph at honest scale ---- */
function closePartyModal(){ document.getElementById('party-scrim')?.classList.remove('open'); }
function openPartyModal(name){
  const scrim=document.getElementById('party-scrim'), modal=document.getElementById('party-modal');
  const own = state.contracts.filter(c=>c.counterparty===name);
  // pull in relation-linked contracts + their parties
  const ownIds=new Set(own.map(c=>c.id));
  const linked=[];
  REL_SEEDS.forEach(r=>{
    const a=state.contracts.find(c=>c.name===r.from), b=state.contracts.find(c=>c.name===r.to);
    if(!a||!b) return;
    if(ownIds.has(a.id)&&!ownIds.has(b.id)) linked.push(b);
    if(ownIds.has(b.id)&&!ownIds.has(a.id)) linked.push(a);
  });
  const nodes=[], edges=[];
  const trunc=(s,n=22)=>s.length>n?s.slice(0,n-1)+'\u2026':s;
  nodes.push({id:'p:'+name, type:'party', label:trunc(name), sub:own.length+' deals', bar:'#08211E', kind:'party'});
  const addC=c=>{ if(nodes.some(n=>n.id===c.id)) return;
    nodes.push({id:c.id, type:'contract', c, label:trunc(c.name), sub:!isMonetary(c)?'non-monetary':(c.value?fmtKESshort(c.value):c.status), bar:STATUS_BAR[c.status], kind:c.folder}); };
  own.forEach(c=>{ addC(c); edges.push({from:c.id,to:'p:'+name,label:'party to'}); });
  linked.forEach(c=>{ addC(c);
    if(c.counterparty && c.counterparty!==name){
      const pid='p:'+c.counterparty;
      if(!nodes.some(n=>n.id===pid)) nodes.push({id:pid,type:'party',label:trunc(c.counterparty),sub:'counterparty',bar:'#08211E',kind:'party'});
      edges.push({from:c.id,to:pid,label:'party to'});
    }});
  REL_SEEDS.forEach(r=>{
    const a=state.contracts.find(c=>c.name===r.from), b=state.contracts.find(c=>c.name===r.to);
    if(a&&b&&nodes.some(n=>n.id===a.id)&&nodes.some(n=>n.id===b.id)) edges.push({from:a.id,to:b.id,label:r.label});
  });
  const byId=Object.fromEntries(nodes.map(n=>[n.id,n]));
  edges.forEach(e=>{e.s=byId[e.from]; e.t=byId[e.to];});
  const W=640,H=340;
  nodes.forEach(n=>{ n.w=Math.max(104,Math.min(170,n.label.length*6.4+50)); n.h=38; n.x=0; n.y=0; });
  const savedPos=state.mapPos; state.mapPos={};   // fresh layout, don't reuse global cache
  layoutGraph(nodes, edges, W, H);
  state.mapPos=savedPos;

  const val=own.filter(x=>x.status!=='Declined').reduce((s,x)=>s+Number(x.value||0),0);
  modal.innerHTML=`
  <div class="view-enter bg-white rounded-2xl border border-brand-100 shadow-2xl shadow-brand-900/25 overflow-hidden">
    <div class="flex items-center gap-3 px-5 py-4 border-b border-brand-100/60">
      <span class="h-9 w-9 grid place-items-center rounded-lg bg-brand-900 text-gold-400">${icon('users')}</span>
      <div class="flex-1 min-w-0">
        <div class="font-display font-600 text-brand-900 truncate">${name}</div>
        <div class="text-[11px] font-mono text-brand-800/45">${own.length} agreements \u00b7 ${fmtKES(val)} exposure \u00b7 relationship neighborhood</div>
      </div>
      <button id="pm-close" class="h-8 w-8 grid place-items-center rounded-lg hover:bg-brand-50 text-brand-400 hover:text-brand-800 transition">${icon('x')}</button>
    </div>
    <svg viewBox="0 0 ${W} ${H}" class="w-full bg-canvas/60">
      ${edges.map((e,i)=>`<path class="mlink" d="M${e.s.x} ${e.s.y} L${e.t.x} ${e.t.y}"/>
        <text class="mlabel show" x="${(e.s.x+e.t.x)/2}" y="${(e.s.y+e.t.y)/2-3}" text-anchor="middle">${e.label}</text>`).join('')}
      ${nodes.map(n=>`
      <g class="mnode" ${n.type==='contract'?`data-open="${n.id}"`:''} transform="translate(${n.x},${n.y})">
        <rect class="chipbg" x="${-n.w/2}" y="${-n.h/2}" width="${n.w}" height="${n.h}" rx="8"/>
        <rect x="${-n.w/2}" y="${-n.h/2}" width="4" height="${n.h}" rx="2" fill="${n.bar}"/>
        <text x="${-n.w/2+10}" y="${-2}" font-size="10" font-weight="600" fill="#08211E">${n.label.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</text>
        <text x="${-n.w/2+10}" y="${10}" font-size="7.5" font-family="'JetBrains Mono',monospace" fill="#8aa198">${n.sub}</text>
      </g>`).join('')}
    </svg>
    <div class="px-5 py-3 border-t border-brand-100/60 text-[11px] text-brand-800/45 flex items-center justify-between">
      <span>Click a contract node to open its workspace</span>
      <span class="font-mono">${nodes.length} nodes \u00b7 bounded neighborhood</span>
    </div>
  </div>`;
  scrim.classList.add('open');
  modal.querySelector('#pm-close').addEventListener('click',closePartyModal);
  modal.querySelectorAll('[data-open]').forEach(el=>el.addEventListener('click',()=>{ closePartyModal(); openWorkspace(el.getAttribute('data-open')); }));
}

/* ============================================================
   AI CONTRACT SCAN  (rule engine over live contract data)
   ============================================================ */
const SEV_META = {
  high:{label:'High', chip:'bg-rose-50 text-rose-700 border-rose-200', dot:'bg-rose-500', text:'text-rose-600'},
  med:{label:'Medium', chip:'bg-gold-500/10 text-gold-600 border-gold-500/25', dot:'bg-gold-500', text:'text-gold-600'},
  low:{label:'Low', chip:'bg-slate-100 text-slate-600 border-slate-200', dot:'bg-slate-400', text:'text-slate-500'},
};
const SEV_RANK = {high:3, med:2, low:1};
const KIND_LABEL = {risk:'Risk', missing:'Missing', ambiguity:'Ambiguity'};

function scanRules(c){
  const F=[], f=c.fields||{};
  const add=(id,sev,kind,title,anchor,what,why,fix)=>F.push({id,sev,kind,title,anchor,what,why,fix});
  const valAnchor = c.template==='ND' ? 'c1' : 'c2';

  // --- generic, data-driven (auto-clear when fixed) ---
  if(!c.counterparty) add('g-cp','high','missing','No counterparty named','recital',
    `The opening recital names ${FIRST_PARTY} but leaves the counterparty blank.`,
    'A contract with an unnamed party is unenforceable — there is no legal person to hold to its terms or serve notice on.',
    'Enter the counterparty\u2019s full registered name (as it appears on the BRS register) in the recital.');
  if(isMonetary(c) && !(Number(c.value)>0)) add('g-val','med','missing','Contract value not set',valAnchor,
    'The commercial value field reads KES 0 or is empty.',
    'Without a stated consideration the pricing clause is incomplete, and downstream stamp duty and approval thresholds cannot be assessed.',
    'Set the agreed KES value in the highlighted field \u2014 the deal summary and dashboard will sync automatically.');
  if(!f.effDate) add('g-date','med','missing','No effective date','recital',
    'The commencement date field in the recital is empty.',
    'Obligations, term length and notice periods all count from this date; leaving it open invites disputes about when duties began.',
    'Pick the effective date in the recital\u2019s date field.');
  if(c.status!=='Signed' && (!c.compliance.iprs || !c.compliance.pki)) add('g-comp','low','missing','Signature verification incomplete','sig',
    'IPRS identity verification and/or the CAK PKI token have not been completed.',
    'Under the Kenya Information & Communications Act an advanced e-signature needs verified identity and an accredited certificate to carry full evidentiary weight.',
    'Run the IPRS check and attach the PKI token in the verification panel before signing.');

  // --- template-specific (tuned to FMCG contract types & Kenyan practice) ---
  if(c.template==='RM'){
    if(!f.material) add('rm-mat','med','missing','Material not specified','recital',
      'The recital leaves the material description blank.',
      'An unspecified input makes the specification, quality and rejection clauses unworkable and invites delivery disputes.',
      'Name the material and grade in the recital (e.g. \u201cICUMSA 45 refined white sugar\u201d).');
    add('rm-kebs','med','risk','KEBS/EAS standard not cited','c3',
      'The quality clause references a specification generally but names no KEBS/EAS standard number.',
      'For food-grade inputs, an unnamed standard makes rejection hard to enforce and risks non-compliant material entering production.',
      'Cite the applicable KEBS/EAS standard and make conformity a condition of acceptance.');
    add('rm-index','low','ambiguity','Price index unnamed','c2',
      'Pricing is \u201creviewed against commodity indices\u201d without naming one.',
      'Different indices move differently; an unnamed benchmark invites a pricing dispute at every quarterly review.',
      'Name the specific published index and state the review formula.');
    if(Number(c.value)>50000000) add('rm-sec','med','missing','No alternate-source / security of supply','c1',
      `At ${fmtKESshort(c.value)} a year this is a critical input, yet nothing addresses supply failure.`,
      'A single-source dependency at this scale can halt production if the supplier defaults.',
      'Add a business-continuity clause: safety stock, an approved alternate source, or step-in rights.');
  }
  if(c.template==='PK'){
    add('pk-ip','med','risk','Artwork / trademark ownership not explicit','c4',
      'IP is mentioned only briefly; ownership of dies, plates and artwork is not spelled out.',
      'If the supplier claims rights over tooling or artwork, a switch of supplier can be blocked or delayed.',
      'State expressly that all artwork, trademarks and Buyer-funded tooling remain the Buyer\u2019s property, returnable on request.');
    add('pk-moq','low','ambiguity','MOQ & obsolete-stock liability not addressed','c3',
      'Forecast and safety stock are covered, but minimum order quantities and who carries obsolete artwork stock are not.',
      'On an artwork change, unsold old-artwork packaging becomes a write-off nobody has agreed to fund.',
      'Set MOQs and agree that the Buyer funds obsolete stock only where it gave firm commitments.');
  }
  if(c.template==='CM'){
    add('cm-fs','high','risk','Food-safety certification not evidenced','c3',
      'The agreement requires FSSC 22000 / KEBS certification but attaches no current certificate.',
      'A lapsed co-packer certificate exposes the brand owner to recalls and Public Health / KEBS enforcement on its own label.',
      'Attach the current certificate and make continuous renewal a condition, with audit rights on notice.');
    add('cm-recall','high','missing','No product recall & traceability clause','c4',
      'Liability is noted generally but there is no defined recall process or batch traceability obligation.',
      'Without agreed recall roles and cost allocation, a contamination event becomes a dispute while product is still on shelf.',
      'Add a recall clause: batch coding, mock-recall tests, notification timelines and cost allocation by fault.');
    add('cm-ip','med','missing','Formulation IP protection is thin','c1',
      'The clause states the Brand Owner owns recipes but adds no non-compete or non-use protection.',
      'A co-packer that also makes competitor or own-label products could leak or reuse the formulation.',
      'Add a non-use / non-compete covenant on the specific formulation and ring-fence production records.');
  }
  if(c.template==='EQ'){
    if(!f.equipment) add('eq-eq','med','missing','Equipment not described','recital',
      'The equipment description in the recital is blank.',
      'The lease, insurance and maintenance obligations all attach to a defined asset; without it the contract is uncertain.',
      'Describe the equipment, make/model and serial number in the recital or a schedule.');
    add('eq-credit','med','missing','No uptime service credits','c3',
      'An uptime target is stated but nothing happens if the Lessor misses it.',
      'A target with no remedy is unenforceable in practice \u2014 downtime on a filling line directly stops sales.',
      'Add service credits against the monthly charge for each band of missed uptime.');
    add('eq-title','low','risk','Ownership on Lessor insolvency unclear','c1',
      'Title stays with the Lessor, but the Lessee\u2019s position if the Lessor becomes insolvent is not addressed.',
      'On the Lessor\u2019s insolvency the Lessee could lose access to equipment its production depends on.',
      'Add quiet-enjoyment and step-in / purchase-option protection on Lessor insolvency.');
  }
  if(c.template==='WH'){
    add('wh-temp','high','risk','Cold-chain excursion remedy missing','c3',
      'Temperature logging is required, but the consequence of an excursion (who bears spoiled stock) is not stated.',
      'For dairy and chilled goods a single excursion can write off a whole consignment; silence means a dispute, not a claim.',
      'Define excursion thresholds, mandatory quarantine, and Provider liability for stock spoiled outside range.');
    add('wh-ins','med','missing','Liability cap may sit below stock value','c4',
      'Liability is capped at \u201cstock value\u201d but no warehouse-keeper\u2019s insurance is required.',
      'If the Provider is uninsured, a fire or flood loss becomes an unrecoverable debt rather than an insurance claim.',
      'Require the Provider to carry warehouse-keeper\u2019s liability cover to the peak stock value, evidenced annually.');
  }
  if(c.template==='FF'){
    if(!f.region) add('ff-reg','med','missing','Distribution territory unspecified','recital',
      'The territory / lane field in the recital is blank.',
      'Rates, transit times and OTIF all depend on the named lanes; leaving them open invites billing and SLA disputes.',
      'Name the lanes or region (e.g. \u201cNairobi \u2013 Mombasa primary + coastal secondary\u201d).');
    add('ff-otif','med','ambiguity','OTIF penalty not defined','c3',
      'An OTIF target is set but carries no service credit or penalty for misses.',
      'Without a remedy the target is aspirational, and repeated late deliveries erode trade fill rates with no recourse.',
      'Attach service credits or penalties to defined OTIF bands, tiered by channel priority.');
    if(Number(c.value)>5000000) add('ff-ins','low','risk','Goods-in-transit insurance silent','c4',
      `At ${fmtKESshort(c.value)} of annual flows the agreement does not require goods-in-transit cover.`,
      'An uninsured hijack or accident lands as a dispute over the liability cap instead of a clean claim.',
      'Require the Carrier to maintain goods-in-transit insurance to full consignment value, Principal as loss payee.');
  }
  if(c.template==='DA'){
    add('da-credit','high','risk','Distributor credit inadequately secured','c3',
      'A credit limit is granted; confirm the bank guarantee is in place and covers the peak exposure.',
      'Distributor default on open credit is the single most common bad-debt loss in Kenyan FMCG route-to-market.',
      'Hold a bank guarantee or post-dated security sized to peak exposure and review it quarterly.');
    add('da-excl','med','ambiguity','Exclusivity vs. territory unclear','c1',
      'The appointment is \u201cnon-exclusive\u201d but sets a single-territory restriction, which reads inconsistently.',
      'Ambiguity over exclusivity fuels channel-conflict disputes when another distributor sells into the area.',
      'State clearly whether the territory is exclusive, and define permitted cross-territory sales.');
    add('da-perf','low','missing','No minimum-performance termination trigger','c4',
      'Termination is on notice only, with no link to missed volume targets.',
      'A weak distributor can hold a territory indefinitely while under-serving it, with no clean exit.',
      'Add a right to terminate or de-scope the territory on sustained failure to hit agreed targets.');
  }
  if(c.template==='RL'){
    if(Number(f.payDays||60)>45) add('rl-pay','med','risk','Payment terms strain working capital',valAnchor,
      `Payment terms are ${Number(f.payDays||60)} days \u2014 well beyond the 30\u201345 days that keeps cash healthy.`,
      'Long modern-trade terms on high volumes tie up working capital and magnify the risk if the retailer delays.',
      'Negotiate toward 30\u201345 days, or price the cost of the extended terms into the trading margin.');
    add('rl-listing','low','ambiguity','Listing fees & rebates not itemised','c2',
      'Trading terms bundle listing fees and rebates without an itemised schedule.',
      'Un-itemised trade spend is where margin quietly leaks and reconciliation disputes begin.',
      'Itemise listing fees, rebates and promotional support in a costed Annexure A.');
    add('rl-return','med','missing','Short-dated returns liability unclear','c3',
      'Returns are mentioned but the split of short-dated / damaged stock liability is not defined.',
      'Retailers often push short-dated stock back; without clear rules this becomes an unbudgeted write-off.',
      'Define return windows, condition criteria and who bears short-dated stock by cause.');
  }
  if(c.template==='MK'){
    add('mk-rebate','med','ambiguity','Media rebate transparency not guaranteed','c3',
      'The clause says rebates are passed back but requires no audit or disclosure of media buys.',
      'Undisclosed agency media rebates are a well-known leakage; without audit rights the Client cannot verify pass-back.',
      'Add media-transparency and audit rights over buys, rates and rebates.');
    add('mk-ip','med','risk','Campaign IP vests only on full payment','c4',
      'IP vests \u201con payment\u201d, which can strand rights if a dispute pauses a final invoice.',
      'A withheld final payment could leave the Client unable to use campaign assets it largely funded.',
      'Provide a licence to use delivered work pending payment, with full assignment on settlement.');
    add('mk-appr','low','missing','Spend approval threshold unset','c3',
      'All spend needs approval, but no monetary threshold or delegation is defined.',
      'Without thresholds, either every small cost needs sign-off (slow) or large spend slips through (risk).',
      'Set an approval matrix with KES thresholds and named approvers.');
  }
  if(c.template==='ND'){
    const term=Number(f.termYears||3);
    if(term>5) add('nd-term','med','ambiguity','Confidentiality term exceeds market norm','c3',
      `The term is set to ${term} years \u2014 beyond the 2\u20135 years typical for commercial NDAs in Kenya.`,
      'Overlong terms are harder to enforce and may be read down by a court as an unreasonable restraint.',
      'Reduce to 3\u20135 years, or give trade secrets an indefinite tail while other information expires.');
    add('nd-inj','low','missing','No injunctive-relief clause','c2',
      'The agreement is silent on equitable remedies.',
      'Damages arrive too late for a confidentiality breach \u2014 the value is in stopping disclosure fast.',
      'Add wording acknowledging irreparable harm and permitting interim injunctions in the High Court at Nairobi.');
  }
  if(c.template==='LE'){
    if(!f.deposit) add('le-dep','high','missing','Security deposit not specified','c3',
      'Clause 3 references a deposit but the amount field is blank.',
      'Without a stated deposit there is no defined security against dilapidations or arrears.',
      'Enter the deposit \u2014 market practice in Nairobi is around 3 months\u2019 gross rent for commercial space.');
    add('le-stamp','med','risk','Stamp duty not evidenced','c4',
      'Nothing records assessment or payment of stamp duty.',
      'Leases attract stamp duty under the Stamp Duty Act (Cap 480); an unstamped lease is inadmissible in evidence until duty and penalties are paid.',
      'Assess and pay stamp duty via iTax within 30 days of execution and attach the certificate.');
    add('le-esc','low','missing','No rent escalation clause','c2',
      `Rent is fixed for the ${Number(f.termYears||6)}-year term with no review mechanism.`,
      'Over a multi-year lease, flat rent shifts inflation risk to one side and invites informal renegotiation disputes.',
      'Add a periodic escalation (commonly 7.5% every 2 years) or an open-market rent review.');
  }
  if(c.template==='PS'){
    add('ps-cap','med','risk','Liability cap may be too low','c4',
      'Liability is capped at the fees paid, which for a low-fee engagement can be far below the exposure created.',
      'On audit or regulatory advice, a capped-at-fees limit may leave the Client under-protected against a costly error.',
      'Size the cap to the risk (a multiple of fees or a fixed KES amount) and carve out negligence.');
    add('ps-indep','low','missing','Independence / conflicts not addressed','c3',
      'The engagement is silent on conflicts of interest and independence.',
      'For audit and legal work, an undisclosed conflict can invalidate the work and create regulatory exposure.',
      'Add an independence and conflict-check clause with ongoing disclosure duties.');
  }
  return F;
}

const openFindings = c => !c.scan ? [] : c.scan.findings.filter(x=>!c.scan.dismissed.includes(x.id));
const worstSevOf = list => list.reduce((w,x)=>SEV_RANK[x.sev]>SEV_RANK[w]?x.sev:w,'low');
function runScan(c){
  const prev = c.scan ? c.scan.dismissed : [];
  c.scan = { at:new Date().toLocaleString('en-KE',{dateStyle:'medium',timeStyle:'short'}), findings:scanRules(c), dismissed:prev };
}

let scanUI = { running:false, filter:'all', expanded:new Set() };

function renderScanSection(c){
  const host = document.getElementById('scan-section'); if(!host) return;
  const open = openFindings(c);
  const worst = open.length ? worstSevOf(open) : null;

  let body;
  if(scanUI.running){
    body = `<div class="flex items-center gap-2.5 rounded-lg bg-brand-50 border border-brand-100 px-3 py-2.5 text-xs text-brand-700">
      <span class="scan-pulse text-brand-500">${icon('scan','w-4 h-4')}</span>
      <span>Scanning clauses against Kenyan practice checks\u2026</span></div>`;
  } else if(!c.scan){
    body = `
      <p class="text-xs text-brand-800/55 leading-relaxed">Review this contract against ${c.template==='A'?'NDA':'commercial'} risk checks tuned for Kenyan practice \u2014 missing clauses, enforceability gaps and market-norm deviations, each pinned to the clause it concerns.</p>
      <button id="scan-run" class="mt-3 w-full flex items-center justify-center gap-2 rounded-lg bg-brand-900 text-white py-2.5 text-sm font-medium hover:bg-brand-800 transition">${icon('scan')} Run AI scan</button>`;
  } else {
    const list = open.filter(x=>scanUI.filter==='all'||x.sev===scanUI.filter);
    const counts = s => open.filter(x=>x.sev===s).length;
    const chip = (key,label)=>`<button data-scan-filter="${key}" class="text-[10px] px-2 py-0.5 rounded-full border font-medium transition ${scanUI.filter===key?'bg-brand-900 text-white border-brand-900':'bg-white text-brand-700 border-brand-200 hover:border-brand-400'}">${label}</button>`;
    const cards = list.length ? list.map(x=>{
      const sm=SEV_META[x.sev], exp=scanUI.expanded.has(x.id);
      return `
      <div class="rounded-lg border ${exp?'border-brand-300':'border-brand-100'} bg-white overflow-hidden">
        <button data-scan-toggle="${x.id}" class="w-full text-left px-3 py-2.5 flex items-center gap-2 hover:bg-brand-50/50 transition">
          <span class="h-1.5 w-1.5 rounded-full ${sm.dot} shrink-0"></span>
          <span class="text-xs font-medium text-brand-900 flex-1 min-w-0 truncate">${x.title}</span>
          <span class="text-[9px] uppercase tracking-wider font-semibold ${sm.text}">${sm.label}</span>
          <span class="text-brand-300 transition ${exp?'rotate-180':''}">${icon('chevD','w-3.5 h-3.5')}</span>
        </button>
        ${exp?`
        <div class="px-3 pb-3 space-y-2 border-t border-brand-100/60 pt-2.5">
          <div><div class="text-[9px] font-semibold uppercase tracking-wider text-brand-800/45 mb-0.5">What it says</div><p class="text-[11px] leading-relaxed text-brand-800/80">${x.what}</p></div>
          <div><div class="text-[9px] font-semibold uppercase tracking-wider text-brand-800/45 mb-0.5">Why it matters</div><p class="text-[11px] leading-relaxed text-brand-800/80">${x.why}</p></div>
          <div><div class="text-[9px] font-semibold uppercase tracking-wider text-brand-800/45 mb-0.5">Suggested fix</div><p class="text-[11px] leading-relaxed text-brand-800/80">${x.fix}</p></div>
          <div class="flex items-center gap-2 pt-1">
            <button data-scan-goto="${x.anchor}" class="flex items-center gap-1 text-[11px] font-medium text-brand-600 hover:text-brand-800 transition">${icon('target','w-3 h-3')} Go to clause</button>
            <button data-scan-dismiss="${x.id}" class="ml-auto text-[11px] font-medium text-brand-800/45 hover:text-brand-800 transition">Dismiss</button>
          </div>
        </div>`:''}
      </div>`;
    }).join('') : `<div class="text-center text-[11px] text-brand-800/50 py-3">No ${scanUI.filter==='all'?'open':scanUI.filter+'-severity'} findings \u2014 looking clean.</div>`;

    body = `
      <div class="flex items-center gap-1.5 mb-2 flex-wrap">
        ${chip('all',`All ${open.length}`)}${chip('high',`High ${counts('high')}`)}${chip('med',`Med ${counts('med')}`)}${chip('low',`Low ${counts('low')}`)}
      </div>
      <div class="space-y-1.5 max-h-64 overflow-y-auto scroll-thin pr-0.5">${cards}</div>
      <div class="mt-2 flex items-center justify-between text-[10px] text-brand-800/40">
        <span>Scanned ${c.scan.at}</span>
        <button id="scan-rerun" class="font-medium text-brand-600 hover:text-brand-800 transition">Re-scan</button>
      </div>`;
  }

  host.innerHTML = `
    <div class="px-5 py-4">
      <div class="flex items-center gap-2 mb-3">
        <span class="text-gold-500">${icon('scan')}</span>
        <h3 class="text-sm font-display font-600 text-brand-900">AI Contract Scan</h3>
        ${(!scanUI.running && c.scan) ? `<span class="ml-auto inline-flex items-center gap-1.5 rounded-full border px-2 py-0.5 text-[10px] font-medium ${open.length?SEV_META[worst].chip:'bg-brand-50 text-brand-700 border-brand-200'}">${open.length?`${open.length} open`:'All clear'}</span>` : ''}
      </div>
      ${body}
    </div>`;

  // wiring
  host.querySelector('#scan-run')?.addEventListener('click',()=>{
    scanUI.running=true; renderScanSection(c);
    setTimeout(()=>{ runScan(c); scanUI.running=false; scanUI.filter='all'; scanUI.expanded=new Set();
      const n=openFindings(c).length;
      logAudit(c,'Scanned',`AI contract scan run \u2014 ${n} open finding${n===1?'':'s'}`);
      persist();
      renderScanSection(c); renderSignButton(c); renderAuditSection(c);
      toast(n?`Scan complete \u2014 ${n} finding${n===1?'':'s'} pinned to clauses`:'Scan complete \u2014 no issues found');
    }, 1100);
  });
  host.querySelector('#scan-rerun')?.addEventListener('click',()=>{
    scanUI.running=true; renderScanSection(c);
    setTimeout(()=>{ runScan(c); scanUI.running=false; persist(); renderScanSection(c); renderSignButton(c); toast('Re-scan complete \u2014 findings refreshed'); }, 700);
  });
  host.querySelectorAll('[data-scan-filter]').forEach(b=>b.addEventListener('click',()=>{ scanUI.filter=b.getAttribute('data-scan-filter'); renderScanSection(c); }));
  host.querySelectorAll('[data-scan-toggle]').forEach(b=>b.addEventListener('click',()=>{
    const id=b.getAttribute('data-scan-toggle');
    scanUI.expanded.has(id)?scanUI.expanded.delete(id):scanUI.expanded.add(id);
    renderScanSection(c);
  }));
  host.querySelectorAll('[data-scan-dismiss]').forEach(b=>b.addEventListener('click',()=>{
    c.scan.dismissed.push(b.getAttribute('data-scan-dismiss'));
    persist();
    renderScanSection(c); renderSignButton(c);
  }));
  host.querySelectorAll('[data-scan-goto]').forEach(b=>b.addEventListener('click',()=>{
    const el=document.querySelector(`#doc-canvas [data-anchor="${b.getAttribute('data-scan-goto')}"]`);
    if(!el) return;
    el.scrollIntoView({behavior:'smooth',block:'center'});
    el.classList.remove('anchor-flash'); void el.offsetWidth; el.classList.add('anchor-flash');
  }));
}

/* ============================================================
   AI ASSISTANT  (local intent engine over live state)
   ============================================================ */
const ai = { open:false, history:[] };
const AI_SUGGESTIONS = [
  'What is pending counterparty action?',
  'Total value of signed contracts',
  'Which contract has the highest value?',
  'Find contracts with Naivas',
  'How many drafts do I have?',
  'Which contracts have open risk findings?',
  'What expires in the next 90 days?',
];

function openAI(prefill){
  document.getElementById('ai-panel').classList.add('open');
  document.getElementById('ai-scrim').classList.add('open');
  ai.open=true;
  if(!ai.history.length){
    aiPush('assistant',{text:`Habari! I'm your contract intelligence assistant. I can search, aggregate and summarize everything in your Mkataba workspace — try one of the suggestions below, or ask in your own words.`});
  }
  renderAIFeed(); renderAISuggest();
  const inp=document.getElementById('ai-input');
  if(prefill){ inp.value=prefill; aiSubmit(); } else inp.focus();
}
function closeAI(){
  document.getElementById('ai-panel').classList.remove('open');
  document.getElementById('ai-scrim').classList.remove('open');
  ai.open=false;
}
function aiPush(role,payload){ ai.history.push({role,...payload}); }

function renderAISuggest(){
  const el=document.getElementById('ai-suggest');
  el.innerHTML=AI_SUGGESTIONS.map(q=>`<button data-sug="${q}" class="text-[11px] rounded-full border border-brand-100 bg-canvas hover:bg-brand-50 hover:border-brand-300 px-2.5 py-1 text-brand-700 transition">${q}</button>`).join('');
  el.querySelectorAll('[data-sug]').forEach(b=>b.addEventListener('click',()=>{ document.getElementById('ai-input').value=b.getAttribute('data-sug'); aiSubmit(); }));
}
function renderAIFeed(typing=false){
  const feed=document.getElementById('ai-feed');
  feed.innerHTML=ai.history.map(m=>{
    if(m.role==='user'){
      return `<div class="ai-msg flex justify-end"><div class="max-w-[85%] rounded-2xl rounded-br-md bg-brand-900 text-white px-4 py-2.5 text-sm">${m.text}</div></div>`;
    }
    return `<div class="ai-msg flex gap-2.5">
      <div class="h-7 w-7 shrink-0 grid place-items-center rounded-lg bg-gold-500/15 text-gold-600 mt-0.5">${icon('sparkle','w-3.5 h-3.5')}</div>
      <div class="max-w-[88%] space-y-2">
        ${m.text?`<div class="rounded-2xl rounded-tl-md bg-canvas border border-brand-100 px-4 py-2.5 text-sm text-brand-900 leading-relaxed">${m.text}</div>`:''}
        ${m.cards?m.cards:''}
      </div>
    </div>`;
  }).join('') + (typing?`
    <div class="ai-msg flex gap-2.5">
      <div class="h-7 w-7 shrink-0 grid place-items-center rounded-lg bg-gold-500/15 text-gold-600 mt-0.5">${icon('sparkle','w-3.5 h-3.5')}</div>
      <div class="rounded-2xl rounded-tl-md bg-canvas border border-brand-100 px-4 py-3 typing"><span></span><span></span><span></span></div>
    </div>`:'');
  feed.scrollTop=feed.scrollHeight;
  feed.querySelectorAll('[data-ai-open]').forEach(el=>el.addEventListener('click',()=>{ closeAI(); openWorkspace(el.getAttribute('data-ai-open')); }));
}

function aiContractCard(c){
  const t=TEMPLATES[c.template];
  return `
  <button data-ai-open="${c.id}" class="w-full text-left flex items-center gap-2.5 rounded-xl border border-brand-100 bg-white hover:border-brand-300 hover:shadow-sm px-3 py-2.5 transition group">
    <span class="h-7 w-7 shrink-0 grid place-items-center rounded-lg bg-brand-50 text-brand-500">${icon(t.ic,'w-3.5 h-3.5')}</span>
    <span class="min-w-0 flex-1">
      <span class="block text-xs font-medium text-brand-900 truncate group-hover:text-brand-600 transition">${c.name}</span>
      <span class="block text-[10px] font-mono text-brand-800/45 truncate">${c.counterparty||'—'} · ${!isMonetary(c)?'non-monetary':(c.value?fmtKESshort(c.value):'no value')}</span>
    </span>
    ${statusChip(c.status)}
