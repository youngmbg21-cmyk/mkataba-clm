<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HaTi — Contract Lifecycle Management</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=JetBrains+Mono:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<script>
  // HaTi warm-paper design system (Horizon Finance OS pivot):
  // DM Sans for interface, JetBrains Mono for IDs/values/timestamps,
  // Fraunces serif for page titles. Warm beige surfaces (Horizon light
  // theme), warm greige neutrals, and a strict colour discipline —
  // green demoted from wallpaper to accent: colour reserved for actions,
  // active state, status, severity and key metrics.
  tailwind.config = {
    theme: { extend: {
      fontFamily: {
        display: ['"DM Sans"','system-ui','sans-serif'],
        serif: ['Fraunces','Georgia','serif'],
        sans: ['"DM Sans"','system-ui','sans-serif'],
        mono: ['"JetBrains Mono"','ui-monospace','monospace'],
      },
      // numeric weight utilities — Tailwind ships only named weights
      // (medium/semibold/bold), so font-600/700/800 used across the app
      // were silently no-ops (everything rendered at 400). Make them real.
      fontWeight: {
        400:'400', 500:'500', 600:'600', 700:'700', 800:'800', 900:'900',
      },
      colors: {
        // cards & panels: warm white, not pure white (Horizon bg2)
        white:'#FDFAF6',
        canvas:'#F0EBE1',     // page ground (Horizon bg0)
        ink:'#1a1208',        // warm brown-black text (Horizon text)
        // brand greens stay — green is the accent story, not the ground.
        // 50/100 shift to sage tints so hovers/chips sit on warm paper.
        brand:{50:'#E4EFE7',100:'#C6DED0',200:'#9FD5C2',300:'#66BCA1',400:'#2E9F80',500:'#0B7A5F',600:'#086B54',700:'#075444',800:'#0A3B32',900:'#08211E'},
        gold:{300:'#EBD08C',400:'#E0BC63',500:'#C79A3E',600:'#A97D2A'},
        // warm greige neutrals (Horizon text2/text3 ramp)
        slate:{50:'#F7F3ED',100:'#F0EBE1',200:'#E4DDD2',300:'#D6CFBF',400:'#B8AD99',500:'#8a7d6a',600:'#6B5F4B',700:'#4a3f2e',800:'#31281A',900:'#1a1208'},
        // earthy red — design danger / severity high
        rose:{50:'#F4E2DD',100:'#E6C9C1',200:'#E6C9C1',300:'#DCA99D',400:'#C56555',500:'#B23A2E',600:'#9A342A',700:'#822C24',900:'#3E1712'},
        // chrome tokens, warmed (Horizon border pair)
        hair:'#E2DBCC',       // chrome hairline (rail / top-bar borders)
        line:'#D6CFBF',       // card border
        inputln:'#DCD3C0',    // input / chip / button border
        faint:'#FDFAF6',      // donut cards
        docbg:'#EDE8DF',      // workspace document canvas (Horizon bg3)
        amber:'#B0791F',      // expiring / awaiting metrics
        danger:'#C0392B',     // high-risk metric
      },
    }},
  };
</script>
<style>
  /* ---- premium design tokens (elevation, depth, motion) ---- */
  :root{
    --ring:0 0 0 1px rgba(60,40,10,.08);
    --sh1:0 1px 2px rgba(60,40,10,.06),0 1px 1px rgba(60,40,10,.04);
    --sh2:0 2px 4px rgba(60,40,10,.05),0 16px 30px -14px rgba(60,40,10,.20);
    --sh3:0 18px 40px -18px rgba(60,40,10,.24),0 6px 16px -8px rgba(60,40,10,.13);
    --sh4:0 34px 64px -26px rgba(60,40,10,.32);
    --focus:0 0 0 3px rgba(11,122,95,.20);
    --ease:cubic-bezier(.2,.7,.3,1);
  }
  html { scroll-behavior: smooth; }
  body {
    color:#1a1208; font-family:'DM Sans',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; letter-spacing:-0.006em;
    background:
      radial-gradient(1100px 560px at 86% -12%, rgba(199,154,62,.07), transparent 60%),
      linear-gradient(180deg,#F3EFE6,#EAE3D4);
    min-height:100vh;
  }
  h1,h2,h3,.font-display { letter-spacing:-0.022em; }
  /* editorial serif voice — page titles only (Horizon's "calm instrument");
     h1.font-display outranks the .font-display utility so titles stay serif */
  h1, h1.font-display { font-family:'Fraunces',Georgia,serif; letter-spacing:-0.012em; }
  a { color:#086B54; }
  ::selection { background:#C6DED0; }
  /* elevation + motion utilities */
  /* every elevated card carries a crisp hairline ring so white cards separate
     from the canvas AND nested white tiles separate from white parents */
  .elev-1{box-shadow:var(--ring),var(--sh1)} .elev-2{box-shadow:var(--ring),var(--sh2)} .elev-3{box-shadow:var(--ring),var(--sh3)} .elev-4{box-shadow:var(--ring),var(--sh4)}
  .lift{transition:transform .22s var(--ease), box-shadow .22s var(--ease), border-color .18s}
  .lift:hover{transform:translateY(-3px); box-shadow:0 0 0 1px rgba(60,40,10,.10),var(--sh3)}
  .tnum{font-variant-numeric:tabular-nums}
  button,[role=button]{transition:background .16s, color .16s, box-shadow .16s, transform .12s}
  button:active:not(:disabled){transform:translateY(.5px)}
  button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,[tabindex]:focus-visible{outline:none; box-shadow:var(--focus)}
  /* list stagger */
  .stagger>*{opacity:0; animation:rowIn .4s var(--ease) forwards}
  @keyframes rowIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  /* seal + status motion */
  .seal-pop{animation:sealPop .6s cubic-bezier(.34,1.56,.64,1) forwards}
  @keyframes sealPop{0%{opacity:0;transform:scale(1.5) rotate(-14deg)}60%{opacity:1}100%{opacity:1;transform:scale(1) rotate(-7deg)}}
  .warm-flip{animation:warmFlip .4s var(--ease)}
  @keyframes warmFlip{from{opacity:.3;transform:translateY(-3px)}to{opacity:1;transform:none}}
  /* warmer, softer scrollbar */
  .scroll-thin::-webkit-scrollbar-thumb{ background:#D6CFBF; border-radius:8px; }
  .view-enter { animation: viewIn .28s var(--ease); }
  @keyframes viewIn { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }

  /* Intel contract graph */
  #ig-svg{touch-action:none}
  .ig-link{stroke:#CDC2AB;stroke-width:1.4;fill:none;opacity:.55;transition:stroke .15s,opacity .15s,stroke-width .15s}
  .ig-link.hi{stroke:#086B54;opacity:1;stroke-width:2.2}
  .ig-link.dim{opacity:.08}
  .ig-node{cursor:pointer}
  .ig-chip{stroke:#DCD3C0;stroke-width:1.4;filter:drop-shadow(0 4px 10px rgba(60,40,10,.06));transition:stroke .15s,filter .15s}
  .ig-node.hi .ig-chip{stroke:#086B54;stroke-width:2;filter:drop-shadow(0 8px 18px rgba(60,40,10,.14))}
  .ig-node.dim{opacity:.22;transition:opacity .15s}
  .ig-lab{pointer-events:none;font-size:11.5px;font-family:'DM Sans',system-ui,sans-serif}
  .ig-sub{pointer-events:none;font-size:9px;font-family:'JetBrains Mono',monospace}
  /* lens states: mut = dimmed by an AI highlight lens (independent of hover dim);
     hit = matched by the active lens — stronger border + soft glow */
  .ig-node.mut{opacity:.28;transition:opacity .15s}
  .ig-node.hit .ig-chip{stroke:#086B54;stroke-width:2;filter:drop-shadow(0 0 7px rgba(8,107,84,.35)) drop-shadow(0 4px 10px rgba(60,40,10,.08))}
  .ig-badge-txt{pointer-events:none;font-size:8px;font-weight:700;font-family:'JetBrains Mono',monospace}
  /* right-hand AI dock */
  #ig-dock{transition:width .25s cubic-bezier(.22,.61,.36,1)}
  .ig-lens{transition:background .15s,border-color .15s,color .15s}

  .field{font-family:'JetBrains Mono',monospace;font-size:.9em;color:#075444;background:#E4EFE7;border:none;border-bottom:1.5px dashed #66BCA1;padding:1px 6px;border-radius:4px 4px 0 0;min-width:90px;transition:background .15s,border-color .15s,box-shadow .15s;outline:none;}
  .field:hover{background:#D9E8DD;}
  .field:focus{background:#fff;border-bottom-color:#0B7A5F;box-shadow:0 2px 0 0 #0B7A5F,0 0 0 3px rgba(11,122,95,.12);}
  .field.field-date{min-width:140px;} .field.field-num{text-align:right;min-width:130px;}
  .field:disabled{color:#0A3B32;background:transparent;border-bottom:1.5px solid #C6DED0;-webkit-text-fill-color:#0A3B32;opacity:1;cursor:default;font-weight:600;}

  .scroll-thin::-webkit-scrollbar{width:8px;height:8px;}
  .scroll-thin::-webkit-scrollbar-thumb{background:#D6CFBF;border-radius:8px;}
  .scroll-thin::-webkit-scrollbar-track{background:transparent;}

  .live-dot{position:relative;}
  .live-dot::after{content:'';position:absolute;inset:-4px;border-radius:9999px;background:currentColor;opacity:.4;animation:ping 1.8s cubic-bezier(0,0,.2,1) infinite;}
  @keyframes ping{75%,100%{transform:scale(2.2);opacity:0;}}

  .seal-in{animation:sealIn .5s cubic-bezier(.34,1.56,.64,1);}
  @keyframes sealIn{from{opacity:0;transform:scale(.9) rotate(-3deg);}to{opacity:1;transform:none;}}
  .toast-in{animation:toastIn .3s cubic-bezier(.22,.61,.36,1);}
  @keyframes toastIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}

  /* Icon-rail nav (warm light theme) */
  .nav-item{color:#8a7d6a;}
  .nav-item:hover{color:#075444;background:#F3EEE4;}
  .nav-item.active{background:#E4EFE7;color:#075444;}
  .nav-item.active .nav-rail{opacity:1;}
  @media (prefers-reduced-motion: reduce){ *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;} html{scroll-behavior:auto;} }

  /* AI panel slide-over */
  #ai-panel{transform:translateX(105%);transition:transform .3s cubic-bezier(.22,.61,.36,1);}
  #ai-panel.open{transform:none;}
  #ai-scrim{opacity:0;pointer-events:none;transition:opacity .25s;}
  #ai-scrim.open{opacity:1;pointer-events:auto;}
  .ai-msg{animation:viewIn .25s cubic-bezier(.22,.61,.36,1);}
  .typing span{display:inline-block;width:5px;height:5px;border-radius:9999px;background:#66BCA1;margin-right:3px;animation:blink 1.2s infinite;}
  .typing span:nth-child(2){animation-delay:.2s;} .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.25;transform:translateY(0);}40%{opacity:1;transform:translateY(-2px);}}

  .anchor-flash{animation:anchorFlash 1.8s ease;border-radius:8px;}
  @keyframes anchorFlash{0%{background:#FBF2DC;box-shadow:0 0 0 4px rgba(199,154,62,.30);}100%{background:transparent;box-shadow:0 0 0 4px transparent;}}
  .scan-pulse{animation:scanPulse 1s ease infinite;}
  @keyframes scanPulse{0%,100%{opacity:.45;}50%{opacity:1;}}

  .mlink{stroke:#CDC2AB;stroke-width:1.4;fill:none;opacity:.6;transition:stroke .15s,opacity .15s,stroke-width .15s;}
  .mlink.hi{stroke:#0B7A5F;opacity:1;stroke-width:2.2;}
  .mlink.dim{opacity:.08;}
  .mlabel{fill:#6B5F4B;font-size:9.5px;font-family:'JetBrains Mono',monospace;pointer-events:none;opacity:0;transition:opacity .15s;}
  .mlabel.show{opacity:1;}
  .mnode{cursor:pointer;}
  .mnode .chipbg{fill:#FDFAF6;stroke:#DCD3C0;stroke-width:1.4;transition:stroke .15s;}
  .mnode.hi .chipbg{stroke:#0B7A5F;stroke-width:2;}
  .mnode.sel .chipbg{stroke:#C79A3E;stroke-width:2.4;}
  .mnode.dim{opacity:.18;transition:opacity .15s;}
  #map-svg{cursor:grab;}
  #map-svg.panning{cursor:grabbing;}

  .qdot{cursor:pointer;transition:r .15s;}
  .qdot:hover{stroke:#08211E;stroke-width:2;}
  #party-scrim{opacity:0;pointer-events:none;transition:opacity .25s;}
  #party-scrim.open{opacity:1;pointer-events:auto;}

  .modal-in{animation:viewIn .2s cubic-bezier(.22,.61,.36,1);}

  /* PDF export — print only the prepared document */
  #print-root{display:none;}
  @media print{
    body>*{display:none!important;}
    #print-root{display:block!important;}
    body{background:#fff;}
  }

  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important;}}
</style>
</head>
<body class="font-sans text-brand-900 antialiased">

<div id="auth-root"></div>
<div id="share-root"></div>

<div id="app-shell" class="flex min-h-screen hidden">

  <!-- ================= ICON RAIL (84px, white) ================= -->
  <aside class="w-[84px] shrink-0 bg-white border-r border-hair flex flex-col items-center fixed inset-y-0 left-0 z-30 py-4">
    <!-- logo -->
    <div class="h-11 w-11 rounded-[13px] bg-brand-600 grid place-items-center text-white shrink-0 mb-4" id="brand-mark" title="HaTi — Contract Lifecycle"></div>

    <nav class="flex flex-col items-center gap-1 flex-1 w-full px-1" id="nav">
      <button data-view="dashboard" class="nav-item active relative w-[60px] h-[56px] rounded-xl grid place-content-center justify-items-center gap-1 transition" title="Home">
        <span class="nav-rail absolute left-0 top-2 bottom-2 w-[3px] rounded-full bg-brand-600 opacity-0 transition"></span>
        <span data-ic="grid" data-ic-cls="w-5 h-5"></span><span class="text-[9px] font-medium">Home</span>
      </button>
      <button data-view="register" class="nav-item relative w-[60px] h-[56px] rounded-xl grid place-content-center justify-items-center gap-1 transition" title="Register">
        <span class="nav-rail absolute left-0 top-2 bottom-2 w-[3px] rounded-full bg-brand-600 opacity-0 transition"></span>
        <span data-ic="list" data-ic-cls="w-5 h-5"></span><span class="text-[9px] font-medium">Register</span>
      </button>
      <button data-view="pipeline" class="nav-item relative w-[60px] h-[56px] rounded-xl grid place-content-center justify-items-center gap-1 transition" title="Queue">
        <span class="nav-rail absolute left-0 top-2 bottom-2 w-[3px] rounded-full bg-brand-600 opacity-0 transition"></span>
        <span data-ic="columns" data-ic-cls="w-5 h-5"></span><span class="text-[9px] font-medium">Queue</span>
      </button>
      <button data-view="intel" class="nav-item relative w-[60px] h-[56px] rounded-xl grid place-content-center justify-items-center gap-1 transition" title="Intel">
        <span class="nav-rail absolute left-0 top-2 bottom-2 w-[3px] rounded-full bg-brand-600 opacity-0 transition"></span>
        <span data-ic="network" data-ic-cls="w-5 h-5"></span><span class="text-[9px] font-medium">Intel</span>
      </button>
      <button data-view="workspace" class="nav-item relative w-[60px] h-[56px] rounded-xl grid place-content-center justify-items-center gap-1 transition" title="Doc">
        <span class="nav-rail absolute left-0 top-2 bottom-2 w-[3px] rounded-full bg-brand-600 opacity-0 transition"></span>
        <span data-ic="file" data-ic-cls="w-5 h-5"></span><span class="text-[9px] font-medium">Doc</span>
      </button>
      <button data-view="team" class="nav-item relative w-[60px] h-[56px] rounded-xl grid place-content-center justify-items-center gap-1 transition" title="Team">
        <span class="nav-rail absolute left-0 top-2 bottom-2 w-[3px] rounded-full bg-brand-600 opacity-0 transition"></span>
        <span data-ic="users" data-ic-cls="w-5 h-5"></span><span class="text-[9px] font-medium">Team</span>
      </button>
    </nav>

    <button id="ai-open-side" title="Ask HaTi AI" class="h-14 w-14 rounded-2xl bg-brand-600 hover:bg-brand-700 text-white grid place-content-center justify-items-center gap-0.5 transition shrink-0 mb-3">
      <span data-ic="sparkle" data-ic-cls="w-5 h-5"></span><span class="text-[9px] font-semibold">AI</span>
    </button>
    <button id="rail-avatar" title="Team &amp; settings" class="h-10 w-10 rounded-full bg-brand-50 grid place-items-center text-[11px] font-semibold text-brand-700 font-mono shrink-0 hover:ring-2 hover:ring-brand-100 transition"></button>
  </aside>

  <!-- ================= MAIN ================= -->
  <!-- viewport-fixed shell: the top bar of each view pins, the region scrolls -->
  <main class="flex-1 ml-[84px] min-w-0 h-screen overflow-hidden">
    <div id="content" class="h-full overflow-y-auto scroll-thin"></div>
  </main>
</div>

<!-- ================= AI ASSISTANT (slide-over) ================= -->
<div id="ai-scrim" class="fixed inset-0 bg-brand-900/30 backdrop-blur-[2px] z-40"></div>
<section id="ai-panel" class="fixed top-0 right-0 bottom-0 w-full max-w-[430px] bg-brand-50 z-50 flex flex-col border-l border-inputln shadow-2xl shadow-brand-900/20">
  <header class="px-5 py-4 flex items-center gap-3 bg-ink text-white">
    <div class="h-9 w-9 rounded-xl bg-gold-500 text-brand-900 grid place-items-center shrink-0" data-ic-big="sparkle"></div>
    <div class="flex-1 leading-tight">
      <div class="font-display font-600">HaTi AI</div>
      <div class="text-[11px] text-brand-200 flex items-center gap-1.5"><span class="h-1.5 w-1.5 rounded-full bg-brand-300 live-dot"></span>Searching your live contract data</div>
    </div>
    <button id="ai-close" class="h-8 w-8 grid place-items-center rounded-lg hover:bg-white/10 transition text-brand-100" data-ic-big="x"></button>
  </header>

  <div id="ai-feed" class="flex-1 overflow-y-auto scroll-thin px-5 py-4 space-y-4"></div>

  <div id="ai-suggest" class="px-5 pb-2 flex flex-wrap gap-1.5"></div>

  <footer class="px-5 pb-5 pt-3 border-t border-inputln">
    <div class="flex items-center gap-2">
      <input id="ai-input" type="text" placeholder="Search, summarize, or ask about your contracts…" class="flex-1 rounded-xl border border-inputln bg-white px-3.5 py-2.5 text-sm outline-none focus:border-brand-600 focus:ring-[3px] focus:ring-[rgba(11,122,95,.1)] transition"/>
      <button id="ai-send" class="h-10 w-10 shrink-0 grid place-items-center rounded-xl bg-brand-600 text-white hover:bg-brand-700 transition" data-ic-big="send"></button>
    </div>
  </footer>
</section>

<div id="modal-root"></div>
<div id="toast-root" class="fixed bottom-6 right-6 z-[60] space-y-2"></div>
<div id="print-root"></div>

<script>
/* ============================================================ ICONS */
const ICONS = {
  grid:'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>',
  file:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/>',
  folder:'<path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/>',
  folderOpen:'<path d="m6 14 1.5-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.54 6a2 2 0 0 1-1.95 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H18a2 2 0 0 1 2 2v2"/>',
  plus:'<path d="M12 5v14M5 12h14"/>',
  search:'<circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>',
  users:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  check2:'<path d="M20 6 9 17l-5-5"/>',
  seal:'<path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M12 2 4 6v6c0 5 3.5 8 8 10 4.5-2 8-5 8-10V6z"/>',
  ban:'<circle cx="12" cy="12" r="10"/><path d="m4.9 4.9 14.2 14.2"/>',
  clock:'<circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>',
  chevR:'<path d="m9 18 6-6-6-6"/>',
  list:'<path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>',
  columns:'<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 3v18"/>',
  calendar:'<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>',
  msg:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
  send:'<path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/>',
  lock:'<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
  shield:'<path d="M20 13c0 5-3.5 7.5-7.7 9a1 1 0 0 1-.6 0C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.2-2.7a1 1 0 0 1 1.6 0C14.5 3.8 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/>',

async function sha256(str){
  try{ const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
    return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(e){ let h=0; for(let i=0;i<str.length;i++){h=(h*31+str.charCodeAt(i))>>>0;} return h.toString(16).padStart(8,'0').repeat(8).slice(0,64); }
}
const generatePseudo = seed => { let h=0; for(const ch of seed) h=(h*33+ch.charCodeAt(0))>>>0; return h.toString(16).padStart(60,'0').slice(0,60); };

/* ============================================================

   static page. Every load/store function below is the seam

const LS = { org:'hati.v1.org', users:'hati.v1.users', session:'hati.v1.session', data:'hati.v1.data', ui:'hati.v1.ui' };
const lsGet = k => { try{ return JSON.parse(localStorage.getItem(k)); }catch(e){ return null; } };
const lsSet = (k,v) => localStorage.setItem(k, JSON.stringify(v));

/* ---------- optional backend (API mode) ----------
   When served by server/server.js the app stores everything on the
   server (multi-user, multi-device). Opened as a plain static page,
   it falls back to this browser's localStorage. */
let REMOTE=null; // {org, me, users} when a HaTi server is present
const API_MODE=()=>!!REMOTE;
async function api(path, method='GET', body){
  const res=await fetch('api/'+path,{ method,
    headers:body?{'Content-Type':'application/json'}:undefined,
    body:body?JSON.stringify(body):undefined, credentials:'same-origin' });
  let data=null; try{ data=await res.json(); }catch(e){}
  if(!res.ok) throw new Error(data?.error||('Request failed ('+res.status+')'));
  return data;
}
async function loadBootstrap(){
  const b=await api('bootstrap');
  REMOTE={ org:b.org, me:b.me, users:b.users };
  uid=b.uid||uid; state.settings=b.settings||{}; state.totalCount=b.count||0; state.aiConfigured=!!b.aiConfigured;
  // Load contract SUMMARIES (heavy fields stripped) in pages — full bodies load
  // on open. Capped so a very large portfolio can't blow up the initial load.
  state.contracts=[]; let offset=0; const limit=200; let total=Infinity;
  while(offset<total && state.contracts.length<5000){
    const pg=await api('contracts?limit='+limit+'&offset='+offset);
    total=pg.total;
    pg.rows.forEach(r=>{ const c=migrateContract(r); c._light=true; c._loaded=false; c._v=r._v; state.contracts.push(c); });
    if(!pg.rows.length) break;
    offset+=pg.rows.length;
  }
  state.truncated = total>state.contracts.length;
  // screen position is per-device, not shared with teammates
  const ui=lsGet(LS.ui)||{};
  state.view=ui.view||'dashboard';
  state.activeId=(ui.activeId&&state.contracts.some(c=>c.id===ui.activeId))?ui.activeId:null;
  state.folderId=ui.folderId||null;
  if(state.view==='workspace'&&!state.activeId) state.view='dashboard';
}

/* ---------- persistence (per-contract at scale) ----------
   API mode saves ONE contract at a time, each with its own optimistic-lock
   version — so an edit never re-sends the whole portfolio and a teammate's
   change to a different contract can't be clobbered. Static mode keeps the
   single-blob localStorage model. */
const dirty=new Map(); let saveTimer=null;
function persist(c){
  if(API_MODE()){
    lsSet(LS.ui,{ view:state.view, activeId:state.activeId, folderId:state.folderId });
    if(!canEdit()) return;              // server rejects viewer writes
    if(c && c.id){ dirty.set(c.id,c); clearTimeout(saveTimer); saveTimer=setTimeout(flushSaves,400); }
    return;
  }
  lsSet(LS.data, { uid, contracts:state.contracts, settings:state.settings, view:state.view, activeId:state.activeId, folderId:state.folderId });
}
async function flushSaves(){
  const items=[...dirty.values()]; dirty.clear();
  for(const c of items){ await saveContract(c); }
  refreshStats();  // keep portfolio KPIs current after status/value changes
}
async function saveContract(c){
  const payload={...c}; delete payload._light; delete payload._loaded; delete payload._v;
  if(payload.upload && payload.upload.fileId){ payload.upload={...payload.upload, dataUrl:undefined}; }
  try{
    const r=await api('contracts/'+c.id,'PUT',{ contract:payload, baseVersion:c._v||0, uid });
    c._v=r.version; c._loaded=true; c._light=false;
  }catch(e){
    if(/conflict|version/i.test(e.message)){
      toast('This contract changed on the server — reloading it','err');
      try{ const fresh=await api('contracts/'+c.id); Object.assign(c,fresh); c._v=fresh._v; c._loaded=true; c._light=false;
        if(state.activeId===c.id) renderWorkspace(); }catch(_){}
    } else toast('Save failed: '+e.message,'err');
  }
}

function hydrate(){
  const d = lsGet(LS.data);
  if(d && Array.isArray(d.contracts)){
    uid = d.uid || uid;
    state.contracts = d.contracts.map(migrateContract);
    state.settings = d.settings || {};
    state.view = d.view || 'dashboard';
    state.activeId = d.activeId || null;
    state.folderId = d.folderId || null;
  }
  else state.contracts = state.contracts.map(migrateContract);
}
function migrateContract(c){
  return Object.assign({ audit:[], signatures:[], comments:[], fields:{}, scan:null,
    compliance:{}, hash:null, signedAt:null, expiry:null, execution:null, approval:null, rounds:[] }, c);
}

/* ---------- approvals (spend-threshold sign-off) ---------- */
const DEFAULT_APPROVAL={ threshold:5000000, approverRole:'admin' };
const getApprovalCfg=()=>Object.assign({}, DEFAULT_APPROVAL, (state.settings&&state.settings.approval)||{});
function approvalState(c){
  const cfg=getApprovalCfg();
  const required = Number(cfg.threshold)>0 && isMonetary(c) && Number(c.value)>=Number(cfg.threshold) && c.status!=='Signed';
  const me=currentUser();
  const canApprove = !!me && (me.role==='admin' || (cfg.approverRole==='legal' && me.role==='legal'));
  const approverLabel = cfg.approverRole==='legal' ? 'an Admin or Legal approver' : 'an Admin';
  return { required, ok: !required || !!c.approval, threshold:Number(cfg.threshold),
    by:c.approval?.by, approverLabel, canApprove };
}
function approveContract(c){
  if(!approvalState(c).canApprove){ toast('You do not have approver rights','err'); return; }
  const u=currentUser();
  c.approval={ by:u.name, byId:u.id, role:ROLE_LABEL[u.role], at:nowISO() };
  logAudit(c,'Approved',`Approved for signing by ${u.name} (${ROLE_LABEL[u.role]})`);
  persist(c); renderSignButton(c); renderAuditSection(c);
  toast('Contract approved — signing unlocked');
}

/* ---------- audit trail ---------- */
function logAudit(c, action, detail, actor){
  c.audit = c.audit || [];
  const user = actor || currentUser()?.name || 'System';
  const last = c.audit[c.audit.length-1];
  // coalesce rapid repeats (e.g. keystrokes on the same field) into one entry
  if(last && last.action===action && last.detail===detail && last.user===user
     && (Date.now()-new Date(last.at).getTime())<60000){ last.at=nowISO(); return; }
  c.audit.push({ at:nowISO(), user, action, detail });
}

            ${r.status==='open'?(canEdit()?`
              <div class="mt-2 flex items-center gap-2">

            :`<div class="mt-1.5 text-[11px] font-medium ${r.resolution?.decision==='accepted'?'text-brand-600':'text-rose-600'}">${r.resolution?.decision==='accepted'?'Accepted':'Rejected'} by ${r.resolution?.by||'—'} · ${r.resolution?fmtDT(r.resolution.at):''}</div>`}
          </div>`).join('')}

      <p class="mt-2 text-[10px] text-brand-800/60">After resolving, re-share the updated document to send the next round.</p>

  host.querySelectorAll('[data-nego-accept]').forEach(b=>b.addEventListener('click',()=>resolveRound(c,Number(b.getAttribute('data-nego-accept')),true)));
  host.querySelectorAll('[data-nego-reject]').forEach(b=>b.addEventListener('click',()=>resolveRound(c,Number(b.getAttribute('data-nego-reject')),false)));
}
function resolveRound(c, n, accept){
  if(!canEdit()){ toast('Viewers cannot resolve negotiation rounds','err'); return; }
  const r=(c.rounds||[]).find(x=>x.n===n); if(!r||r.status!=='open') return;
  const u=currentUser();
  r.status='closed'; r.resolution={ decision:accept?'accepted':'rejected', by:u.name, at:nowISO() };
  if(accept && r.proposedValue!=null){
    c.value=Number(r.proposedValue);
    c.approval=null; // value changed — any prior approval is void
  }
  logAudit(c,'Negotiation',`Round ${n} ${accept?'accepted':'rejected'} by ${u.name}${accept&&r.proposedValue!=null?` — value set to KES ${Number(r.proposedValue).toLocaleString('en-KE')}`:''}`);
  persist(c); renderWorkspace();
  toast(`Round ${n} ${accept?'accepted':'rejected'}`);
}

/* ---------- document sealing ----------
   For a generated contract the seal covers the field values; for an uploaded
   ("inbound") document it covers the file's own hash, so the seal proves
   exactly which file you signed. */
// Used only for the share-link doc fingerprint (change detection).
const canonicalDoc = c => isUpload(c)
  ? JSON.stringify({ id:c.id, source:'upload', fileName:c.upload?.fileName, fileHash:c.upload?.fileHash,
      firstParty:FIRST_PARTY, counterparty:c.counterparty, value:c.value })
  : JSON.stringify({ id:c.id, template:c.template, name:c.name,
      firstParty:FIRST_PARTY, counterparty:c.counterparty, value:c.value, valueType:c.valueType, fields:c.fields });

/* Evidence-grade sealing:
   at signature we FREEZE the fully-rendered contract text (values baked in),
   hash that exact text, and from then on the workspace renders the frozen
   copy — so what was sealed is always what is shown. The seal binds the
   frozen text (or, for uploads, the file bytes) to the parties and value. */
function freezeContractHtml(c){
  const tmp=document.createElement('div');
  tmp.innerHTML=docBody(c);
  tmp.querySelectorAll('.seal-in,[data-anchor="sig"]').forEach(el=>el.remove());
  tmp.querySelectorAll('input,textarea').forEach(inp=>{
    const s=document.createElement('span');
    s.className='font-mono font-semibold text-brand-900';
    s.textContent=(inp.value||'').trim()||'—';
    inp.replaceWith(s);
  });
  return tmp.innerHTML;
}
const normText = html => { const d=document.createElement('div'); d.innerHTML=html||''; return (d.textContent||'').replace(/\s+/g,' ').trim(); };
function sealString(c){
  const content = isUpload(c) ? 'file:'+(c.upload?.fileHash||'') : 'text:'+(c.execution?.textHash||'');
  return JSON.stringify({ id:c.id, firstParty:FIRST_PARTY, counterparty:c.counterparty,
    value:c.value, valueType:c.valueType, content, signedAt:c.execution?.at||'' });
}

async function verifySeal(c){
  if(!c.hash){ toast('Document is not sealed yet','err'); return; }
  if(c.hash==='PRE-SEEDED'){ toast('Sample contract — sealed before evidence hashing existed','err'); return; }
  if(!isUpload(c)){
    if(!c.execution?.html){ toast('No frozen snapshot on this record','err'); return; }
    const th=await sha256(normText(c.execution.html));
    if(th!==c.execution.textHash){ toast('Seal MISMATCH — the sealed text was altered','err'); return; }
  }
  const h=await sha256(sealString(c));
  if(h===c.hash) toast(isUpload(c)?'Seal valid — file and parties are intact':'Seal valid — sealed text, parties and value are intact');
  else toast('Seal MISMATCH — the record changed after signing','err');
}
function downloadFile(name, content, type='application/json'){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=name; a.click(); URL.revokeObjectURL(a.href);
}
function downloadEvidence(c){
  downloadFile(`${c.id}-evidence-pack.json`, JSON.stringify({
    generatedAt:nowISO(), platform:'HaTi CLM', org:FIRST_PARTY,
    legalBasis:'Electronic signature under the Business Laws (Amendment) Act 2020 (Kenya).',
    disclosure:'Government IPRS identity verification and CAK-accredited PKI signatures are not yet integrated.',
    contract:{ id:c.id, name:c.name, type:cKind(c), counterparty:c.counterparty,
      value:c.value, valueType:c.valueType, status:c.status },
    seal:{ sha256:c.hash, signedAt:c.signedAt,
      sealedTextSha256:c.execution?.textHash||null,
      sealedFileSha256:isUpload(c)?(c.upload?.fileHash||null):null,
      sealedText:isUpload(c)?null:normText(c.execution?.html||''),
      uploadedFile:isUpload(c)?{ name:c.upload?.fileName, size:c.upload?.size }:null },
    signatures:(c.signatures||[]).map(s=>({ party:s.party, name:s.name, email:s.email||null,
      method:s.method||null, ip:s.ip||null, userAgent:s.ua||null, at:s.at })),
    auditTrail:c.audit||[],
  },null,2));
  logAudit(c,'Exported','Evidence pack downloaded'); persist(c); renderAuditSection(c);
  toast('Evidence pack downloaded');

const b64e = obj => btoa(unescape(encodeURIComponent(JSON.stringify(obj)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
const b64d = str => { try{ return JSON.parse(decodeURIComponent(escape(atob(String(str).trim().replace(/-/g,'+').replace(/_/g,'/'))))); }catch(e){ return null; } };

async function applyResponse(c, r, opts={}){
  if(!r || r.kind!=='hati-response'){ if(!opts.background) toast('That code is not a valid HaTi response','err'); return false; }
  if(r.id!==c.id){ toast(`This response is for ${r.id}, not ${c.id}`,'err'); return false; }
  const currentHash=await sha256(canonicalDoc(c));
  if(r.docHash && r.docHash!==currentHash && r.docHash!==c.hash)
    toast('Note: the document changed after this share link was created','err');
  const who=r.name+(r.title?', '+r.title:'');
  if(r.action==='sign'){
    c.signatures=c.signatures||[];
    c.signatures.push({ party:'counterparty', name:r.name, title:r.title||'', email:r.email||'', at:r.at,
      method:r.method||'share-link', ip:r.ip||null, docHash:r.docHash });
    c.comments.push({ author:r.name, role:'Counterparty — Signed', side:'external', text:r.comment||'Approved and signed via secure share link.', ts:fmtDT(r.at) });
    logAudit(c,'Countersigned',`${who} signed via share link (${r.method||'share-link'})`);
    toast(`${r.name} has signed — countersignature recorded`);
  } else if(r.action==='changes'){
    c.comments.push({ author:r.name, role:'Counterparty — Changes requested', side:'external', text:r.comment, ts:fmtDT(r.at) });
    c.rounds=c.rounds||[];
    c.rounds.push({ n:c.rounds.length+1, at:r.at, by:who, comment:r.comment,
      proposedValue:(r.proposedValue!=null&&r.proposedValue!=='')?Number(r.proposedValue):null,
      status:'open', resolution:null });
    logAudit(c,'Changes requested',`${who} requested changes${r.proposedValue?` (proposed value KES ${Number(r.proposedValue).toLocaleString('en-KE')})`:''}`);
    toast(`${r.name} requested changes — review in Negotiation`);
  } else if(r.action==='decline'){
    c.status='Declined';
    c.comments.push({ author:r.name, role:'Counterparty — Declined', side:'external', text:r.comment, ts:fmtDT(r.at) });
    logAudit(c,'Declined',`${who} declined via share link`);
    toast(`${r.name} declined the agreement`,'err');
  } else { if(!opts.background) toast('Unknown response type','err'); return false; }
  c.lastAction=todayStr(); persist(c);
  if(opts.background) setView(state.view||'dashboard'); else renderWorkspace();
  return true;
}

/* poll the server for counterparty responses and apply them */
async function pollPendingResponses(){
  if(!API_MODE() || !canEdit()) return;
  try{
    const list=await api('shares/pending');
    for(const item of list){
      const c=getContract(item.response?.id);
      if(!c) continue;
      const ok=await applyResponse(c, item.response, {background:true});
      if(ok) await api('shares/'+item.token+'/applied','POST');
    }
  }catch(e){ /* transient network issues — next poll retries */ }
}

async function portalRespond(p, action){
  const name=fval('pt-name'), title=fval('pt-title'), email=fval('pt-email'), comment=fval('pt-comment');

  if(action!=='sign' && !comment){ toast('Add a comment explaining your response','err'); return; }
  // Server-backed signing: verify the signer's email with a one-time code first.
  if(action==='sign' && PORTAL_OPTS.token){ return portalStartOtp(p, {name,title,email,comment}); }
  const proposedValue = action==='changes' ? fval('pt-proposed') : '';
  const response={ v:1, kind:'hati-response', id:p.contract.id, docHash:p.docHash, action, name, title, email, comment,
    proposedValue: proposedValue||null, at:nowISO() };
  const label={sign:'signature',changes:'change request',decline:'decline notice'}[action];
  if(PORTAL_OPTS.token){
    try{
      await api('shares/'+PORTAL_OPTS.token+'/respond','POST',response);
      document.getElementById('portal-result').innerHTML=`
        <div class="rounded-xl border border-brand-200 bg-brand-50 p-4 text-center">

        </div>`;
    }catch(e){ toast(e.message,'err'); }
    return;
  }
  const code=b64e(response);
  document.getElementById('portal-result').innerHTML=`
    <div class="rounded-xl border border-brand-200 bg-brand-50 p-3.5">
      <div class="flex items-center gap-1.5 text-brand-700 text-xs font-semibold mb-1.5">${icon('check2','w-3.5 h-3.5')} Your ${label} is ready</div>
      <p class="text-[11px] text-brand-800/70 mb-2">Copy this response code and send it back to ${p.sharedBy} at ${p.org} (email or WhatsApp). They import it in HaTi to record it on the contract.</p>

    try{ await navigator.clipboard.writeText(ta.value); }catch(e){ document.execCommand('copy'); }
    toast('Response code copied');
  });
}

async function portalVerifyAndSign(p, info){
  const codeVal=fval('pt-otp');
  if(!/^\d{6}$/.test(codeVal)){ toast('Enter the 6-digit code','err'); return; }
  let verify;
  try{ const v=await api('shares/'+PORTAL_OPTS.token+'/verify-otp','POST',{ email:info.email, code:codeVal }); verify=v.verify; }
  catch(e){ toast(e.message,'err'); return; }
  const response={ v:1, kind:'hati-response', id:p.contract.id, docHash:p.docHash, action:'sign',
    name:info.name, title:info.title, email:info.email, comment:info.comment, verify, at:nowISO() };
  try{
    await api('shares/'+PORTAL_OPTS.token+'/respond','POST',response);
    document.getElementById('portal-result').innerHTML=`

      </div>`;
  }catch(e){ toast(e.message,'err'); }
}

function metrics(){
  // Prefer server-computed aggregates (accurate at any scale, even when the
  // client only holds a capped working set); fall back to the in-memory set.
  const s=state.serverStats;
  if(s) return { totalValue:s.totalValue||0, pending:s.pending||0, signed:s.signed||0, declined:s.declined||0, drafts:s.drafts||0 };
  const cs=state.contracts, active=cs.filter(c=>c.status!=='Declined');
  return {
    totalValue:active.reduce((s,c)=>s+Number(c.value||0),0),
    pending:cs.filter(c=>c.status==='Under Review').length,
    signed:cs.filter(c=>c.status==='Signed').length,
    declined:cs.filter(c=>c.status==='Declined').length,
    drafts:cs.filter(c=>c.status==='Draft').length,
  };
}
async function refreshStats(){
  if(!API_MODE()) return;
  try{ state.serverStats=await api('stats'); if(state.view==='dashboard') renderDashboard(); }catch(e){}
}

    <span class="hidden sm:block text-xs font-mono whitespace-nowrap ${isMonetary(c)?'text-brand-900':'text-brand-800/60'}" ${!isMonetary(c)?'title="Non-monetary agreement"':''}>${!isMonetary(c)?'n/m':(c.value?fmtKESshort(c.value):'—')}</span>

function wireOpens(root=document){
  root.querySelectorAll('[data-open]').forEach(el=>el.addEventListener('click',()=>openWorkspace(el.getAttribute('data-open'))));
}

/* ============================================================
   VIEW: DASHBOARD (lean — attention queue + folders, no giant table)
   ============================================================ */
function renderDashboard(){
  const cs=state.contracts;
  const m=metrics();
  const countAll = (state.serverStats && state.serverStats.total!=null) ? state.serverStats.total : cs.length;

  // ---- per-stage counts & values (design "Portfolio by stage") ----
  const STAGE_DEF=[
    {k:'Draft',        label:'Drafting',  color:'#9A9484'},
    {k:'Under Review', label:'In Review', color:'#C79A3E'},
    {k:'Signed',       label:'Executed',  color:'#086B54'},
    {k:'Declined',     label:'Closed',    color:'#B23A2E'},
  ];
  const valOf = arr => arr.reduce((s,c)=>s+Number(c.value||0),0);
  const stages = STAGE_DEF.map(s=>{ const list=cs.filter(c=>c.status===s.k); return {...s, n:list.length, val:valOf(list)}; });
  const stageTotal = stages.reduce((s,x)=>s+x.n,0)||1;

  // ---- attention slices ----
  const expiring = cs.filter(c=>c.expiry && c.status!=='Declined')
    .map(c=>({c, d:daysUntil(c.expiry)})).filter(x=>x.d>=0 && x.d<=90).sort((a,b)=>a.d-b.d);
  const highRisk = cs.map(c=>({c, o:openFindings(c).filter(f=>f.sev==='high').length, r:riskScore(c)}))
    .filter(x=>x.o>0).sort((a,b)=>b.r-a.r);
  const idleOf = c => Math.max(0, Math.floor((Date.now()-new Date(c.lastAction))/86400000));
  const waiting = cs.filter(c=>c.status==='Under Review')
    .map(c=>({c, idle:idleOf(c)})).sort((a,b)=>b.idle-a.idle);

  const kpis=[
    {label:'Contracts under management', val:Number(countAll).toLocaleString('en-KE'), ic:'file',  bg:'#EEF2F0', color:'#5B6B64', num:'#08211E', go:{stage:'all'}},
    {label:'Active portfolio value',     val:fmtKESshort(m.totalValue),               ic:'coins', bg:'#E4EFE7', color:'#086B54', num:'#086B54', go:{stage:'all',sort:'value'}},
    {label:'Awaiting counterparty',      val:Number(m.pending).toLocaleString('en-KE'),ic:'clock', bg:'#F0E6CF', color:'#8A5E1B', num:'#B0791F', go:{stage:'Under Review'}},
    {label:'Expiring within 90 days',    val:Number(expiring.length).toLocaleString('en-KE'), ic:'calendar', bg:'#F0E6CF', color:'#8A5E1B', num:'#B0791F', go:{stage:'Signed',sort:'expiry'}},
    {label:'High-risk open findings',    val:Number(highRisk.length).toLocaleString('en-KE'), ic:'alert', bg:'#F4E2DD', color:'#9A342A', num:'#C0392B', go:{stage:'all'}},
  ];
  const kpiHtml = kpis.map((k,i)=>`
    <button data-kpi="${i}" class="text-left bg-white rounded-2xl elev-2 lift px-4 py-3.5" style="animation:rowIn .45s var(--ease) both;animation-delay:${i*45}ms">
      <span class="h-[32px] w-[32px] grid place-items-center rounded-lg mb-2.5" style="background:${k.bg};color:${k.color}">${icon(k.ic,'w-[15px] h-[15px]')}</span>
      <div class="font-display font-800 text-[25px] tracking-[-0.035em] leading-none tnum" style="color:${k.num}">${k.val}</div>
      <div class="text-[11px] font-500 text-ink/70 mt-2">${k.label}</div>
    </button>`).join('');

  // segmented stage bar
  const segBar = stages.map(s=>`<span style="width:${(s.n/stageTotal*100).toFixed(2)}%;background:${s.color}" class="h-2.5 first:rounded-l-full last:rounded-r-full"></span>`).join('');
  const stageCards = stages.map(s=>`
    <button data-stage="${s.k}" class="group flex items-center justify-between gap-2 rounded-xl bg-white elev-2 lift px-4 py-3.5 text-left">
      <span class="min-w-0">
        <span class="flex items-center gap-2"><span class="h-2 w-2 rounded-full" style="background:${s.color}"></span><span class="text-sm font-medium text-brand-900">${s.label}</span></span>

    </button>`).join('');

  // donut: 88px conic-gradient ring with a white 11px-inset inner circle (per spec)
  const donut=(count,pct,color)=>{ const deg=(Math.min(100,Math.max(0,pct))*3.6).toFixed(1);
    return `<div class="relative shrink-0" style="width:88px;height:88px;border-radius:9999px;background:conic-gradient(${color} ${deg}deg,#E4DDD2 0deg)">
      <div class="absolute inset-[11px] rounded-full bg-white grid place-content-center text-center">
        <div class="font-display font-700 leading-none" style="font-size:22px;color:#08211E">${count}</div>

  const snap=[
    {go:{stage:'Signed',sort:'expiry'}, donut:donut(expiring.length, countAll?expiring.length/countAll*100:0, '#B0791F'), title:'Expiring ≤ 90 days', sub:`${expiring.length} of ${Number(countAll).toLocaleString('en-KE')} contracts`},

  // New-contract menu (templates + upload)

  document.getElementById('content').innerHTML = `

        <div>
          <h1 class="font-display font-700 text-[26px] tracking-tight text-ink">Portfolio</h1>

/* ============================================================
   VIEW: FOLDER (filtered register + local search)
   ============================================================ */
function renderFolder(){
  const f=FOLDERS[state.folderId];
  if(!f){ setView('dashboard'); return; }
  const q=state.folderQuery.trim().toLowerCase();
  let cs=folderContracts(f.id);
  if(q) cs=cs.filter(c=>(c.name+' '+c.counterparty+' '+c.id).toLowerCase().includes(q));
  const val=cs.filter(c=>c.status!=='Declined').reduce((s,c)=>s+Number(c.value||0),0);

  document.getElementById('content').innerHTML=`
  <div class="view-enter">
    <header class="sticky top-0 z-20 bg-white/70 backdrop-blur-xl border-b border-hair">
      <div class="px-8 py-4 flex items-center justify-between gap-4">
        <div class="flex items-center gap-3 min-w-0">
          <button id="back-dash" class="h-9 w-9 grid place-items-center rounded-lg border border-brand-100 bg-white text-brand-700 hover:bg-brand-50 transition shrink-0">${icon('arrowLeft')}</button>
          <span class="h-9 w-9 grid place-items-center rounded-lg bg-brand-900 text-gold-400 shrink-0">${icon(f.ic)}</span>
          <div class="min-w-0">
            <h1 class="font-display font-700 text-lg tracking-tight text-brand-900 truncate">${f.name}</h1>
            <p class="text-[11px] font-mono text-brand-800/65">${cs.length} contracts · ${fmtKESshort(val)} active value</p>
          </div>
        </div>
        <div class="flex items-center gap-2 rounded-xl border border-brand-100 bg-white px-3 py-2 w-72 focus-within:border-brand-400 focus-within:ring-2 focus-within:ring-brand-100 transition">
          ${icon('search','w-4 h-4 text-brand-800/60')}
          <input id="folder-search" value="${state.folderQuery.replace(/"/g,'&quot;')}" type="text" placeholder="Search in this folder…" class="flex-1 text-sm outline-none bg-transparent"/>
        </div>
      </div>
    </header>

    <div class="px-8 py-6 max-w-[1000px]">
      <section class="bg-white rounded-2xl elev-2 overflow-hidden">${folderListHtml(cs)}</section>
    </div>
  </div>`;

  wireOpens();
  document.getElementById('back-dash').addEventListener('click',()=>setView('dashboard'));
  const si=document.getElementById('folder-search');
  si.addEventListener('input',()=>{ state.folderQuery=si.value; state.folderShown=FOLDER_PAGE; renderFolderListOnly(); });
  si.focus(); si.setSelectionRange(si.value.length,si.value.length);
  wireFolderMore();
  setActiveNav('folder');
}
const FOLDER_PAGE=50;
// Render only up to state.folderShown rows, with a "Show more" pager — so a
// folder with hundreds of contracts never dumps them all into the DOM at once.
function folderListHtml(cs){
  if(!cs.length) return `
    <div class="px-5 py-10 text-center">
      <div class="mx-auto h-12 w-12 grid place-items-center rounded-xl bg-canvas border border-brand-100 text-brand-300 mb-3">${icon('search','w-5 h-5')}</div>
      <div class="text-sm font-medium text-brand-900">No contracts match "${state.folderQuery}"</div>
      <div class="text-xs text-brand-800/70 mt-1">Clear the search, or ask HaTi AI to look across all folders.</div>
    </div>`;
  const shown=Math.min(cs.length, state.folderShown||FOLDER_PAGE);
  const rows=cs.slice(0,shown).map(c=>contractRow(c)).join('');
  const more = cs.length>shown
    ? `<button id="folder-more" class="w-full px-5 py-3 text-xs font-medium text-brand-600 hover:bg-brand-50 border-t border-brand-100/60 transition">Show more — ${cs.length-shown} of ${cs.length} remaining</button>`
    : '';
  return rows+more;
}
function wireFolderMore(){
  document.getElementById('folder-more')?.addEventListener('click',()=>{ state.folderShown=(state.folderShown||FOLDER_PAGE)+FOLDER_PAGE; renderFolderListOnly(); });
}
// re-render only list body on keystroke (keeps input focus)
function renderFolderListOnly(){
  const f=FOLDERS[state.folderId]; if(!f) return;
  const q=state.folderQuery.trim().toLowerCase();
  let cs=folderContracts(f.id);
  if(q) cs=cs.filter(c=>(c.name+' '+c.counterparty+' '+c.id).toLowerCase().includes(q));
  const section=document.querySelector('#content section');
  if(!section) return;
  section.innerHTML = folderListHtml(cs);
  wireOpens(section); wireFolderMore();
}

/* ============================================================
   INBOUND / UPLOADED CONTRACTS  ("their paper")
   A received document is stored as a file and wrapped in the same
   review → scan → sign → audit workflow as generated contracts.
   ============================================================ */
const upField=(id,label,ph,type='text')=>`<label class="block"><span class="text-xs font-medium text-brand-800/70">${label}</span><input id="${id}" type="${type}" placeholder="${ph}" class="mt-1 w-full rounded-lg border border-brand-100 bg-canvas px-3 py-2 text-sm outline-none focus:border-brand-400"/></label>`;

/* ---------- document text extraction (client-side, no external service) ----------
   Uses the browser's built-in DecompressionStream to inflate FlateDecode PDF
   streams, then pulls the text-showing strings. Works for standard text PDFs
   and .txt; image-only PDFs / Word fall back to the manual checklist. */
async function inflateBytes(bytes){
  for(const fmt of ['deflate','deflate-raw']){
    try{ const ds=new DecompressionStream(fmt);
      const stream=new Blob([bytes]).stream().pipeThrough(ds);
      return new Uint8Array(await new Response(stream).arrayBuffer());
    }catch(e){}
  }
  return null;
}
function pdfStringsFrom(content){
  const res=[]; const re=/\(((?:\\.|[^()\\])*)\)/g; let m;
  while((m=re.exec(content))){
    res.push(m[1].replace(/\\(\d{1,3})/g,(_,o)=>String.fromCharCode(parseInt(o,8))).replace(/\\([()\\nrt])/g,(x,c)=>({n:'\n',r:'',t:' '}[c]??c)));
  }
  return res.join(' ');
}
async function extractPdfText(buf){
  const bytes=new Uint8Array(buf);
  let bin=''; for(let i=0;i<bytes.length;i++) bin+=String.fromCharCode(bytes[i]);
  const out=[]; const re=/stream\r?\n([\s\S]*?)\r?\nendstream/g; let m;
  while((m=re.exec(bin))){
    const raw=m[1];
    const arr=Uint8Array.from(raw,ch=>ch.charCodeAt(0)&0xff);
    const inf=await inflateBytes(arr);
    let text; if(inf){ text=''; for(let i=0;i<inf.length;i++) text+=String.fromCharCode(inf[i]); } else text=raw;
    if(/\bTj\b|\bTJ\b|\bBT\b/.test(text)) out.push(pdfStringsFrom(text));
  }
  return out.join(' ').replace(/\s+/g,' ').trim();
}
async function extractDocText(dataUrl, mime){
  try{
    if(/text\//.test(mime)){ return (await (await fetch(dataUrl)).text()).slice(0,40000); }
    if(/pdf/.test(mime)){ const buf=await (await fetch(dataUrl)).arrayBuffer(); return (await extractPdfText(buf)).slice(0,40000); }
  }catch(e){}
  return '';
}
// Heuristic clause analysis over the REAL extracted text — quotes verbatim.
function sentenceAround(text, idx){
  let s=text.lastIndexOf('.',idx); s=s<0?Math.max(0,idx-140):s+1;
  let e=text.indexOf('.',idx); e=e<0?Math.min(text.length,idx+220):e+1;
  return text.slice(s,e).replace(/\s+/g,' ').trim().slice(0,260);
}
function findingsFromText(c, text){
  const F=[]; const low=text.toLowerCase();
  const add=(id,sev,kind,title,quote,why,fix,conf)=>F.push({id,sev,kind,title,anchor:'doc',confidence:conf,
    what:quote?`The document reads: “${quote}”`:'(clause not located in the extracted text)', why, fix});
  const firstIdx=(...ks)=>{ for(const k of ks){ const i=low.indexOf(k); if(i>=0) return i; } return -1; };
  // 1) governing law — scan ALL candidate mentions and pick the one that names a
  //    jurisdiction (a ref-line like "governing law as stated below" is ignored).
  const foreign=['switzerland','geneva','england','wales','united kingdom','london','delaware','new york','singapore','dubai','u.a.e','uae','netherlands','paris','france','uganda','tanzania','rwanda','south africa'];
  const govKeys=['governing law','governed by the laws','laws of the republic','exclusive jurisdiction','jurisdiction of','arbitration seated','arbitration in','governed by'];
  const cands=[]; for(const k of govKeys){ let i=low.indexOf(k); while(i>=0){ cands.push(i); i=low.indexOf(k,i+1); } }
  let foreignSen=null,foreignHit=null,kenyaSen=null;
  for(const idx of [...new Set(cands)].sort((a,b)=>a-b)){ const sen=sentenceAround(text,idx), sl=sen.toLowerCase();
    const fh=foreign.find(f=>sl.includes(f)), hk=sl.includes('kenya');
    if(fh&&!hk&&!foreignSen){ foreignSen=sen; foreignHit=fh; }
    if(hk&&!kenyaSen) kenyaSen=sen;
  }
  if(foreignSen) add('t-law','high','risk','Foreign governing law detected',foreignSen,
    `A ${foreignHit.replace(/\b\w/g,x=>x.toUpperCase())} governing law or forum makes enforcement slow and costly for a Kenyan business and may bypass Kenyan protections.`,
    'Negotiate Kenyan governing law and forum, or budget for foreign enforcement before signing.','high');
  else if(kenyaSen) add('t-law','low','ambiguity','Governing law: Kenya (found in text)',kenyaSen,
    'Kenyan governing law keeps enforcement local and predictable.','No change needed — confirm the forum (courts vs. arbitration) suits you.','high');
  else add('t-law','med','missing','Governing law / jurisdiction not clearly stated','',
    'No clause naming a governing law or forum was found in the extracted text.','Every high-value or cross-border contract needs a clear governing law and forum.','Locate or add the governing-law clause and confirm it names Kenya.','low');
  // 2) payment terms
  const pm=low.match(/(?:within|net)\s*(\d{1,3})\s*days/);
  if(pm){ const i=low.indexOf(pm[0]), d=Number(pm[1]);
    add('t-pay', d>45?'med':'low', d>45?'risk':'ambiguity', `Payment terms: ${d} days`, sentenceAround(text,i),
      d>45?`${d}-day terms tie up working capital and raise exposure if the payer delays.`:'Payment terms look within a healthy range.',
      d>45?'Negotiate toward 30–45 days, or price the extended terms into the deal.':'Confirm this matches what was agreed.','high'); }
  // 3) auto-renewal
  const ar=low.search(/auto(?:matically)?[\s-]*renew|renews?\s+automatically/);
  if(ar>=0) add('t-renew','med','risk','Automatic renewal clause',sentenceAround(text,ar),
    'Auto-renewing contracts with long notice windows are a common way to get locked in.',
    'Confirm the renewal is intended and the exit notice period is workable.','high');
  // 4) termination notice
  const tn=low.match(/(\d{1,3})\s*days'?\s*(?:written\s*)?notice/);
  if(tn){ const i=low.indexOf(tn[0]); add('t-term','low','ambiguity',`Termination notice: ${tn[1]} days`,sentenceAround(text,i),
    'The exit notice period sets how quickly you can walk away.','Confirm the notice period is acceptable for your exposure.','high'); }
  // 5) liability / indemnity
  const li=firstIdx('limitation of liability','total liability','liability is limited','liability shall','indemnif');
  if(li>=0) add('t-liab','med','risk','Liability / indemnity — review carefully',sentenceAround(text,li),
    'Counterparty paper often caps their liability low and pushes broad indemnities onto you.',
    'Confirm the cap is mutual and reasonable and indemnities are limited to their fault.','medium');
  // 6) stamp duty for leases
  if((low.includes('lease')||low.includes('landlord')||low.includes('tenant')) && !low.includes('stamp duty'))
    add('t-stamp','med','risk','Lease with no stamp-duty provision','',
      'An unstamped lease is inadmissible in evidence in Kenya until duty and penalties are paid (Stamp Duty Act, Cap 480).',
      'Ensure stamp duty is assessed and paid via iTax within 30 days of execution.','medium');
  // 7) data protection for corporate/IT paper
  if(c.folder==='corp' && !/(data protection|data processing|personal data|odpc)/.test(low))
    add('t-dp','low','missing','No data-protection terms detected','',
      'Under the Data Protection Act 2019 you remain responsible for how vendors process personal data.',
      'Confirm a data-processing / DPA clause with ODPC-aligned obligations is included.','low');
  return F;
}

async function submitUpload(){
  const fileInput=document.getElementById('up-file');
  const file=fileInput.files&&fileInput.files[0];
  if(!file){ toast('Choose a file to upload','err'); return; }
  if(file.size>UPLOAD_MAX){ toast('File is larger than 4 MB — please compress or split it','err'); return; }
  const cp=fval('up-cp');
  const name=fval('up-name')||file.name.replace(/\.[^.]+$/,'');
  const folder=document.getElementById('up-folder').value;
  const vtype=document.getElementById('up-vtype').value;
  const value=vtype==='none'?0:Number(fval('up-value')||0);
  const expiry=fval('up-expiry')||null;
  const btn=document.getElementById('up-go'); btn.disabled=true; btn.innerHTML='<span class="animate-pulse">Reading document…</span>';
  const dataUrl=await new Promise((res,rej)=>{ const rd=new FileReader(); rd.onload=()=>res(rd.result); rd.onerror=()=>rej(new Error('read failed')); rd.readAsDataURL(file); }).catch(()=>null);
  if(!dataUrl){ toast('Could not read that file','err'); return; }
  const fileHash=await sha256(dataUrl);
  const mime=file.type||'application/octet-stream';
  const extractedText=await extractDocText(dataUrl, mime);   // real text extraction
  const u=currentUser();
  const upload={ fileName:file.name, mime, size:file.size, fileHash, uploadedAt:nowISO(), uploadedBy:u?.name||'System',
    extractedText, textChars:extractedText.length, dataUrl };
  // API mode: store bytes on the server and keep only a reference in the synced record.
  if(API_MODE()){
    try{ const r=await api('files','POST',{ name:file.name, mime, dataUrl });
      upload.fileId=r.id; }catch(e){ /* fall back to inline bytes */ }
  }
  const c={ id:nextId(), name, counterparty:cp, value, status: cp?'Under Review':'Draft',
    template:null, source:'upload', folder, valueType:vtype,
    lastAction:todayStr(), expiry, hash:null, signedAt:null, signatory:u?.name||'Authorized signatory',
    compliance:{},
    comments:[{author:'System',role:'Automation',side:'internal',text:`Uploaded “${file.name}”, received from ${cp||'a counterparty'} and filed under ${FOLDERS[folder].name}.${extractedText.length>200?` ${extractedText.length.toLocaleString()} characters of text extracted for AI review.`:''} Review and sign to record acceptance.`,ts:fmtDT(nowISO())}],
    fields:{}, scan:null,
    audit:[{at:nowISO(),user:u?.name||'System',action:'Uploaded',detail:`Received “${file.name}” (${Math.round(file.size/1024)} KB)${extractedText.length>200?`, ${extractedText.length.toLocaleString()} chars extracted`:', no text extracted'}`}],
    signatures:[], upload };
  c._loaded=true; c._light=false; c._v=0;
  state.contracts.unshift(c);
  state.activeId=c.id;
  persist(c);
  closeModal();
  toast('Contract uploaded and filed in '+FOLDERS[folder].name);
  setView('workspace');
  renderSideFolders();
}

  // a generous reading surface: fills the viewport height, with an Expand
  // control that opens the document near-fullscreen for comfortable review
  const canPreview = isPdf||isText||isImg;
  const previewHead = canPreview ? `
    <div class="flex items-center justify-between gap-2 mb-2">
      <div class="text-[11px] font-600 uppercase tracking-[0.14em] text-brand-800/60">Document preview</div>
      <button type="button" data-expand-doc class="inline-flex items-center gap-1.5 rounded-lg border border-brand-200 bg-white px-2.5 py-1.5 text-[11px] font-600 text-brand-700 hover:border-brand-400 hover:text-brand-900 transition">${icon('expand','w-3.5 h-3.5')} Expand</button>

    ? `<iframe id="uploaded-doc-frame" src="${u.dataUrl}" class="w-full h-[calc(100vh-235px)] min-h-[560px] rounded-xl border border-brand-100 bg-white elev-1" title="Uploaded document"></iframe>`
    : isImg
    ? `<div class="rounded-xl border border-brand-100 bg-white elev-1 overflow-auto max-h-[calc(100vh-235px)] min-h-[420px] grid place-items-start"><img id="uploaded-doc-frame" src="${u.dataUrl}" class="max-w-full" alt="Uploaded document"/></div>`
    : `<div class="rounded-xl border border-dashed border-brand-200 bg-brand-50/40 p-10 text-center">
         <div class="text-brand-300 mb-2 flex justify-center">${icon('file','w-8 h-8')}</div>
         <div class="text-sm font-600 text-brand-800/80">${u.fileName||'Document'}</div>
         <div class="text-xs text-brand-800/65 mt-1">Word documents can't preview in the browser — download the original to review it.</div>
       </div>`);
  const sizeKB = u.size?Math.round(u.size/1024):0;
  return `
    <div class="mb-6 pb-5 border-b border-brand-100">
      <div class="text-[10px] font-mono uppercase tracking-[0.2em] text-brand-800/60 mb-2">External Document · received · ${c.id}</div>
      <h3 class="font-display font-700 text-lg tracking-tight text-brand-900">${c.name}</h3>
    </div>
    <div class="mb-5 flex items-start gap-2 rounded-lg bg-gold-500/10 border border-gold-500/25 px-3 py-2.5 text-[11px] text-gold-700" data-anchor="doc">
      ${icon('upload','w-3.5 h-3.5 mt-0.5 shrink-0')}<span>This is a contract <strong>received from ${c.counterparty||'a counterparty'}</strong>, on their own paper. Review it below, run the AI review, then sign to record <strong>${FIRST_PARTY}</strong>’s acceptance with a cryptographic seal.</span>
    </div>
    <div class="mb-4 grid sm:grid-cols-2 gap-2 text-[11px]">
      <div class="rounded-lg bg-white border border-brand-100 p-2.5"><div class="text-brand-800/65 uppercase tracking-wider text-[10px] mb-0.5">Original file</div><div class="font-medium text-brand-900 truncate">${u.fileName||'—'} · ${sizeKB} KB</div></div>
      <div class="rounded-lg bg-white border border-brand-100 p-2.5"><div class="text-brand-800/65 uppercase tracking-wider text-[10px] mb-0.5">Uploaded</div><div class="font-medium text-brand-900 truncate">${u.uploadedBy||'—'} · ${u.uploadedAt?fmtDT(u.uploadedAt):'—'}</div></div>
    </div>
    <div class="mb-4 flex flex-wrap items-center gap-2">
      <a href="${u.dataUrl}" download="${(u.fileName||'contract').replace(/"/g,'')}" class="inline-flex items-center gap-1.5 rounded-lg border border-brand-200 bg-white px-3 py-2 text-xs font-medium text-brand-700 hover:bg-brand-50 transition">${icon('download','w-3.5 h-3.5')} Download original</a>
      <span class="inline-flex items-center gap-1.5 rounded-lg border ${u.textChars>200?'border-brand-100 bg-brand-50/50 text-brand-700':'border-gold-500/25 bg-gold-500/10 text-gold-700'} px-3 py-2 text-[11px]">${icon('scan','w-3.5 h-3.5')}${u.textChars>200?`${Number(u.textChars).toLocaleString()} characters read — AI review analyses the actual text`:'Text not machine-readable — AI review falls back to a manual checklist'}</span>
    </div>

// near-fullscreen reader for a received document — the reading surface the
// inline preview can't give inside the split workspace
function openDocReader(url, name){
  if(!url) return;
  const prev=document.getElementById('doc-reader'); if(prev) prev.remove();
  const isImg=/^data:image\//.test(url);
  const body=isImg
    ? `<div class="flex-1 min-h-0 overflow-auto bg-docbg grid place-items-start p-4"><img src="${url}" class="max-w-full mx-auto" alt="${(name||'Document').replace(/"/g,'')}"/></div>`
    : `<iframe src="${url}" class="flex-1 min-h-0 w-full bg-white" title="${(name||'Document').replace(/"/g,'')}"></iframe>`;
  const ov=document.createElement('div');
  ov.id='doc-reader';
  ov.className='fixed inset-0 z-[80] bg-ink/60 backdrop-blur-sm flex flex-col p-3 sm:p-6';
  ov.style.animation='viewIn .2s var(--ease)';
  ov.innerHTML=`
    <div class="mx-auto w-full max-w-[1100px] flex-1 min-h-0 flex flex-col bg-white rounded-2xl elev-4 overflow-hidden">
      <div class="shrink-0 flex items-center justify-between gap-3 px-5 py-3 border-b border-hair">
        <div class="min-w-0 flex items-center gap-2.5">
          <span class="h-8 w-8 grid place-items-center rounded-lg bg-brand-50 text-brand-600 shrink-0">${icon('file','w-4 h-4')}</span>
          <div class="min-w-0"><div class="text-sm font-700 text-brand-900 truncate">${name||'Document'}</div><div class="text-[11px] text-brand-800/60">Received document · full-screen reader</div></div>
        </div>
        <div class="flex items-center gap-2 shrink-0">
          <a href="${url}" download="${(name||'contract').replace(/"/g,'')}" class="hidden sm:inline-flex items-center gap-1.5 rounded-lg border border-brand-200 bg-white px-3 py-2 text-xs font-600 text-brand-700 hover:bg-brand-50 transition">${icon('download','w-3.5 h-3.5')} Download</a>
          <button type="button" data-close-reader class="inline-flex items-center gap-1.5 rounded-lg bg-brand-900 text-white px-3 py-2 text-xs font-600 hover:bg-brand-800 transition">${icon('close','w-3.5 h-3.5')} Close</button>
        </div>
      </div>
      ${body}
    </div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.querySelector('[data-close-reader]').addEventListener('click',close);
  ov.addEventListener('click',e=>{ if(e.target===ov) close(); });
  document.addEventListener('keydown',function esc(e){ if(e.key==='Escape'){ close(); document.removeEventListener('keydown',esc);} });
}

function uploadScanRules(c){
  const F=[]; const add=(id,sev,kind,title,what,why,fix)=>F.push({id,sev,kind,title,anchor:'doc',what,why,fix});
  // metadata checks (always)
  if(!c.counterparty) add('u-cp','high','missing','Counterparty not recorded',
    'No counterparty name is recorded against this uploaded document.',
    'A signed contract with no recorded party is hard to enforce and clutters the register.',
    'Add the counterparty’s full registered name (as on the BRS certificate) in the deal details.');
  if(isMonetary(c) && !(Number(c.value)>0)) add('u-val','med','missing','Contract value not recorded',
    'The value field is empty for a document marked as monetary.',
    'Value drives approval thresholds, stamp-duty assessment and portfolio reporting.',
    'Record the agreed KES value, or mark the contract non-monetary if none passes.');

  const text=(c.upload&&c.upload.extractedText)||'';
  if(text.length>200){
    // real analysis over the extracted text
    findingsFromText(c, text).forEach(f=>F.push(f));
  } else {
    // image-only PDF / Word / extraction failed → honest manual checklist
    add('u-noext','low','missing','Document text could not be read automatically',
      'This file did not yield extractable text (a scanned image, or a Word file). The points below are a manual checklist, not a read of the clauses.',
      'Image-only PDFs and Word documents need OCR or conversion before automated clause review.',
      'Upload a text-based PDF for clause-level AI review, or review the document manually.');
    add('u-law','med','risk','Confirm governing law is Kenyan',
      'Confirm the governing-law and jurisdiction clause names Kenya.',
      'A foreign governing law or arbitration seat makes enforcement slow and expensive for a Kenyan business.',
      'Find the governing-law clause and confirm Kenya and a Kenyan forum; negotiate if not.');
    add('u-liab','med','risk','Check liability cap & indemnities',
      'Counterparty paper often caps their liability low and pushes broad indemnities onto you.',
      'An unbalanced liability/indemnity split can expose you well beyond the deal value.',
      'Confirm the cap is mutual and reasonable and indemnities are limited to their fault.');
    add('u-term','low','ambiguity','Confirm term, renewal & exit',
      'Check the term length, any automatic renewal, and your notice period to exit.',
      'Auto-renewing contracts with long notice periods are a common way to get locked in.',
      'Confirm renewal is acceptable and the exit notice period is workable.');
  }
  // always — honest disclaimer
  add('u-legal','low','missing','Have qualified counsel review before signing',
    'This AI review flags common issues but is not legal advice and cannot catch everything.',
    'External paper is drafted for the other side; a clause-by-clause read by a lawyer catches what heuristics miss.',
    'Obtain independent legal review before signing where the value or risk is material.');
  return F;
}

function docBody(c){
  if(isUpload(c)) return uploadDocBody(c);
  if(c.status==='Signed' && c.execution && c.execution.html) return frozenDocBody(c);
  const t=TEMPLATES[c.template];
  const locked=c.status==='Signed'||PORTAL_MODE||!canEdit();
  const dis=locked?'disabled':'';
  const fDate=(id,val)=>`<input ${dis} type="date" value="${val||''}" data-field="${id}" class="field field-date"/>`;
  const fText=(id,val,ph='')=>`<input ${dis} type="text" value="${val||''}" placeholder="${ph}" data-field="${id}" class="field"/>`;
  const fNum=(id,val,ph='')=>`<input ${dis} type="number" value="${val??''}" placeholder="${ph}" data-field="${id}" class="field field-num"/>`;
  const CP=`<input ${dis} type="text" value="${(c.counterparty||'').replace(/"/g,'&quot;')}" placeholder="Counterparty name" data-sync="counterparty" class="field"/>`;
  const VAL=`<input ${dis} type="number" value="${c.value||''}" placeholder="0" data-sync="value" class="field field-num"/>`;
  const clause=(n,title,body)=>`<div class="mb-5 px-2 -mx-2 py-1" data-anchor="c${n}"><h4 class="font-display font-600 text-brand-900 text-[13px] mb-1.5">${n}. ${title}</h4><p class="text-[13.5px] leading-[1.85] text-brand-800/85">${body}</p></div>`;
  const f=c.fields;
  const D=id=>fDate(id,f[id]);                    // date field
  const T=(id,ph)=>fText(id,f[id],ph);            // text field
  const N=(id,def,ph)=>fNum(id,(f[id]??def),ph);  // number field (with default)

  // Each builder returns { title, recital, clauses[] }. Clause 'c2' holds the
  // contract value for most types (NDA has no value; scanRules mirrors this).
  const BUILD = {
    RM:()=>({ title:'RAW MATERIAL SUPPLY AGREEMENT',
      recital:`This Raw Material Supply Agreement is made on ${D('effDate')} between <strong>${FIRST_PARTY}</strong> (the "Buyer") and ${CP} (the "Supplier") for the supply of ${T('material','e.g. refined sugar')} into the Buyer's production facilities in Kenya.`,
      clauses:[
        clause(1,'Supply & Specification',`The Supplier shall supply an estimated ${N('volume',5000)} metric tonnes per annum meeting the agreed specification and the applicable KEBS/EAS standard, delivered DDP to the Buyer's plant.`),
        clause(2,'Price & Contract Value',`The estimated annual contract value is KES ${VAL}, based on agreed per-tonne pricing reviewed quarterly against published commodity indices. Prices are exclusive of VAT.`),
        clause(3,'Quality & Rejection',`Consignments failing specification or Public Health / KEBS requirements may be rejected within ${N('inspectDays',3)} days of delivery, with replacement at the Supplier's cost.`),

function signatureBlock(c){
  const locked=c.status==='Signed';
  if(locked){
    const hashDisplay=c.hash&&c.hash!=='PRE-SEEDED'?c.hash:('sample-'+generatePseudo(c.id).slice(0,32));
    const first=(c.signatures||[]).find(s=>s.party==='first');
    const cp=(c.signatures||[]).find(s=>s.party==='counterparty');
    const sub=s=>`<div class="text-[10px] text-brand-800/65 font-normal leading-snug">${[s.email,s.method,s.at?fmtDT(s.at):'',s.ip?'IP '+s.ip:''].filter(Boolean).join(' · ')}</div>`;
    const party=(label,ic,s,fallback)=>`<div class="rounded-lg bg-white border border-brand-100 p-2.5">
      <div class="text-brand-800/65 uppercase tracking-wider text-[10px] mb-1 flex items-center gap-1">${icon(ic,'w-3 h-3')} ${label}</div>
      ${s?`<div class="font-medium text-brand-700">${s.name}${s.title?', '+s.title:''}</div>${sub(s)}`:`<div class="text-brand-800/60 text-xs">${fallback}</div>`}</div>`;
    return `
    <div class="seal-in mt-8 rounded-2xl elev-3 bg-gradient-to-br from-brand-50 to-white p-6">
      <div class="flex items-start gap-4">
        <svg class="seal-pop shrink-0" width="62" height="62" viewBox="0 0 96 96" style="filter:drop-shadow(0 6px 14px rgba(60,40,10,.18))">
          <circle cx="48" cy="48" r="46" fill="#fff"/>
          <circle cx="48" cy="48" r="46" fill="none" stroke="#086B54" stroke-width="2"/>
          <circle cx="48" cy="48" r="38" fill="rgba(8,107,84,.10)" stroke="#C79A3E" stroke-width="1.5"/>
          <text x="48" y="45" text-anchor="middle" font-family="'DM Sans',sans-serif" font-weight="700" font-size="12.5" fill="#086B54">SEALED</text>
          <text x="48" y="58" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="7" fill="#075444">SHA-256</text>
        </svg>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 warm-flip"><span class="font-display font-700 text-[17px] text-ink">Executed &amp; Sealed</span>${statusChip('Signed')}</div>
          <div class="mt-1 text-xs text-brand-800/60">Electronic signatures under the Business Laws (Amendment) Act 2020 (Kenya).</div>
          <div class="mt-3 grid sm:grid-cols-2 gap-3 text-xs">
            ${party('First party', 'finger', first||(c.signatory?{name:c.signatory,method:'session-authenticated',at:c.execution?.at}:null), 'Not recorded')}
            ${party('Counterparty', 'users', cp, 'Pending — share the document to collect a verified counter-signature')}
          </div>
          ${!isUpload(c)?`<div class="mt-3 rounded-lg bg-white border border-brand-100 p-2.5"><div class="text-brand-800/65 uppercase tracking-wider text-[10px] mb-1">Sealed text fingerprint (SHA-256)</div><div class="font-mono text-[10px] break-all text-brand-700">${c.execution?.textHash||'—'}</div></div>`:''}
          <div class="mt-3 rounded-lg bg-brand-900 p-3 font-mono text-[11px] leading-relaxed">
            <div class="flex items-center gap-1.5 text-gold-400 mb-1">${icon('hash','w-3 h-3')} DOCUMENT SEAL (SHA-256)</div>
            <div class="text-brand-100 break-all">${hashDisplay}</div>
            <div class="text-brand-300 mt-1.5">${c.signedAt||'Timestamp recorded'}</div>
          </div>
          <div class="mt-2 text-[10px] text-brand-800/60 leading-snug">Signer identity is verified by account session (first party) and email one-time code (counterparty). Government IPRS identity and CAK-accredited PKI are on the roadmap and not yet active.</div>
        </div>
      </div>
    </div>`;
  }
  return `
    <div class="mt-8 rounded-xl border border-dashed border-brand-200 bg-brand-50/30 p-5 text-center" data-anchor="sig">
      <div class="text-brand-300 mb-2 flex justify-center">${icon('finger','w-6 h-6')}</div>

      <div class="text-xs text-brand-800/65 mt-0.5">Confirm intent to sign from the panel on the right.</div>
    </div>`;
}

const REL_SEEDS = [ // name-matched so IDs stay dynamic \u2014 traces the value stream
  { from:'Refined Sugar Supply \u2014 Confectionery Line', to:'Co-Packing \u2014 Powdered Beverages', label:'feeds' },
  { from:'Co-Packing \u2014 Powdered Beverages', to:'Modern Trade Listing & Supply', label:'supplies' },
  { from:'Raw Milk Collection \u2014 Rift Valley Co-ops', to:'Cold-Chain Storage \u2014 Dairy & Chilled', label:'stored via' },
  { from:'Central Warehouse & 3PL \u2014 Industrial Area', to:'Last-Mile Distribution \u2014 Western Region', label:'feeds' },
  { from:'Regional Distributor \u2014 Nyanza', to:'Modern Trade Listing & Supply', label:'overlaps' },
  { from:'Crude Edible Oil Supply', to:'Tolling Agreement \u2014 Detergent Powder', label:'feeds' },
  { from:'Mutual NDA \u2014 New Product Development', to:'Contract Manufacturing \u2014 Bar Soap', label:'precedes' },
];
const STATUS_BAR = {'Draft':'#94a3b8','Under Review':'#C79A3E','Signed':'#0B7A5F','Declined':'#f43f5e'};
const KIND_TAG = {proc:{t:'PROC',c:'#2E9F80'},mfg:{t:'MFG',c:'#b45309'},dist:{t:'DIST',c:'#0369a1'},sales:{t:'SALES',c:'#C79A3E'},mktg:{t:'MKTG',c:'#7c3aed'},corp:{t:'CORP',c:'#0B7A5F'},party:{t:'PARTY',c:'#08211E'}};

function buildGraph(){
  const nodes=[], edges=[];
  const trunc=(s,n=24)=>s.length>n?s.slice(0,n-1)+'\u2026':s;
  // contract nodes
  state.contracts.forEach(c=>{
    nodes.push({ id:c.id, type:'contract', c, label:trunc(c.name), sub:c.id+' \u00b7 '+(c.value?fmtKESshort(c.value):'\u2014'),
      kind:c.folder, bar:STATUS_BAR[c.status], w:0,h:0,x:0,y:0 });
  });
  // party nodes (aggregate)
  const parties={};
  state.contracts.forEach(c=>{ if(!c.counterparty) return;
    (parties[c.counterparty]||(parties[c.counterparty]=[])).push(c); });
  Object.entries(parties).forEach(([name,cs])=>{
    const val=cs.filter(x=>x.status!=='Declined').reduce((s,x)=>s+Number(x.value||0),0);
    nodes.push({ id:'p:'+name, type:'party', party:name, cs, label:trunc(name), sub:cs.length+' deal'+(cs.length===1?'':'s')+' \u00b7 '+fmtKESshort(val),
      kind:'party', bar:'#08211E', w:0,h:0,x:0,y:0 });
    cs.forEach(c=>edges.push({from:c.id, to:'p:'+name, label:'party to'}));
  });
  // seeded contract-to-contract relations
  REL_SEEDS.forEach(r=>{
    const a=state.contracts.find(c=>c.name===r.from), b=state.contracts.find(c=>c.name===r.to);
    if(a&&b) edges.push({from:a.id, to:b.id, label:r.label});
  });
  const byId=Object.fromEntries(nodes.map(n=>[n.id,n]));
  edges.forEach(e=>{e.s=byId[e.from]; e.t=byId[e.to];});
  const adj={}; nodes.forEach(n=>adj[n.id]=new Set());
  edges.forEach(e=>{adj[e.from].add(e.to); adj[e.to].add(e.from);});
  return {nodes, edges, adj};
}

function layoutGraph(nodes, edges, W, H){
  let seed=11; const rnd=()=>{seed=(seed*1103515245+12345)&0x7fffffff; return seed/0x7fffffff;};
  const groups=[...Object.keys(FOLDERS),'party'];
  const gA={}; groups.forEach((g,i)=>gA[g]=i/groups.length*Math.PI*2 - Math.PI/3);
  nodes.forEach(n=>{
    if(state.mapPos[n.id]){ n.x=state.mapPos[n.id].x; n.y=state.mapPos[n.id].y; n.pinned=true; return; }
    const a=gA[n.kind]+(rnd()-.5)*1.1, r=Math.min(W,H)*(n.type==='party'?0.18:0.34);
    n.x=W/2+Math.cos(a)*r+(rnd()-.5)*40; n.y=H/2+Math.sin(a)*r+(rnd()-.5)*40;
  });
  for(let it=0; it<340; it++){
    const cool=1-it/340;
    for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++){
      const a=nodes[i],b=nodes[j];
      let dx=a.x-b.x, dy=a.y-b.y; const d2=dx*dx+dy*dy+1, d=Math.sqrt(d2);
      const rep=Math.min(28, 14000/d2)*cool;
      dx/=d; dy/=d;
      if(!a.pinned){a.x+=dx*rep; a.y+=dy*rep;} if(!b.pinned){b.x-=dx*rep; b.y-=dy*rep;}
    }
    edges.forEach(e=>{
      let dx=e.t.x-e.s.x, dy=e.t.y-e.s.y; const d=Math.sqrt(dx*dx+dy*dy)+.01;
      const f=(d-165)*0.02*cool; dx/=d; dy/=d;
      if(!e.s.pinned){e.s.x+=dx*f*d*0.01+dx*f; e.s.y+=dy*f;} if(!e.t.pinned){e.t.x-=dx*f; e.t.y-=dy*f;}
    });
    nodes.forEach(n=>{ if(n.pinned) return;
      n.x+=(W/2-n.x)*0.006; n.y+=(H/2-n.y)*0.006;
      n.x=Math.max(110,Math.min(W-110,n.x)); n.y=Math.max(70,Math.min(H-70,n.y)); });
  }
}
