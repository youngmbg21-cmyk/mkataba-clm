<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HaTi — Contract Lifecycle Management</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=JetBrains+Mono:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<script>
  // HaTi warm-paper design system (Horizon Finance OS pivot):
  // DM Sans for interface, JetBrains Mono for IDs/values/timestamps,
  // Fraunces serif for page titles. Warm beige surfaces (Horizon light
  // theme), warm greige neutrals, and a strict colour discipline —
  // green demoted from wallpaper to accent: colour reserved for actions,
  // active state, status, severity and key metrics.
  tailwind.config = {
    theme: { extend: {
      fontFamily: {
        display: ['"DM Sans"','system-ui','sans-serif'],
        serif: ['Fraunces','Georgia','serif'],
        sans: ['"DM Sans"','system-ui','sans-serif'],
        mono: ['"JetBrains Mono"','ui-monospace','monospace'],
      },
      // numeric weight utilities — Tailwind ships only named weights
      // (medium/semibold/bold), so font-600/700/800 used across the app
      // were silently no-ops (everything rendered at 400). Make them real.
      fontWeight: {
        400:'400', 500:'500', 600:'600', 700:'700', 800:'800', 900:'900',
      },
      colors: {
        // cards & panels: warm white, not pure white (Horizon bg2)
        white:'#FDFAF6',
        canvas:'#F0EBE1',     // page ground (Horizon bg0)
        ink:'#1a1208',        // warm brown-black text (Horizon text)
        // brand greens stay — green is the accent story, not the ground.
        // 50/100 shift to sage tints so hovers/chips sit on warm paper.
        brand:{50:'#E4EFE7',100:'#C6DED0',200:'#9FD5C2',300:'#66BCA1',400:'#2E9F80',500:'#0B7A5F',600:'#086B54',700:'#075444',800:'#0A3B32',900:'#08211E'},
        gold:{300:'#EBD08C',400:'#E0BC63',500:'#C79A3E',600:'#A97D2A'},
        // warm greige neutrals (Horizon text2/text3 ramp)
        slate:{50:'#F7F3ED',100:'#F0EBE1',200:'#E4DDD2',300:'#D6CFBF',400:'#B8AD99',500:'#8a7d6a',600:'#6B5F4B',700:'#4a3f2e',800:'#31281A',900:'#1a1208'},
        // earthy red — design danger / severity high
        rose:{50:'#F4E2DD',100:'#E6C9C1',200:'#E6C9C1',300:'#DCA99D',400:'#C56555',500:'#B23A2E',600:'#9A342A',700:'#822C24',900:'#3E1712'},
        // chrome tokens, warmed (Horizon border pair)
        hair:'#E2DBCC',       // chrome hairline (rail / top-bar borders)
        line:'#D6CFBF',       // card border
        inputln:'#DCD3C0',    // input / chip / button border
        faint:'#FDFAF6',      // donut cards
        docbg:'#EDE8DF',      // workspace document canvas (Horizon bg3)
        amber:'#B0791F',      // expiring / awaiting metrics
        danger:'#C0392B',     // high-risk metric
      },
    }},
  };
</script>
<style>
  /* ---- premium design tokens (elevation, depth, motion) ---- */
  :root{
    --ring:0 0 0 1px rgba(60,40,10,.08);
    --sh1:0 1px 2px rgba(60,40,10,.06),0 1px 1px rgba(60,40,10,.04);
    --sh2:0 2px 4px rgba(60,40,10,.05),0 16px 30px -14px rgba(60,40,10,.20);
    --sh3:0 18px 40px -18px rgba(60,40,10,.24),0 6px 16px -8px rgba(60,40,10,.13);
    --sh4:0 34px 64px -26px rgba(60,40,10,.32);
    --focus:0 0 0 3px rgba(11,122,95,.20);
    --ease:cubic-bezier(.2,.7,.3,1);
  }
  html { scroll-behavior: smooth; }
  body {
    color:#1a1208; font-family:'DM Sans',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; letter-spacing:-0.006em;
    background:
      radial-gradient(1100px 560px at 86% -12%, rgba(199,154,62,.07), transparent 60%),
      linear-gradient(180deg,#F3EFE6,#EAE3D4);
    min-height:100vh;
  }
  h1,h2,h3,.font-display { letter-spacing:-0.022em; }
  /* editorial serif voice — page titles only (Horizon's "calm instrument");
     h1.font-display outranks the .font-display utility so titles stay serif */
  h1, h1.font-display { font-family:'Fraunces',Georgia,serif; letter-spacing:-0.012em; }
  a { color:#086B54; }
  ::selection { background:#C6DED0; }
  /* elevation + motion utilities */
  /* every elevated card carries a crisp hairline ring so white cards separate
     from the canvas AND nested white tiles separate from white parents */
  .elev-1{box-shadow:var(--ring),var(--sh1)} .elev-2{box-shadow:var(--ring),var(--sh2)} .elev-3{box-shadow:var(--ring),var(--sh3)} .elev-4{box-shadow:var(--ring),var(--sh4)}
  .lift{transition:transform .22s var(--ease), box-shadow .22s var(--ease), border-color .18s}
  .lift:hover{transform:translateY(-3px); box-shadow:0 0 0 1px rgba(60,40,10,.10),var(--sh3)}
  .tnum{font-variant-numeric:tabular-nums}
  button,[role=button]{transition:background .16s, color .16s, box-shadow .16s, transform .12s}
  button:active:not(:disabled){transform:translateY(.5px)}
  button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,[tabindex]:focus-visible{outline:none; box-shadow:var(--focus)}
  /* list stagger */
  .stagger>*{opacity:0; animation:rowIn .4s var(--ease) forwards}
  @keyframes rowIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  /* seal + status motion */
  .seal-pop{animation:sealPop .6s cubic-bezier(.34,1.56,.64,1) forwards}
  @keyframes sealPop{0%{opacity:0;transform:scale(1.5) rotate(-14deg)}60%{opacity:1}100%{opacity:1;transform:scale(1) rotate(-7deg)}}
  .warm-flip{animation:warmFlip .4s var(--ease)}
  @keyframes warmFlip{from{opacity:.3;transform:translateY(-3px)}to{opacity:1;transform:none}}
  /* warmer, softer scrollbar */
  .scroll-thin::-webkit-scrollbar-thumb{ background:#D6CFBF; border-radius:8px; }
  .view-enter { animation: viewIn .28s var(--ease); }
  @keyframes viewIn { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }

  /* Intel contract graph */
  #ig-svg{touch-action:none}
  .ig-link{stroke:#CDC2AB;stroke-width:1.4;fill:none;opacity:.55;transition:stroke .15s,opacity .15s,stroke-width .15s}
  .ig-link.hi{stroke:#086B54;opacity:1;stroke-width:2.2}
  .ig-link.dim{opacity:.08}
  .ig-node{cursor:pointer}
  .ig-chip{stroke:#DCD3C0;stroke-width:1.4;filter:drop-shadow(0 4px 10px rgba(60,40,10,.06));transition:stroke .15s,filter .15s}
  .ig-node.hi .ig-chip{stroke:#086B54;stroke-width:2;filter:drop-shadow(0 8px 18px rgba(60,40,10,.14))}
  .ig-node.dim{opacity:.22;transition:opacity .15s}
  .ig-lab{pointer-events:none;font-size:11.5px;font-family:'DM Sans',system-ui,sans-serif}
  .ig-sub{pointer-events:none;font-size:9px;font-family:'JetBrains Mono',monospace}
  /* lens states: mut = dimmed by an AI highlight lens (independent of hover dim);
     hit = matched by the active lens — stronger border + soft glow */
  .ig-node.mut{opacity:.28;transition:opacity .15s}
  .ig-node.hit .ig-chip{stroke:#086B54;stroke-width:2;filter:drop-shadow(0 0 7px rgba(8,107,84,.35)) drop-shadow(0 4px 10px rgba(60,40,10,.08))}
  .ig-badge-txt{pointer-events:none;font-size:8px;font-weight:700;font-family:'JetBrains Mono',monospace}
  /* right-hand AI dock */
  #ig-dock{transition:width .25s cubic-bezier(.22,.61,.36,1)}
  .ig-lens{transition:background .15s,border-color .15s,color .15s}

  .field{font-family:'JetBrains Mono',monospace;font-size:.9em;color:#075444;background:#E4EFE7;border:none;border-bottom:1.5px dashed #66BCA1;padding:1px 6px;border-radius:4px 4px 0 0;min-width:90px;transition:background .15s,border-color .15s,box-shadow .15s;outline:none;}
  .field:hover{background:#D9E8DD;}
  .field:focus{background:#fff;border-bottom-color:#0B7A5F;box-shadow:0 2px 0 0 #0B7A5F,0 0 0 3px rgba(11,122,95,.12);}
  .field.field-date{min-width:140px;} .field.field-num{text-align:right;min-width:130px;}
  .field:disabled{color:#0A3B32;background:transparent;border-bottom:1.5px solid #C6DED0;-webkit-text-fill-color:#0A3B32;opacity:1;cursor:default;font-weight:600;}

  .scroll-thin::-webkit-scrollbar{width:8px;height:8px;}
  .scroll-thin::-webkit-scrollbar-thumb{background:#D6CFBF;border-radius:8px;}
  .scroll-thin::-webkit-scrollbar-track{background:transparent;}

  .live-dot{position:relative;}
  .live-dot::after{content:'';position:absolute;inset:-4px;border-radius:9999px;background:currentColor;opacity:.4;animation:ping 1.8s cubic-bezier(0,0,.2,1) infinite;}
  @keyframes ping{75%,100%{transform:scale(2.2);opacity:0;}}

  .seal-in{animation:sealIn .5s cubic-bezier(.34,1.56,.64,1);}
  @keyframes sealIn{from{opacity:0;transform:scale(.9) rotate(-3deg);}to{opacity:1;transform:none;}}
  .toast-in{animation:toastIn .3s cubic-bezier(.22,.61,.36,1);}
  @keyframes toastIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}

  /* Icon-rail nav (warm light theme) */
  .nav-item{color:#8a7d6a;}
  .nav-item:hover{color:#075444;background:#F3EEE4;}
  .nav-item.active{background:#E4EFE7;color:#075444;}
  .nav-item.active .nav-rail{opacity:1;}
  @media (prefers-reduced-motion: reduce){ *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;} html{scroll-behavior:auto;} }

  /* AI panel slide-over */
  #ai-panel{transform:translateX(105%);transition:transform .3s cubic-bezier(.22,.61,.36,1);}
  #ai-panel.open{transform:none;}
  #ai-scrim{opacity:0;pointer-events:none;transition:opacity .25s;}
  #ai-scrim.open{opacity:1;pointer-events:auto;}
  .ai-msg{animation:viewIn .25s cubic-bezier(.22,.61,.36,1);}
  .typing span{display:inline-block;width:5px;height:5px;border-radius:9999px;background:#66BCA1;margin-right:3px;animation:blink 1.2s infinite;}
  .typing span:nth-child(2){animation-delay:.2s;} .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.25;transform:translateY(0);}40%{opacity:1;transform:translateY(-2px);}}

  .anchor-flash{animation:anchorFlash 1.8s ease;border-radius:8px;}
  @keyframes anchorFlash{0%{background:#FBF2DC;box-shadow:0 0 0 4px rgba(199,154,62,.30);}100%{background:transparent;box-shadow:0 0 0 4px transparent;}}
  .scan-pulse{animation:scanPulse 1s ease infinite;}
  @keyframes scanPulse{0%,100%{opacity:.45;}50%{opacity:1;}}

  .mlink{stroke:#CDC2AB;stroke-width:1.4;fill:none;opacity:.6;transition:stroke .15s,opacity .15s,stroke-width .15s;}
  .mlink.hi{stroke:#0B7A5F;opacity:1;stroke-width:2.2;}
  .mlink.dim{opacity:.08;}
  .mlabel{fill:#6B5F4B;font-size:9.5px;font-family:'JetBrains Mono',monospace;pointer-events:none;opacity:0;transition:opacity .15s;}
  .mlabel.show{opacity:1;}
  .mnode{cursor:pointer;}
  .mnode .chipbg{fill:#FDFAF6;stroke:#DCD3C0;stroke-width:1.4;transition:stroke .15s;}
  .mnode.hi .chipbg{stroke:#0B7A5F;stroke-width:2;}
  .mnode.sel .chipbg{stroke:#C79A3E;stroke-width:2.4;}
  .mnode.dim{opacity:.18;transition:opacity .15s;}
  #map-svg{cursor:grab;}
  #map-svg.panning{cursor:grabbing;}

  .qdot{cursor:pointer;transition:r .15s;}
  .qdot:hover{stroke:#08211E;stroke-width:2;}
  #party-scrim{opacity:0;pointer-events:none;transition:opacity .25s;}
  #party-scrim.open{opacity:1;pointer-events:auto;}

  .modal-in{animation:viewIn .2s cubic-bezier(.22,.61,.36,1);}

  /* PDF export — print only the prepared document */
  #print-root{display:none;}
  @media print{
    body>*{display:none!important;}
    #print-root{display:block!important;}
    body{background:#fff;}
  }

  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important;}}
</style>
</head>
<body class="font-sans text-brand-900 antialiased">

<div id="auth-root"></div>
<div id="share-root"></div>

<div id="app-shell" class="flex min-h-screen hidden">

  <!-- ================= ICON RAIL (84px, white) ================= -->
  <aside class="w-[84px] shrink-0 bg-white border-r border-hair flex flex-col items-center fixed inset-y-0 left-0 z-30 py-4">
    <!-- logo -->
    <div class="h-11 w-11 rounded-[13px] bg-brand-600 grid place-items-center text-white shrink-0 mb-4" id="brand-mark" title="HaTi — Contract Lifecycle"></div>

    <nav class="flex flex-col items-center gap-1 flex-1 w-full px-1" id="nav">
      <button data-view="dashboard" class="nav-item active relative w-[60px] h-[56px] rounded-xl grid place-content-center justify-items-center gap-1 transition" title="Home">
        <span class="nav-rail absolute left-0 top-2 bottom-2 w-[3px] rounded-full bg-brand-600 opacity-0 transition"></span>
        <span data-ic="grid" data-ic-cls="w-5 h-5"></span><span class="text-[9px] font-medium">Home</span>
      </button>
      <button data-view="register" class="nav-item relative w-[60px] h-[56px] rounded-xl grid place-content-center justify-items-center gap-1 transition" title="Register">
        <span class="nav-rail absolute left-0 top-2 bottom-2 w-[3px] rounded-full bg-brand-600 opacity-0 transition"></span>
        <span data-ic="list" data-ic-cls="w-5 h-5"></span><span class="text-[9px] font-medium">Register</span>
      </button>
      <button data-view="pipeline" class="nav-item relative w-[60px] h-[56px] rounded-xl grid place-content-center justify-items-center gap-1 transition" title="Queue">
        <span class="nav-rail absolute left-0 top-2 bottom-2 w-[3px] rounded-full bg-brand-600 opacity-0 transition"></span>
        <span data-ic="columns" data-ic-cls="w-5 h-5"></span><span class="text-[9px] font-medium">Queue</span>
      </button>
      <button data-view="intel" class="nav-item relative w-[60px] h-[56px] rounded-xl grid place-content-center justify-items-center gap-1 transition" title="Intel">
        <span class="nav-rail absolute left-0 top-2 bottom-2 w-[3px] rounded-full bg-brand-600 opacity-0 transition"></span>
        <span data-ic="network" data-ic-cls="w-5 h-5"></span><span class="text-[9px] font-medium">Intel</span>
      </button>
      <button data-view="calendar" class="nav-item relative w-[60px] h-[56px] rounded-xl grid place-content-center justify-items-center gap-1 transition" title="Calendar">
        <span class="nav-rail absolute left-0 top-2 bottom-2 w-[3px] rounded-full bg-brand-600 opacity-0 transition"></span>
        <span data-ic="calendar" data-ic-cls="w-5 h-5"></span><span class="text-[9px] font-medium">Calendar</span>
      </button>
      <button data-view="reports" class="nav-item relative w-[60px] h-[56px] rounded-xl grid place-content-center justify-items-center gap-1 transition" title="Reports">
        <span class="nav-rail absolute left-0 top-2 bottom-2 w-[3px] rounded-full bg-brand-600 opacity-0 transition"></span>
        <span data-ic="trend" data-ic-cls="w-5 h-5"></span><span class="text-[9px] font-medium">Reports</span>
      </button>
      <button data-view="workspace" class="nav-item relative w-[60px] h-[56px] rounded-xl grid place-content-center justify-items-center gap-1 transition" title="Doc">
        <span class="nav-rail absolute left-0 top-2 bottom-2 w-[3px] rounded-full bg-brand-600 opacity-0 transition"></span>
        <span data-ic="file" data-ic-cls="w-5 h-5"></span><span class="text-[9px] font-medium">Doc</span>
      </button>
      <button data-view="team" class="nav-item relative w-[60px] h-[56px] rounded-xl grid place-content-center justify-items-center gap-1 transition" title="Team">
        <span class="nav-rail absolute left-0 top-2 bottom-2 w-[3px] rounded-full bg-brand-600 opacity-0 transition"></span>
        <span data-ic="users" data-ic-cls="w-5 h-5"></span><span class="text-[9px] font-medium">Team</span>
      </button>
    </nav>

    <button id="ai-open-side" title="Ask HaTi AI" class="h-14 w-14 rounded-2xl bg-brand-600 hover:bg-brand-700 text-white grid place-content-center justify-items-center gap-0.5 transition shrink-0 mb-3">
      <span data-ic="sparkle" data-ic-cls="w-5 h-5"></span><span class="text-[9px] font-semibold">AI</span>
    </button>
    <button id="rail-avatar" title="Team &amp; settings" class="h-10 w-10 rounded-full bg-brand-50 grid place-items-center text-[11px] font-semibold text-brand-700 font-mono shrink-0 hover:ring-2 hover:ring-brand-100 transition"></button>
  </aside>

  <!-- ================= MAIN ================= -->
  <!-- viewport-fixed shell: the top bar of each view pins, the region scrolls -->
  <main class="flex-1 ml-[84px] min-w-0 h-screen overflow-hidden">
    <div id="content" class="h-full overflow-y-auto scroll-thin"></div>
  </main>
</div>

<!-- ================= AI ASSISTANT (slide-over) ================= -->
<div id="ai-scrim" class="fixed inset-0 bg-brand-900/30 backdrop-blur-[2px] z-40"></div>
<section id="ai-panel" class="fixed top-0 right-0 bottom-0 w-full max-w-[430px] bg-brand-50 z-50 flex flex-col border-l border-inputln shadow-2xl shadow-brand-900/20">
  <header class="px-5 py-4 flex items-center gap-3 bg-ink text-white">
    <div class="h-9 w-9 rounded-xl bg-gold-500 text-brand-900 grid place-items-center shrink-0" data-ic-big="sparkle"></div>
    <div class="flex-1 leading-tight">
      <div class="font-display font-600">HaTi AI</div>
      <div class="text-[11px] text-brand-200 flex items-center gap-1.5"><span class="h-1.5 w-1.5 rounded-full bg-brand-300 live-dot"></span>Searching your live contract data</div>
    </div>
    <button id="ai-close" class="h-8 w-8 grid place-items-center rounded-lg hover:bg-white/10 transition text-brand-100" data-ic-big="x"></button>
  </header>

  <div id="ai-feed" class="flex-1 overflow-y-auto scroll-thin px-5 py-4 space-y-4"></div>

  <div id="ai-suggest" class="px-5 pb-2 flex flex-wrap gap-1.5"></div>

  <footer class="px-5 pb-5 pt-3 border-t border-inputln">
    <div class="flex items-center gap-2">
      <input id="ai-input" type="text" placeholder="Search, summarize, or ask about your contracts…" class="flex-1 rounded-xl border border-inputln bg-white px-3.5 py-2.5 text-sm outline-none focus:border-brand-600 focus:ring-[3px] focus:ring-[rgba(11,122,95,.1)] transition"/>
      <button id="ai-send" class="h-10 w-10 shrink-0 grid place-items-center rounded-xl bg-brand-600 text-white hover:bg-brand-700 transition" data-ic-big="send"></button>
    </div>
  </footer>
</section>

<div id="modal-root"></div>
<div id="toast-root" class="fixed bottom-6 right-6 z-[60] space-y-2"></div>
<div id="print-root"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
