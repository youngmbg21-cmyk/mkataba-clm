const aiCards = list => `<div class="space-y-1.5">${list.map(aiContractCard).join('')}</div>`;

/* --- the intent engine --- */
function aiAnswer(qRaw){
  const q=qRaw.toLowerCase();
  const cs=state.contracts;
  const has=(...words)=>words.some(w=>q.includes(w));

  // 1) direct contract-ID summary
  const idMatch=qRaw.match(/MK-\d+/i);
  if(idMatch||has('summarize','summary','brief me','tell me about')){
    let c=null;
    if(idMatch) c=getContract(idMatch[0].toUpperCase());
    if(!c) c=cs.find(x=>q.includes(x.counterparty.toLowerCase().split(' ')[0]) && x.counterparty);
    if(!c) c=cs.find(x=>x.name.toLowerCase().split(' ').some(w=>w.length>4&&q.includes(w)));
    if(c){
      const t=TEMPLATES[c.template];
      return { text:`<strong>${c.name}</strong> (${c.id}) is a ${t.kind} with <strong>${c.counterparty||'no counterparty yet'}</strong>, filed under ${FOLDERS[c.folder].name}. Value: <strong>${!isMonetary(c)?'non-monetary (no consideration passes)':(c.value?fmtKES(c.value)+(c.valueType==='estimated'?' (estimated)':''):'not set')}</strong> · Status: <strong>${c.status}</strong> · Last action ${c.lastAction}. ${c.status==='Signed'?'It is fully executed with an SHA-256 seal and verified IPRS + PKI compliance.':c.status==='Under Review'?'It is waiting on counterparty action — compliance checks are '+((c.compliance.iprs&&c.compliance.pki)?'complete':'still open')+'.':c.status==='Draft'?'It is still in draft — fill the counterparty and value to move it into review.':'It was declined and is closed without signature.'} There are ${c.comments.length} comments on the thread.${(()=>{ if(!c.scan) return ' It has not been AI-scanned yet.'; const o=openFindings(c); return o.length?` The AI scan shows <strong>${o.length} open finding${o.length===1?'':'s'}</strong> (worst: ${SEV_META[worstSevOf(o)].label.toLowerCase()}).`:' The AI scan is clean — no open findings.'; })()}`,
        cards:aiCards([c]) };
    }
  }

  // 1a) expiry / renewal queries
  if(has('expir','renew','lapse','ending','due soon')){
    const exp=cs.filter(c=>c.expiry && c.status!=='Declined')
      .map(c=>({c,d:Math.ceil((new Date(c.expiry+'T00:00:00')-Date.now())/86400000)}))
      .filter(x=>x.d>=0&&x.d<=90).sort((a,b)=>a.d-b.d);
    if(!exp.length) return { text:`Nothing in the active book lapses in the next 90 days.` };
    const soon=exp.filter(x=>x.d<=30).length;
    return { text:`<strong>${exp.length} contract${exp.length===1?'':'s'}</strong> lapse within 90 days${soon?`, including <strong>${soon} inside 30 days</strong>`:''}. Closest first — ${exp[0].c.name} with ${exp[0].c.counterparty} in <strong>${exp[0].d} days</strong>:`, cards:aiCards(exp.map(x=>x.c)) };
  }
  // 1b) risk / findings / scan queries
  if(has('risk','finding','findings','issue','issues','problem','scan','red flag','exposure')){
    const scanned=cs.filter(c=>c.scan);
    if(!scanned.length) return { text:`No contracts have been scanned yet. Open any contract and hit <strong>Run AI scan</strong> in the workspace — I’ll check its clauses against Kenyan practice and pin every finding to the clause it concerns.` };
    const withOpen=scanned.filter(c=>openFindings(c).length).sort((a,b)=>SEV_RANK[worstSevOf(openFindings(b))]-SEV_RANK[worstSevOf(openFindings(a))]);
    if(!withOpen.length) return { text:`${scanned.length} contract${scanned.length===1?' has':'s have'} been scanned and every finding is resolved or dismissed — the reviewed book is clean.`, cards:aiCards(scanned) };
    const high=withOpen.reduce((s,c)=>s+openFindings(c).filter(x=>x.sev==='high').length,0);
    return { text:`<strong>${withOpen.length} contract${withOpen.length===1?'':'s'}</strong> ${withOpen.length===1?'has':'have'} open scan findings${high?`, including <strong>${high} high-severity</strong>`:''}. Sorted by worst exposure:`, cards:aiCards(withOpen) };
  }
  // 2) pending / under review
  if(has('pending','under review','waiting','counterparty action','awaiting')){
    const list=cs.filter(c=>c.status==='Under Review');
    const val=list.reduce((s,c)=>s+Number(c.value||0),0);
    return { text:`You have <strong>${list.length} contracts pending counterparty action</strong>, worth ${fmtKES(val)} combined. Tap any to open its workspace:`, cards:aiCards(list) };
  }
  // 3) drafts
  if(has('draft')){
    const list=cs.filter(c=>c.status==='Draft');
    return { text:`There are <strong>${list.length} drafts</strong> in your workspace. Drafts move to "Under Review" automatically once a counterparty and value are set.`, cards:aiCards(list) };
  }
  // 4) signed / executed
  if(has('signed','executed','sealed','completed')){
    const list=cs.filter(c=>c.status==='Signed');
    const val=list.reduce((s,c)=>s+Number(c.value||0),0);
    return { text:`<strong>${list.length} contracts are signed and executed</strong> this month, totalling <strong>${fmtKES(val)}</strong>. All carry SHA-256 document seals with IPRS and CAK PKI verification.`, cards:aiCards(list) };
  }
  // 5) declined
  if(has('declined','expired','rejected','lost')){
    const list=cs.filter(c=>c.status==='Declined');
    return { text:`${list.length} contract${list.length===1?'':'s'} closed without signature. Worth a follow-up call:`, cards:aiCards(list) };
  }
  // 6) totals / value analytics
  if(has('total','value','worth','how much','portfolio')){
    const m=metrics();
    const byFolder=Object.values(FOLDERS).map(f=>{
      const v=folderContracts(f.id).filter(c=>c.status!=='Declined').reduce((s,c)=>s+Number(c.value||0),0);
      return `<div class="flex items-center justify-between text-xs py-1.5 border-b border-brand-100/60 last:border-0"><span class="text-brand-800/70">${f.name}</span><span class="font-mono font-medium text-brand-900">${fmtKESshort(v)}</span></div>`;
    }).join('');
    return { text:`Your active portfolio is worth <strong>${fmtKES(m.totalValue)}</strong> across ${cs.filter(c=>c.status!=='Declined').length} live agreements. Breakdown by folder:`,
      cards:`<div class="rounded-xl border border-brand-100 bg-white px-3.5 py-1.5">${byFolder}</div>` };
  }
  // 7) highest / largest
  if(has('highest','largest','biggest','top contract','most valuable')){
    const sorted=[...cs].filter(c=>c.status!=='Declined').sort((a,b)=>b.value-a.value).slice(0,3);
    return { text:`Your highest-value agreement is <strong>${sorted[0].name}</strong> at <strong>${fmtKES(sorted[0].value)}</strong>. Top three by value:`, cards:aiCards(sorted) };
  }
  // 8) counterparty / free-text search
  const terms=q.replace(/[?.,!]/g,'').split(/\s+/).filter(w=>w.length>2&&!['the','and','for','with','find','show','search','contracts','contract','any','all','have','what','which'].includes(w));
  if(terms.length){
    const list=cs.filter(c=>terms.some(t=>(c.name+' '+c.counterparty+' '+FOLDERS[c.folder].name+' '+TEMPLATES[c.template].kind).toLowerCase().includes(t)));
    if(list.length){
      return { text:`Found <strong>${list.length} contract${list.length===1?'':'s'}</strong> matching "${terms.join(', ')}":`, cards:aiCards(list) };
    }
  }
  // fallback
  return { text:`I couldn't match that to your contract data. I can help with things like: <em>"show pending contracts"</em>, <em>"total value of signed"</em>, <em>"summarize MK-103"</em>, or searching by counterparty name (e.g. <em>"Naivas"</em>).` };
}

function aiSubmit(){
  const inp=document.getElementById('ai-input');
  const q=inp.value.trim(); if(!q) return;
  inp.value='';
  aiPush('user',{text:q});
  renderAIFeed(true);
  setTimeout(()=>{
    const ans=aiAnswer(q);
    aiPush('assistant',ans);
    renderAIFeed();
  }, 650+Math.random()*500);
}

document.getElementById('ai-send').addEventListener('click',aiSubmit);
document.getElementById('ai-input').addEventListener('keydown',e=>{if(e.key==='Enter')aiSubmit();});
document.getElementById('ai-close').addEventListener('click',closeAI);
document.getElementById('ai-scrim').addEventListener('click',closeAI);
document.getElementById('ai-open-side').addEventListener('click',()=>openAI());
document.addEventListener('keydown',e=>{
  const appHidden=document.getElementById('app-shell').classList.contains('hidden');
  if(e.key==='/'&&!appHidden&&!ai.open&&!['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)){ e.preventDefault(); openAI(); }
  if(e.key==='Escape'&&ai.open) closeAI();
});

/* ============================================================
   VIEW: TEAM & SETTINGS
   ============================================================ */
function renderTeam(){
  const me=currentUser(), o=getOrg();
  const roleChip=r=>({admin:'bg-brand-900 text-white',legal:'bg-brand-50 text-brand-700 border border-brand-200',viewer:'bg-slate-100 text-slate-600 border border-slate-200'}[r]||'');
  const rows=getUsers().map(x=>`
    <div class="flex items-center gap-3 px-5 py-3 border-b border-brand-100/50 last:border-0">
      <div class="h-8 w-8 rounded-full bg-brand-100 text-brand-700 grid place-items-center text-[10px] font-semibold shrink-0">${x.name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase()}</div>
      <div class="min-w-0 flex-1">
        <div class="text-sm font-medium text-brand-900">${x.name}${x.id===me.id?' <span class="text-[10px] text-brand-800/40">(you)</span>':''}</div>
        <div class="text-[11px] font-mono text-brand-800/45">${x.email}</div>
      </div>
      ${isAdmin()&&x.id!==me.id?`
        <select data-role-for="${x.id}" class="text-xs rounded-lg border border-brand-100 bg-white px-2 py-1.5 outline-none focus:border-brand-400">
          ${['admin','legal','viewer'].map(r=>`<option value="${r}" ${x.role===r?'selected':''}>${ROLE_LABEL[r]}</option>`).join('')}
        </select>
        <button data-remove-user="${x.id}" class="text-[11px] text-rose-500 hover:text-rose-700 font-medium transition">Remove</button>`
      :`<span class="text-[10px] px-2 py-1 rounded-full font-medium ${roleChip(x.role)}">${ROLE_LABEL[x.role]}</span>`}
    </div>`).join('');

  document.getElementById('content').innerHTML=`
  <div class="view-enter">
    <header class="sticky top-0 z-20 bg-canvas/85 backdrop-blur border-b border-brand-100/70">
      <div class="px-8 py-4">
        <h1 class="font-display font-700 text-xl tracking-tight text-brand-900">Team &amp; Settings</h1>
        <p class="text-xs text-brand-800/50">${o.name} · workspace created ${fmtDT(o.createdAt)}</p>
      </div>
    </header>
    <div class="px-8 py-6 max-w-[760px] space-y-6">

      <section class="bg-white rounded-2xl border border-brand-100/70 overflow-hidden">
        <div class="flex items-center gap-2 px-5 py-4 border-b border-brand-100/60">
          <span class="text-brand-500">${icon('users')}</span>
          <h2 class="font-display font-600 text-brand-900">Team</h2>
          <span class="ml-auto text-[11px] font-mono text-brand-800/40">${getUsers().length} member${getUsers().length===1?'':'s'}</span>
        </div>
        ${rows}
        ${isAdmin()?`
        <div class="px-5 py-4 bg-brand-50/40 border-t border-brand-100/60">
          <div class="text-xs font-semibold text-brand-900 mb-2 flex items-center gap-1.5">${icon('userplus','w-3.5 h-3.5')} Add team member</div>
          <div class="grid sm:grid-cols-2 gap-2">
            <input id="tm-name" type="text" placeholder="Full name" class="rounded-lg border border-brand-100 bg-white px-3 py-2 text-sm outline-none focus:border-brand-400"/>
            <input id="tm-email" type="email" placeholder="Work email" class="rounded-lg border border-brand-100 bg-white px-3 py-2 text-sm outline-none focus:border-brand-400"/>
            <select id="tm-role" class="rounded-lg border border-brand-100 bg-white px-3 py-2 text-sm outline-none focus:border-brand-400">
              <option value="legal">Legal — edit &amp; sign</option>
              <option value="viewer">Viewer — read only</option>
              <option value="admin">Admin — full control</option>
            </select>
            <input id="tm-pass" type="password" placeholder="Temporary password (min 8)" class="rounded-lg border border-brand-100 bg-white px-3 py-2 text-sm outline-none focus:border-brand-400"/>
          </div>
          <button id="tm-add" class="mt-2.5 rounded-lg bg-brand-900 text-white px-4 py-2 text-sm font-medium hover:bg-brand-800 transition">Add member</button>
        </div>`:''}
      </section>

      <section class="bg-white rounded-2xl border border-brand-100/70 p-5">
        <div class="flex items-center gap-2 mb-1"><span class="text-brand-500">${icon('shield')}</span>
          <h2 class="font-display font-600 text-brand-900">Data &amp; backup</h2></div>
        <p class="text-xs text-brand-800/55 mb-3">${API_MODE()?'This workspace runs on your Mkataba server — every device sees the same contracts and accounts. Export a backup any time for your records.':'This build stores everything in this browser’s local storage. Export a backup to move workspaces between machines — run the Mkataba server for central storage.'}</p>
        <div class="flex flex-wrap gap-2">
          <button id="bk-export" class="flex items-center gap-1.5 rounded-lg border border-brand-200 text-brand-700 px-3.5 py-2 text-xs font-medium hover:bg-brand-50 transition">${icon('download','w-3.5 h-3.5')} Export backup</button>
          ${(!API_MODE()&&isAdmin())?`
          <label class="flex items-center gap-1.5 rounded-lg border border-brand-200 text-brand-700 px-3.5 py-2 text-xs font-medium hover:bg-brand-50 transition cursor-pointer">${icon('upload','w-3.5 h-3.5')} Restore backup<input id="bk-import" type="file" accept=".json,application/json" class="hidden"/></label>
          <button id="bk-reset" class="ml-auto flex items-center gap-1.5 rounded-lg border border-rose-200 text-rose-600 px-3.5 py-2 text-xs font-medium hover:bg-rose-50 transition">${icon('ban','w-3.5 h-3.5')} Reset workspace</button>`:''}
        </div>
      </section>
    </div>
  </div>`;

  document.getElementById('tm-add')?.addEventListener('click',async()=>{
    const name=fval('tm-name'), email=fval('tm-email').toLowerCase(), role=document.getElementById('tm-role').value;
    const pass=document.getElementById('tm-pass').value;
    if(!name||!email){ toast('Name and email are required','err'); return; }
    if(pass.length<8){ toast('Temporary password must be at least 8 characters','err'); return; }
    if(getUsers().some(x=>x.email===email)){ toast('A member with that email already exists','err'); return; }
    if(API_MODE()){
      try{ const r=await api('users','POST',{ name, email, role, password:pass });
        REMOTE.users=[...REMOTE.users, r.user];
      }catch(e){ toast(e.message,'err'); return; }
    } else {
      const salt=newSalt();
      saveUsers([...getUsers(),{ id:'u'+(Date.now().toString(36)), name, email, role, salt, hash:await hashPassword(pass,salt), createdAt:nowISO() }]);
    }
    toast(`${name} added as ${ROLE_LABEL[role]} — share their temporary password securely`);
    renderTeam();
  });
  document.querySelectorAll('[data-role-for]').forEach(sel=>sel.addEventListener('change',async()=>{
    const us=getUsers(); const u=us.find(x=>x.id===sel.getAttribute('data-role-for'));
    if(!u) return;
    if(API_MODE()){
      try{ await api('users/'+u.id,'PATCH',{ role:sel.value }); u.role=sel.value; }
      catch(e){ toast(e.message,'err'); renderTeam(); return; }
    } else { u.role=sel.value; saveUsers(us); }
    toast(`${u.name} is now ${ROLE_LABEL[u.role]}`); renderTeam();
  }));
  document.querySelectorAll('[data-remove-user]').forEach(b=>b.addEventListener('click',async()=>{
    const us=getUsers(); const u=us.find(x=>x.id===b.getAttribute('data-remove-user'));
    if(!u || !confirm(`Remove ${u.name} from the workspace?`)) return;
    if(API_MODE()){
      try{ await api('users/'+u.id,'DELETE'); REMOTE.users=REMOTE.users.filter(x=>x.id!==u.id); }
      catch(e){ toast(e.message,'err'); return; }
    } else saveUsers(us.filter(x=>x.id!==u.id));
    toast(`${u.name} removed`); renderTeam();
  }));
  document.getElementById('bk-export')?.addEventListener('click',()=>{
    downloadFile(`mkataba-backup-${new Date().toISOString().slice(0,10)}.json`,
      JSON.stringify({ kind:'mkataba-backup', v:1, exportedAt:nowISO(), org:getOrg(), users:getUsers(),
        data:{ uid, contracts:state.contracts } },null,2));
    toast('Backup downloaded');
  });
  document.getElementById('bk-import')?.addEventListener('change',e=>{
    const f=e.target.files[0]; if(!f) return;
    const rd=new FileReader();
    rd.onload=()=>{ try{
        const b=JSON.parse(rd.result);
        if(b.kind!=='mkataba-backup'||!b.org||!b.users) throw new Error('bad');
        if(!confirm('Restoring replaces this workspace, its users and contracts with the backup. Continue?')) return;
        lsSet(LS.org,b.org); saveUsers(b.users); if(b.data) lsSet(LS.data,b.data);
        localStorage.removeItem(LS.session); location.reload();
      }catch(err){ toast('That file is not a valid Mkataba backup','err'); } };
    rd.readAsText(f);
  });
  document.getElementById('bk-reset')?.addEventListener('click',()=>{
    if(confirm('This permanently erases the workspace, all users and contracts stored in this browser. Continue?')){
      Object.values(LS).forEach(k=>localStorage.removeItem(k)); location.reload();
    }
  });
  setActiveNav('team');
}

/* ============================================================ NAV */
function setActiveNav(view){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.getAttribute('data-view')===view));
  // folder highlighting in sidebar
  document.querySelectorAll('[data-side-folder]').forEach(b=>{
    b.classList.toggle('bg-white/10',view==='folder'&&b.getAttribute('data-side-folder')===state.folderId);
    b.classList.toggle('text-white',view==='folder'&&b.getAttribute('data-side-folder')===state.folderId);
  });
}
function setView(view){
  state.view=view;
  if(view==='dashboard') renderDashboard();
  else if(view==='folder') renderFolder();
  else if(view==='intel') renderIntel();
  else if(view==='team') renderTeam();
  else renderWorkspace();
  if(getOrg()) persist();
  window.scrollTo({top:0});
}
function openFolder(fid){ state.folderId=fid; state.folderQuery=''; setView('folder'); }
function openWorkspace(id){ state.activeId=id; setView('workspace'); }
function createFromTemplate(tid){
  if(!canEdit()){ toast('Viewers cannot create contracts','err'); return; }
  const t=TEMPLATES[tid], u=currentUser();
  const c={ id:nextId(), name:t.name+' (Draft)', counterparty:'', value:0, status:'Draft',
    template:tid, folder:t.folder,
    lastAction:todayStr(),
    hash:null, signedAt:null, signatory:u?.name||'Authorized signatory',
    compliance:{iprs:false,pki:false},
    comments:[{author:'System',role:'Automation',side:'internal',text:`New ${t.kind} generated from Template ${tid} and filed under ${FOLDERS[t.folder].name}. Fill the highlighted fields to begin.`,ts:fmtDT(nowISO())}],
    fields:{}, scan:null, expiry:null, valueType:t.valueType,
    audit:[{at:nowISO(),user:u?.name||'System',action:'Created',detail:`Generated from Template ${tid} (${t.kind})`}],
    signatures:[] };
  state.contracts.unshift(c);
  state.activeId=c.id;
  persist();
  toast(`New ${t.kind} created and filed in ${FOLDERS[t.folder].name}`);
  setView('workspace');
  renderSideFolders();
}

/* BOOT
   1. #share=… in the URL → counterparty portal (no login needed)
   2. Mkataba server present → API mode (central storage, live shares)
   3. No server → static mode backed by this browser's localStorage
   Either mode: no workspace → setup screen; no session → login. */
(async function boot(){
  const m=location.hash.match(/^#share=(.+)$/);
  if(m){ await portalEntry(m[1]); return; }
  let st=null;
  try{ const r=await fetch('api/status',{credentials:'same-origin'}); if(r.ok) st=await r.json(); }catch(e){}
  if(st && st.mode==='api'){
    REMOTE={ org:st.orgName?{name:st.orgName}:null, me:null, users:[] };
    if(!st.setup){ renderAuth('setup'); return; }
    if(!st.authed){ renderAuth('login'); return; }
    try{ await loadBootstrap(); startApp(); }
    catch(e){ renderAuth('login'); }
    return;
  }
  hydrate();
  if(!getOrg()){ renderAuth('setup'); return; }
  if(!getSession()||!currentUser()){ localStorage.removeItem(LS.session); renderAuth('login'); return; }
  startApp();
})();
