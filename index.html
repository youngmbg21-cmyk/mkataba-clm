/* ---- built-in fallback interpreter: query -> render_graph-shaped result ---- */
function parseHorizonDays(q){
  const m=q.match(/(\d+)\s*(day|week|month|year)s?/);
  if(m){ const n=+m[1]; return Math.round(n*({day:1,week:7,month:30.44,year:365.25})[m[2]]); }
  if(q.includes('this year')){ const end=new Date(new Date().getFullYear(),11,31); return Math.max(0,Math.ceil((end-Date.now())/86400000)); }
  return null;
}
function graphInterpret(qRaw){
  const q=(qRaw||'').toLowerCase().trim();
  const act=intelActive();
  // "of those / among these" → operate on the currently selected set
  const followup=/\b(of|among|from|out of)\s+(those|these|them)\b/.test(q);
  const cs=(followup && act.ids)? state.contracts.filter(c=>act.ids.has(c.id)) : state.contracts;
  const has=(...w)=>w.some(x=>q.includes(x));
  // analytical questions read better highlighted; explicit commands filter
  const questionish=/^(which|what|who|how|are|is|do|does)\b/.test(q)||q.includes('?');
  const mode=has('only','show ','filter','display')&&!questionish?'filter':(questionish?'highlight':'filter');
  let groupBy=null, vis=null, note='', badges=null, action=mode;
  // grouping intent
  if(has('by customer','by counterpart','by party','per customer','by client')) groupBy='counterparty';
  else if(has('by folder','by function','by value stream','by category','by department')) groupBy='folder';
  else if(has('by status','by stage','by lifecycle')) groupBy='status';
  else if(has('by value','by size','by amount','by exposure')) groupBy='valueBand';
  else if(has('by type','by kind','by contract type')) groupBy='kind';
  // filter intent
  const kindHit=(...k)=>cs.filter(c=>k.some(x=>cKind(c).toLowerCase().includes(x)));
  if(has('expir','renew','lapse','ending',' end ','coming to an end','ends in','end in','end within')){
    const horizon=parseHorizonDays(q)??90;
    vis=cs.filter(c=>c.expiry&&c.status!=='Declined'&&daysUntil(c.expiry)>=0&&daysUntil(c.expiry)<=horizon);
    note='Expiring ≤ '+(horizon%30===0&&horizon>=30?Math.round(horizon/30)+'mo':horizon+' days');
    badges={}; vis.forEach(c=>badges[c.id]='ends in '+daysUntil(c.expiry)+'d');
    action='highlight';
  }
  else if(has('lease')) { vis=kindHit('lease'); note='Leases'; }
  else if(has('nda','non-disclosure','confidential')) { vis=kindHit('nda','non-disclosure'); note='NDAs'; }
  else if(has('supply','raw material','packaging')) { vis=kindHit('supply','packaging','raw material'); note='Supply agreements'; }
  else if(has('draft')) { vis=cs.filter(c=>c.status==='Draft'); note='Drafts'; }
  else if(has('under review','pending','awaiting','in review')) { vis=cs.filter(c=>c.status==='Under Review'); note='In review'; }
  else if(has('signed','executed','sealed')) { vis=cs.filter(c=>c.status==='Signed'); note='Executed'; }
  else if(has('declined','closed','rejected')) { vis=cs.filter(c=>c.status==='Declined'); note='Closed'; }
  else if(has('high value','high-value','biggest','largest','top ','most valuable')) { vis=cs.filter(c=>Number(c.value||0)>=20e6); note='High-value (≥ KES 20M)'; }
  else if(has('non-monetary','no value')) { vis=cs.filter(c=>!isMonetary(c)); note='Non-monetary'; }
  else {
    // counterparty name match
    const party=cs.filter(c=>c.counterparty && c.counterparty.toLowerCase().split(/[^a-z0-9]+/).some(w=>w.length>3&&q.includes(w)));
    if(party.length){ vis=party; note='Counterparty match'; }
    else { const f=Object.values(FOLDERS).find(f=>{ const kw=f.name.toLowerCase().split(/[^a-z]+/).filter(w=>w.length>4); return kw.some(w=>q.includes(w)); });
      if(f){ vis=cs.filter(c=>c.folder===f.id); note=f.name; } }
  }
  const answer = vis===null
    ? (groupBy?'Regrouped the graph.':'I could not match that to a filter — try a contract type, status, counterparty or expiry horizon.')
    : (vis.length
      ? `${vis.length} contract${vis.length===1?'':'s'} match${vis.length===1?'es':''} (${note}). Largest: ${vis.slice().sort((a,b)=>Number(b.value||0)-Number(a.value||0))[0].name}.`
      : `No contracts match (${note}).`);
  return { visibleIds: vis&&vis.length?vis.map(c=>c.id):null, groupBy, groups:null, note, action, badges, answer };
}

/* ---- dock entry point: routes to graph query or template advisor ---- */
const IG_TEMPLATE_RE=/\btemplate\b|\bbase\b.{0,30}\b(new|next|on)\b|model (contract|agreement)|starting point|start(ing)? from/i;
async function intelAsk(qRaw){
  const q=(qRaw||'').trim();
  if(!q||intel.busy) return;
  intel.history.push({role:'user', text:q});
  intel.busy=true; renderIntelDock(); updateIntelNote();
  try{
    if(IG_TEMPLATE_RE.test(q)) await intelTemplateAsk(q);
    else await intelGraphAsk(q);
  }catch(e){
    intel.history.push({role:'assistant', text:'Something went wrong: '+igEsc(e.message), err:true});
  }
  intel.busy=false;
  rebuildIntelGraph(); renderIntelDock();
}

async function intelGraphAsk(q){
  const act=intelActive();
  let res=null;
  if(API_MODE() && state.aiConfigured){
    try{

        contracts: state.contracts.slice(0,600).map(c=>({id:c.id,name:c.name,counterparty:c.counterparty||'',folder:FOLDERS[c.folder]?.name||'',kind:cKind(c),value:Number(c.value||0),status:c.status,expiry:c.expiry||''})),
        history: intel.history.slice(-9,-1).filter(m=>m.text).map(m=>({role:m.role,text:m.text})),

    }
  }

    addLens({ label:res.note||res.visibleIds.length+' matches', ids:res.visibleIds, action:res.action||'filter', badges:res.badges||null });

}

/* ---- template advisor: stage 1 metadata shortlist, stage 2 clause-level AI rank ---- */
function contractPlainText(c){
  try{
    if(isUpload(c)) return (c.upload&&c.upload.extractedText)||'';
    const host=document.createElement('div'); host.innerHTML=docBody(c);
    host.querySelectorAll('input').forEach(i=>i.replaceWith(document.createTextNode(i.value||i.getAttribute('value')||'')));
    return (host.textContent||'').replace(/\s+/g,' ').trim();
  }catch(e){ return ''; }
}
function templateShortlist(q){
  const ql=q.toLowerCase();
  const score=c=>{ let s=0;
    cKind(c).toLowerCase().split(/[^a-z]+/).forEach(w=>{ if(w.length>3&&ql.includes(w)) s+=4; });
    if(c.status==='Signed') s+=3;
    if(Number(c.value||0)>0) s+=1;
    if(c.counterparty) s+=1;
    if(isUpload(c)&&!(c.upload&&c.upload.extractedText)) s-=5;   // no text to compare
    return s; };
  return state.contracts.map(c=>({c,s:score(c)})).sort((a,b)=>b.s-a.s).slice(0,8).map(x=>x.c);
}
async function intelTemplateAsk(q){
  const shortlist=templateShortlist(q);
  if(!shortlist.length){ intel.history.push({role:'assistant', text:'There are no contracts to compare yet.'}); return; }
  if(API_MODE() && state.aiConfigured){
    try{
      await Promise.all(shortlist.map(c=>ensureFull(c).catch(()=>{})));
      const candidates=shortlist.map(c=>({id:c.id,name:c.name,kind:cKind(c),counterparty:c.counterparty||'',value:Number(c.value||0),status:c.status,expiry:c.expiry||'',text:contractPlainText(c)}));
      const res=await api('ai/template','POST',{query:q,candidates});
      applyTemplateResult(res.ranked, res.answer); return;
    }catch(e){
      intel.history.push({role:'assistant', err:true,
        text:(/key|configure|401|model/i.test(e.message)?'The AI engine needs an API key for template analysis — here is a metadata-only ranking instead.':'AI template analysis failed ('+igEsc(e.message)+') — here is a metadata-only ranking instead.')});
    }
  }
  // fallback: deterministic metadata ranking, honest about its limits
  const ranked=shortlist.slice(0,3).map(c=>({ id:c.id,
    reason:[c.status==='Signed'?'executed — battle-tested terms':'closest match on type', cKind(c), c.counterparty?('with '+c.counterparty):null].filter(Boolean).join(' · ') }));
  const top=getContract(ranked[0].id);
  applyTemplateResult(ranked, `Closest template match on metadata: <b>${top?.name||'—'}</b>.${(API_MODE()&&!state.aiConfigured)||!API_MODE()?' Configure the AI engine for a clause-level comparison.':''}`);
}
function applyTemplateResult(ranked, answer){
  const badges={}; ranked.forEach((r,i)=>badges[r.id]='#'+(i+1));
  addLens({ label:'Template picks · '+ranked.length, ids:ranked.map(r=>r.id), action:'highlight', badges });
  intel.history.push({role:'assistant', text:answer||'Ranked the best template candidates.', ranked});
}

/* ---- build the node/edge model from current state + lenses/group ---- */
function buildGraphModel(){
  const groupBy=intel.groupBy, override=intel.groups;
  const act=intelActive();
  let cs=state.contracts;
  if(act.ids && act.action==='filter') cs=cs.filter(c=>act.ids.has(c.id));
  const capped = cs.length>INTEL_CAP;
  if(capped) cs=cs.slice().sort((a,b)=>{
    // matched contracts survive the cap first, then largest by value
    const am=act.ids?.has(a.id)?1:0, bm=act.ids?.has(b.id)?1:0;
    return (bm-am)||(Number(b.value||0)-Number(a.value||0));
  }).slice(0,INTEL_CAP);
  const highlight = act.ids && act.action==='highlight';
  // hubs
  const hubMap={};
  cs.forEach(c=>{ const g=groupLabelOf(c,groupBy,override); (hubMap[g]||(hubMap[g]={label:g,ids:[]})).ids.push(c.id); });
  const hubs=Object.values(hubMap);
  const nodes=[], edges=[];
  hubs.forEach((h,i)=>{ nodes.push({id:'hub:'+h.label, kind:'hub', label:h.label, sub:h.ids.length+' contract'+(h.ids.length===1?'':'s')}); });
  cs.forEach(c=>{ const g=groupLabelOf(c,groupBy,override);
    nodes.push({id:c.id, kind:'contract', c, label:c.name, sub:c.id+(isMonetary(c)&&c.value?' · '+fmtKESshort(c.value):''), group:g, dot:STATUS_DOT[c.status]||'#9A9484',
      hit: highlight&&act.ids.has(c.id), mut: highlight&&!act.ids.has(c.id), badge: act.badges?.[c.id]||null});
    edges.push({from:'hub:'+g, to:c.id});   // hub -> contract: arrows fan outward
  });
  return { nodes, edges, capped, shown:cs.length, total:cs.length };
}

/* ---- physics + svg (adapted, light theme) ---- */
function makeIntelGraph(model){
  const svg=document.getElementById('ig-svg'); if(!svg) return null;
  const gLinks=document.getElementById('ig-links'), gNodes=document.getElementById('ig-nodes'), vp=document.getElementById('ig-vp');
  gLinks.innerHTML=''; gNodes.innerHTML='';
  const W=svg.clientWidth||1000, H=svg.clientHeight||600;
  const nodes=model.nodes.map(n=>({...n})); const byId=Object.fromEntries(nodes.map(n=>[n.id,n]));
  const edges=model.edges.map(e=>({...e,s:byId[e.from],t:byId[e.to]})).filter(e=>e.s&&e.t);
  // seed positions: hubs on a ring, contracts near their hub
  let seed=42; const rnd=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;};
  const hubs=nodes.filter(n=>n.kind==='hub');
  hubs.forEach((h,i)=>{ const a=i/Math.max(1,hubs.length)*Math.PI*2; h.x=W/2+Math.cos(a)*Math.min(W,H)*0.28; h.y=H/2+Math.sin(a)*Math.min(W,H)*0.28; h.vx=h.vy=0; });
  nodes.filter(n=>n.kind==='contract').forEach(n=>{ const h=byId['hub:'+n.group]||{x:W/2,y:H/2}; n.x=h.x+(rnd()-.5)*120; n.y=h.y+(rnd()-.5)*120; n.vx=n.vy=0; });
  nodes.forEach(n=>{ if(n.kind==='hub'){ n.w=Math.max(96,Math.min(180,n.label.length*7+30)); n.h=40; } else { n.w=Math.max(92,Math.min(190,n.label.length*6.3+26)); n.h=n.sub?40:30; } });
  // svg build
  edges.forEach(e=>{ e.el=document.createElementNS('http://www.w3.org/2000/svg','path'); e.el.setAttribute('class','ig-link'); e.el.setAttribute('marker-end','url(#ig-arrow)'); gLinks.appendChild(e.el); });
  // adjacency (undirected) for the hover-focus highlight
  const adj={}; nodes.forEach(n=>adj[n.id]=new Set()); edges.forEach(e=>{ adj[e.from].add(e.to); adj[e.to].add(e.from); });
  nodes.forEach(n=>{
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','ig-node'+(n.mut?' mut':'')+(n.hit?' hit':'')); n.g=g;
    const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('class','ig-chip'); rect.setAttribute('rx','10'); rect.setAttribute('width',n.w); rect.setAttribute('height',n.h);
    rect.setAttribute('fill', n.kind==='hub'?'#08211E':'#FDFAF6');
    g.appendChild(rect);
    if(n.kind==='contract'){ const bar=document.createElementNS('http://www.w3.org/2000/svg','rect');
      bar.setAttribute('x',0); bar.setAttribute('y',0); bar.setAttribute('width',5); bar.setAttribute('height',n.h); bar.setAttribute('rx',2.5); bar.setAttribute('fill',n.dot); bar.setAttribute('pointer-events','none'); g.appendChild(bar); }
    const lab=document.createElementNS('http://www.w3.org/2000/svg','text');
    lab.setAttribute('class','ig-lab'); lab.setAttribute('x',n.kind==='hub'?11:13); lab.setAttribute('y',n.sub?17:19);
    lab.setAttribute('fill', n.kind==='hub'?'#EAF6F1':'#08211E'); lab.setAttribute('font-weight', n.kind==='hub'?'700':'600');
    lab.textContent = n.label.length>24?n.label.slice(0,23)+'…':n.label; g.appendChild(lab);
    if(n.sub){ const sub=document.createElementNS('http://www.w3.org/2000/svg','text');
      sub.setAttribute('class','ig-sub'); sub.setAttribute('x',n.kind==='hub'?11:13); sub.setAttribute('y',31);
      sub.setAttribute('fill', n.kind==='hub'?'#9FD5C2':'#8a7d6a'); sub.textContent=n.sub.length>26?n.sub.slice(0,25)+'…':n.sub; g.appendChild(sub); }
    if(n.badge){ // gold pill pinned to the chip's top-right corner (AI annotation)
      const bt=n.badge.length>14?n.badge.slice(0,13)+'…':n.badge, bw=bt.length*5.4+12;
      const br=document.createElementNS('http://www.w3.org/2000/svg','rect');
      br.setAttribute('x',n.w-bw+8); br.setAttribute('y',-8); br.setAttribute('width',bw); br.setAttribute('height',15); br.setAttribute('rx',7.5);
      br.setAttribute('fill','#C79A3E'); br.setAttribute('stroke','#FDFAF6'); br.setAttribute('stroke-width','1.5'); br.setAttribute('pointer-events','none'); g.appendChild(br);
      const bl=document.createElementNS('http://www.w3.org/2000/svg','text');
      bl.setAttribute('class','ig-badge-txt'); bl.setAttribute('x',n.w-bw+14); bl.setAttribute('y',2.5); bl.setAttribute('fill','#231A05');
      bl.textContent=bt; g.appendChild(bl); }
    gNodes.appendChild(g);
    g.addEventListener('pointerdown',e=>igStartDrag(e,n));
    g.addEventListener('pointerenter',()=>{ if(IG&&!IG.dragging) igPaint(n); });
    g.addEventListener('pointerleave',()=>{ if(IG&&!IG.dragging) igPaint(null); });
    g.addEventListener('click',e=>{ e.stopPropagation(); if(IG&&IG.dragMoved) return;
      // contract -> explain it in the dock (workspace stays one click away in the card);
      // hub -> keep only its group
      if(n.kind==='contract') igExplain(n.id); else igFilterToGroup(n.label); });
  });
  return { svg, vp, nodes, edges, byId, adj, W, H, view:{x:0,y:0,k:1}, dragging:null, dragMoved:false };
}
// hover-focus: highlight the card + its connections, dim the rest (mirrors the reference)
function igPaint(focus){
  if(!IG) return;
  if(!focus){ IG.nodes.forEach(n=>n.g.classList.remove('hi','dim'));
    IG.edges.forEach(e=>{ e.el.classList.remove('hi','dim'); e.el.setAttribute('marker-end','url(#ig-arrow)'); }); return; }
  const near=IG.adj[focus.id]||new Set();
  IG.nodes.forEach(n=>{ const on=n.id===focus.id||near.has(n.id); n.g.classList.toggle('hi',n.id===focus.id); n.g.classList.toggle('dim',!on); });
  IG.edges.forEach(e=>{ const on=e.from===focus.id||e.to===focus.id; e.el.classList.toggle('hi',on); e.el.classList.toggle('dim',!on); e.el.setAttribute('marker-end',on?'url(#ig-arrowHi)':'url(#ig-arrow)'); });
}
// two-way linking: light up an explicit set of contract ids (hover from the dock)
function igPaintIds(ids){
  if(!IG) return;
  if(!ids||!ids.length){ igPaint(null); return; }
  const set=ids instanceof Set?ids:new Set(ids);
  IG.nodes.forEach(n=>{ const on=set.has(n.id)||(n.kind==='hub'&&[...(IG.adj[n.id]||[])].some(id=>set.has(id)));
    n.g.classList.toggle('hi',set.has(n.id)); n.g.classList.toggle('dim',!on); });
  IG.edges.forEach(e=>{ const on=set.has(e.to)||set.has(e.from);
    e.el.classList.toggle('hi',on); e.el.classList.toggle('dim',!on);
    e.el.setAttribute('marker-end',on?'url(#ig-arrowHi)':'url(#ig-arrow)'); });
}
function igFilterToGroup(label){ const ids=state.contracts.filter(c=>groupLabelOf(c,intel.groupBy,intel.groups)===label).map(c=>c.id);
  addLens({label:'Group: '+label, ids, action:'filter'}); rebuildIntelGraph(); }
// node click -> explain the contract inside the dock (Open workspace is the secondary action)
function igExplain(id){
  const c=getContract(id); if(!c) return;
  if(!intel.dockOpen){ intel.dockOpen=true; igSyncDockWidth(); }
  intel.history.push({role:'assistant', explainId:id});

function igStartDrag(e,n){ e.stopPropagation(); IG.dragging=n; IG.dragMoved=false; n.g.setPointerCapture(e.pointerId);
  const p=igToWorld(e.clientX,e.clientY); IG.dragOff={x:n.x-p.x,y:n.y-p.y};
  const mv=ev=>{ if(!IG.dragging)return; const p=igToWorld(ev.clientX,ev.clientY); IG.dragging.x=p.x+IG.dragOff.x; IG.dragging.y=p.y+IG.dragOff.y; IG.dragging.vx=IG.dragging.vy=0; IG.dragMoved=true; };
  const up=()=>{ IG.dragging=null; window.removeEventListener('pointermove',mv); window.removeEventListener('pointerup',up); setTimeout(()=>{if(IG)IG.dragMoved=false;},50); };
  window.addEventListener('pointermove',mv); window.addEventListener('pointerup',up);
}
function igToWorld(cx,cy){ const r=IG.svg.getBoundingClientRect(); return {x:(cx-r.left-IG.view.x)/IG.view.k,y:(cy-r.top-IG.view.y)/IG.view.k}; }
function igApplyView(){ IG.vp.setAttribute('transform',`translate(${IG.view.x},${IG.view.y}) scale(${IG.view.k})`); }
function igTick(){
  const {nodes,edges,W,H}=IG;
  for(let i=0;i<nodes.length;i++){ const a=nodes[i];
    for(let j=i+1;j<nodes.length;j++){ const b=nodes[j];
      let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy||1,d=Math.sqrt(d2); dx/=d;dy/=d;
      if(d2<140000){ const f=6500/d2; a.vx+=dx*f;a.vy+=dy*f; b.vx-=dx*f;b.vy-=dy*f; }
      const padX=(a.w+b.w)/2+16, padY=(a.h+b.h)/2+14, ox=padX-Math.abs(a.x-b.x), oy=padY-Math.abs(a.y-b.y);
      if(ox>0&&oy>0){ if(ox<oy){ const s=ox/2*Math.sign(a.x-b.x||dx); a.vx+=s*0.5;b.vx-=s*0.5; } else { const s=oy/2*Math.sign(a.y-b.y||dy); a.vy+=s*0.5;b.vy-=s*0.5; } }
    } }
  edges.forEach(e=>{ let dx=e.t.x-e.s.x,dy=e.t.y-e.s.y,d=Math.sqrt(dx*dx+dy*dy)||1; const f=(d-120)*0.02; dx/=d;dy/=d; e.s.vx+=dx*f;e.s.vy+=dy*f; e.t.vx-=dx*f;e.t.vy-=dy*f; });
  nodes.forEach(n=>{ n.vx+=(W/2-n.x)*0.0016; n.vy+=(H/2-n.y)*0.0016;
    if(n===IG.dragging)return; n.vx*=0.86;n.vy*=0.86; n.vx=Math.max(-35,Math.min(35,n.vx));n.vy=Math.max(-35,Math.min(35,n.vy)); n.x+=n.vx;n.y+=n.vy; });
}
function igRender(){
  IG.nodes.forEach(n=>n.g.setAttribute('transform',`translate(${n.x-n.w/2},${n.y-n.h/2})`));
  IG.edges.forEach(e=>{ const dx=e.t.x-e.s.x,dy=e.t.y-e.s.y,d=Math.sqrt(dx*dx+dy*dy)||1,nx=dx/d,ny=dy/d;
    const a=igClamp(e.s,nx,ny), b=igClamp(e.t,-nx,-ny);
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2, cx=mx-ny*16, cy=my+nx*16;   // gentle curve, like the reference
    e.el.setAttribute('d',`M${a.x},${a.y} Q${cx},${cy} ${b.x},${b.y}`); });
}
function igClamp(n,dx,dy){ const hw=n.w/2+2,hh=n.h/2+2,sx=dx?hw/Math.abs(dx):1e9,sy=dy?hh/Math.abs(dy):1e9,s=Math.min(sx,sy); return {x:n.x+dx*s,y:n.y+dy*s}; }

function rebuildIntelGraph(){

          <marker id="ig-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#CDC2AB"></path></marker>
          <marker id="ig-arrowHi" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#086B54"></path></marker>
        </defs><g id="ig-vp"><g id="ig-links"></g><g id="ig-nodes"></g></g></svg>

      </div>

    </div>
  </div>`;

  renderIntelDock();
  rebuildIntelGraph();

  // pan & zoom
  const svg=document.getElementById('ig-svg');
  svg.addEventListener('wheel',e=>{ e.preventDefault(); if(!IG)return; const s=Math.exp(-e.deltaY*0.0012),nk=Math.max(0.35,Math.min(2.4,IG.view.k*s));
    const r=svg.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top; IG.view.x=mx-(mx-IG.view.x)*(nk/IG.view.k); IG.view.y=my-(my-IG.view.y)*(nk/IG.view.k); IG.view.k=nk; igApplyView(); },{passive:false});
  let pan=null;
  svg.addEventListener('pointerdown',e=>{ if(e.target.closest('.ig-node'))return; if(!IG)return; pan={x:e.clientX-IG.view.x,y:e.clientY-IG.view.y}; svg.classList.add('cursor-grabbing'); });
  window.addEventListener('pointermove',e=>{ if(pan&&IG){ IG.view.x=e.clientX-pan.x; IG.view.y=e.clientY-pan.y; igApplyView(); } });
  window.addEventListener('pointerup',()=>{ pan=null; svg.classList.remove('cursor-grabbing'); });

  // controls
  document.getElementById('ig-group').addEventListener('change',e=>{ intel.groupBy=e.target.value; intel.groups=null; rebuildIntelGraph(); });

  // animation loop (stops when leaving intel)
  (function loop(){ if(state.view!=='intel'||myRAF!==intelRAF||!IG) return; igTick(); igRender(); requestAnimationFrame(loop); })();
  setActiveNav('intel');
}

function closePartyModal(){ document.getElementById('party-scrim')?.classList.remove('open'); }
function openPartyModal(name){
  const scrim=document.getElementById('party-scrim'), modal=document.getElementById('party-modal');
  const own = state.contracts.filter(c=>c.counterparty===name);
  // pull in relation-linked contracts + their parties
  const ownIds=new Set(own.map(c=>c.id));
  const linked=[];
  REL_SEEDS.forEach(r=>{
    const a=state.contracts.find(c=>c.name===r.from), b=state.contracts.find(c=>c.name===r.to);
    if(!a||!b) return;
    if(ownIds.has(a.id)&&!ownIds.has(b.id)) linked.push(b);
    if(ownIds.has(b.id)&&!ownIds.has(a.id)) linked.push(a);
  });
  const nodes=[], edges=[];
  const trunc=(s,n=22)=>s.length>n?s.slice(0,n-1)+'\u2026':s;
  nodes.push({id:'p:'+name, type:'party', label:trunc(name), sub:own.length+' deals', bar:'#08211E', kind:'party'});
  const addC=c=>{ if(nodes.some(n=>n.id===c.id)) return;
    nodes.push({id:c.id, type:'contract', c, label:trunc(c.name), sub:!isMonetary(c)?'non-monetary':(c.value?fmtKESshort(c.value):c.status), bar:STATUS_BAR[c.status], kind:c.folder}); };
  own.forEach(c=>{ addC(c); edges.push({from:c.id,to:'p:'+name,label:'party to'}); });
  linked.forEach(c=>{ addC(c);
    if(c.counterparty && c.counterparty!==name){
      const pid='p:'+c.counterparty;
      if(!nodes.some(n=>n.id===pid)) nodes.push({id:pid,type:'party',label:trunc(c.counterparty),sub:'counterparty',bar:'#08211E',kind:'party'});
      edges.push({from:c.id,to:pid,label:'party to'});
    }});
  REL_SEEDS.forEach(r=>{
    const a=state.contracts.find(c=>c.name===r.from), b=state.contracts.find(c=>c.name===r.to);
    if(a&&b&&nodes.some(n=>n.id===a.id)&&nodes.some(n=>n.id===b.id)) edges.push({from:a.id,to:b.id,label:r.label});
  });
  const byId=Object.fromEntries(nodes.map(n=>[n.id,n]));
  edges.forEach(e=>{e.s=byId[e.from]; e.t=byId[e.to];});
  const W=640,H=340;
  nodes.forEach(n=>{ n.w=Math.max(104,Math.min(170,n.label.length*6.4+50)); n.h=38; n.x=0; n.y=0; });
  const savedPos=state.mapPos; state.mapPos={};   // fresh layout, don't reuse global cache
  layoutGraph(nodes, edges, W, H);
  state.mapPos=savedPos;

  const val=own.filter(x=>x.status!=='Declined').reduce((s,x)=>s+Number(x.value||0),0);
  modal.innerHTML=`
  <div class="view-enter bg-white rounded-2xl border border-brand-100 shadow-2xl shadow-brand-900/25 overflow-hidden">
    <div class="flex items-center gap-3 px-5 py-4 border-b border-brand-100/60">
      <span class="h-9 w-9 grid place-items-center rounded-lg bg-brand-900 text-gold-400">${icon('users')}</span>
      <div class="flex-1 min-w-0">
        <div class="font-display font-600 text-brand-900 truncate">${name}</div>
        <div class="text-[11px] font-mono text-brand-800/65">${own.length} agreements \u00b7 ${fmtKES(val)} exposure \u00b7 relationship neighborhood</div>
      </div>
      <button id="pm-close" class="h-8 w-8 grid place-items-center rounded-lg hover:bg-brand-50 text-brand-400 hover:text-brand-800 transition">${icon('x')}</button>
    </div>
    <svg viewBox="0 0 ${W} ${H}" class="w-full bg-canvas/60">
      ${edges.map((e,i)=>`<path class="mlink" d="M${e.s.x} ${e.s.y} L${e.t.x} ${e.t.y}"/>
        <text class="mlabel show" x="${(e.s.x+e.t.x)/2}" y="${(e.s.y+e.t.y)/2-3}" text-anchor="middle">${e.label}</text>`).join('')}
      ${nodes.map(n=>`
      <g class="mnode" ${n.type==='contract'?`data-open="${n.id}"`:''} transform="translate(${n.x},${n.y})">
        <rect class="chipbg" x="${-n.w/2}" y="${-n.h/2}" width="${n.w}" height="${n.h}" rx="8"/>
        <rect x="${-n.w/2}" y="${-n.h/2}" width="4" height="${n.h}" rx="2" fill="${n.bar}"/>
        <text x="${-n.w/2+10}" y="${-2}" font-size="10" font-weight="600" fill="#08211E">${n.label.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</text>
        <text x="${-n.w/2+10}" y="${10}" font-size="7.5" font-family="'JetBrains Mono',monospace" fill="#8aa198">${n.sub}</text>
      </g>`).join('')}
    </svg>
    <div class="px-5 py-3 border-t border-brand-100/60 text-[11px] text-brand-800/65 flex items-center justify-between">
      <span>Click a contract node to open its workspace</span>
      <span class="font-mono">${nodes.length} nodes \u00b7 bounded neighborhood</span>
    </div>
  </div>`;
  scrim.classList.add('open');
  modal.querySelector('#pm-close').addEventListener('click',closePartyModal);
  modal.querySelectorAll('[data-open]').forEach(el=>el.addEventListener('click',()=>{ closePartyModal(); openWorkspace(el.getAttribute('data-open')); }));
}

/* ============================================================
   AI CONTRACT SCAN  (rule engine over live contract data)
   ============================================================ */
// Severity chips use the design's exact warm hexes (arbitrary Tailwind values
// so existing `${sm.chip}` className call-sites keep working unchanged).
const SEV_META = {
  high:{label:'High', chip:'bg-[#F4E2DD] text-[#9A342A] border-[#E6C9C1]', dot:'bg-[#B23A2E]', text:'text-[#9A342A]'},
  med:{label:'Medium', chip:'bg-[#F0E6CF] text-[#8A5E1B] border-[#E2D2AE]', dot:'bg-[#C79A3E]', text:'text-[#8A5E1B]'},
  low:{label:'Low', chip:'bg-[#ECE7DC] text-[#6B6559] border-[#DED5C6]', dot:'bg-[#9A9484]', text:'text-[#6B6559]'},
};
const SEV_RANK = {high:3, med:2, low:1};
const KIND_LABEL = {risk:'Risk', missing:'Missing', ambiguity:'Ambiguity'};

function scanRules(c){
  if(isUpload(c)) return uploadScanRules(c);
  const F=[], f=c.fields||{};
  const add=(id,sev,kind,title,anchor,what,why,fix)=>F.push({id,sev,kind,title,anchor,what,why,fix});
  const valAnchor = c.template==='ND' ? 'c1' : 'c2';

  // --- generic, data-driven (auto-clear when fixed) ---
  if(!c.counterparty) add('g-cp','high','missing','No counterparty named','recital',
    `The opening recital names ${FIRST_PARTY} but leaves the counterparty blank.`,
    'A contract with an unnamed party is unenforceable — there is no legal person to hold to its terms or serve notice on.',
    'Enter the counterparty\u2019s full registered name (as it appears on the BRS register) in the recital.');
  if(isMonetary(c) && !(Number(c.value)>0)) add('g-val','med','missing','Contract value not set',valAnchor,
    'The commercial value field reads KES 0 or is empty.',
    'Without a stated consideration the pricing clause is incomplete, and downstream stamp duty and approval thresholds cannot be assessed.',
    'Set the agreed KES value in the highlighted field \u2014 the deal summary and dashboard will sync automatically.');
  if(!f.effDate) add('g-date','med','missing','No effective date','recital',
    'The commencement date field in the recital is empty.',
    'Obligations, term length and notice periods all count from this date; leaving it open invites disputes about when duties began.',
    'Pick the effective date in the recital\u2019s date field.');
  if(c.status!=='Signed' && !c.compliance.consent) add('g-comp','low','missing','Intent-to-sign not yet confirmed','sig',
    'The signer has not yet confirmed intent to sign electronically.',
    'A recorded intent-to-sign strengthens attribution of the electronic signature under the Business Laws (Amendment) Act 2020.',
    'Tick the intent-to-sign consent box in the verification panel before signing.');

  // --- template-specific (tuned to FMCG contract types & Kenyan practice) ---
  if(c.template==='RM'){
    if(!f.material) add('rm-mat','med','missing','Material not specified','recital',
      'The recital leaves the material description blank.',
      'An unspecified input makes the specification, quality and rejection clauses unworkable and invites delivery disputes.',
      'Name the material and grade in the recital (e.g. \u201cICUMSA 45 refined white sugar\u201d).');
    add('rm-kebs','med','risk','KEBS/EAS standard not cited','c3',
      'The quality clause references a specification generally but names no KEBS/EAS standard number.',
      'For food-grade inputs, an unnamed standard makes rejection hard to enforce and risks non-compliant material entering production.',
      'Cite the applicable KEBS/EAS standard and make conformity a condition of acceptance.');
    add('rm-index','low','ambiguity','Price index unnamed','c2',
      'Pricing is \u201creviewed against commodity indices\u201d without naming one.',
      'Different indices move differently; an unnamed benchmark invites a pricing dispute at every quarterly review.',
      'Name the specific published index and state the review formula.');
    if(Number(c.value)>50000000) add('rm-sec','med','missing','No alternate-source / security of supply','c1',
      `At ${fmtKESshort(c.value)} a year this is a critical input, yet nothing addresses supply failure.`,
      'A single-source dependency at this scale can halt production if the supplier defaults.',
      'Add a business-continuity clause: safety stock, an approved alternate source, or step-in rights.');
  }
  if(c.template==='PK'){
    add('pk-ip','med','risk','Artwork / trademark ownership not explicit','c4',
      'IP is mentioned only briefly; ownership of dies, plates and artwork is not spelled out.',
      'If the supplier claims rights over tooling or artwork, a switch of supplier can be blocked or delayed.',
      'State expressly that all artwork, trademarks and Buyer-funded tooling remain the Buyer\u2019s property, returnable on request.');
    add('pk-moq','low','ambiguity','MOQ & obsolete-stock liability not addressed','c3',
      'Forecast and safety stock are covered, but minimum order quantities and who carries obsolete artwork stock are not.',
      'On an artwork change, unsold old-artwork packaging becomes a write-off nobody has agreed to fund.',
      'Set MOQs and agree that the Buyer funds obsolete stock only where it gave firm commitments.');
  }

const openFindings = c => !c.scan ? [] : c.scan.findings.filter(x=>!c.scan.dismissed.includes(x.id));
const worstSevOf = list => list.reduce((w,x)=>SEV_RANK[x.sev]>SEV_RANK[w]?x.sev:w,'low');
function runScan(c){
  const prev = c.scan ? c.scan.dismissed : [];
  c.scan = { at:new Date().toLocaleString('en-KE',{dateStyle:'medium',timeStyle:'short'}), findings:scanRules(c), dismissed:prev };
}

let scanUI = { running:false, filter:'all', expanded:new Set() };

function renderScanSection(c){
  const host = document.getElementById('scan-section'); if(!host) return;
  const open = openFindings(c);
  const worst = open.length ? worstSevOf(open) : null;

  let body;
  if(scanUI.running){
    body = `<div class="flex items-center gap-2.5 rounded-lg bg-brand-50 border border-brand-100 px-3 py-2.5 text-xs text-brand-700">
      <span class="scan-pulse text-brand-500">${icon('scan','w-4 h-4')}</span>
      <span>Scanning clauses against Kenyan practice checks\u2026</span></div>`;
  } else if(!c.scan){
    body = `
      <p class="text-xs text-brand-800/70 leading-relaxed">${isUpload(c)?'Run an AI review checklist over this received document \u2014 governing law, liability, payment and exit terms to confirm before you sign, tuned to Kenyan practice.':'Review this contract against risk checks tuned for Kenyan practice \u2014 missing clauses, enforceability gaps and market-norm deviations, each pinned to the clause it concerns.'}</p>
      <button id="scan-run" class="mt-3 w-full flex items-center justify-center gap-2 rounded-lg bg-brand-900 text-white py-2.5 text-sm font-medium hover:bg-brand-800 transition">${icon('scan')} Run AI scan</button>`;
  } else {
    const list = open.filter(x=>scanUI.filter==='all'||x.sev===scanUI.filter);
    const counts = s => open.filter(x=>x.sev===s).length;
    const chip = (key,label)=>`<button data-scan-filter="${key}" class="text-[10px] px-2 py-0.5 rounded-full border font-medium transition ${scanUI.filter===key?'bg-brand-900 text-white border-brand-900':'bg-white text-brand-700 border-brand-200 hover:border-brand-400'}">${label}</button>`;
    const cards = list.length ? list.map(x=>{
      const sm=SEV_META[x.sev], exp=scanUI.expanded.has(x.id);
      return `
      <div class="rounded-lg border ${exp?'border-brand-300':'border-brand-100'} bg-white overflow-hidden">
        <button data-scan-toggle="${x.id}" class="w-full text-left px-3 py-2.5 flex items-center gap-2 hover:bg-brand-50/50 transition">
          <span class="h-1.5 w-1.5 rounded-full ${sm.dot} shrink-0"></span>
          <span class="text-xs font-medium text-brand-900 flex-1 min-w-0 truncate">${x.title}</span>
          ${x.confidence?`<span class="hidden sm:inline text-[8px] uppercase tracking-wider text-brand-800/35" title="Heuristic confidence">${x.confidence}</span>`:''}
          <span class="text-[9px] uppercase tracking-wider font-semibold ${sm.text}">${sm.label}</span>
          <span class="text-brand-300 transition ${exp?'rotate-180':''}">${icon('chevD','w-3.5 h-3.5')}</span>
        </button>
        ${exp?`
        <div class="px-3 pb-3 space-y-2 border-t border-brand-100/60 pt-2.5">
          <div><div class="text-[9px] font-semibold uppercase tracking-wider text-brand-800/65 mb-0.5">What it says${x.confidence?` · <span class="text-brand-800/35">${x.confidence} confidence</span>`:''}</div><p class="text-[11px] leading-relaxed text-brand-800/80">${x.what}</p></div>
          <div><div class="text-[9px] font-semibold uppercase tracking-wider text-brand-800/65 mb-0.5">Why it matters</div><p class="text-[11px] leading-relaxed text-brand-800/80">${x.why}</p></div>
          <div><div class="text-[9px] font-semibold uppercase tracking-wider text-brand-800/65 mb-0.5">Suggested fix</div><p class="text-[11px] leading-relaxed text-brand-800/80">${x.fix}</p></div>
          <div class="flex items-center gap-2 pt-1">
            <button data-scan-goto="${x.anchor}" class="flex items-center gap-1 text-[11px] font-medium text-brand-600 hover:text-brand-800 transition">${icon('target','w-3 h-3')} ${x.anchor==='doc'?'Go to document':'Go to clause'}</button>
            <button data-scan-dismiss="${x.id}" class="ml-auto text-[11px] font-medium text-brand-800/65 hover:text-brand-800 transition">Dismiss</button>
          </div>
        </div>`:''}
      </div>`;
    }).join('') : `<div class="text-center text-[11px] text-brand-800/70 py-3">No ${scanUI.filter==='all'?'open':scanUI.filter+'-severity'} findings \u2014 looking clean.</div>`;

    body = `
      <div class="flex items-center gap-1.5 mb-2 flex-wrap">
        ${chip('all',`All ${open.length}`)}${chip('high',`High ${counts('high')}`)}${chip('med',`Med ${counts('med')}`)}${chip('low',`Low ${counts('low')}`)}
      </div>
      <div class="space-y-1.5 max-h-64 overflow-y-auto scroll-thin pr-0.5">${cards}</div>
      <div class="mt-2 flex items-center justify-between text-[10px] text-brand-800/60">
        <span>Scanned ${c.scan.at}</span>
        <button id="scan-rerun" class="font-medium text-brand-600 hover:text-brand-800 transition">Re-scan</button>
      </div>`;
  }

  host.innerHTML = `
    <div class="px-5 py-4">
      <div class="flex items-center gap-2 mb-3">
        <span class="text-gold-500">${icon('scan')}</span>
        <h3 class="text-sm font-display font-600 text-brand-900">AI Contract Scan</h3>
        ${(!scanUI.running && c.scan) ? `<span class="ml-auto inline-flex items-center gap-1.5 rounded-full border px-2 py-0.5 text-[10px] font-medium ${open.length?SEV_META[worst].chip:'bg-brand-50 text-brand-700 border-brand-200'}">${open.length?`${open.length} open`:'All clear'}</span>` : ''}
      </div>
      ${body}
    </div>`;

  // wiring
  host.querySelector('#scan-run')?.addEventListener('click',()=>{
    scanUI.running=true; renderScanSection(c);
    setTimeout(()=>{ runScan(c); scanUI.running=false; scanUI.filter='all'; scanUI.expanded=new Set();
      const n=openFindings(c).length;
      logAudit(c,'Scanned',`AI contract scan run \u2014 ${n} open finding${n===1?'':'s'}`);
      persist(c);
      renderScanSection(c); renderSignButton(c); renderAuditSection(c);
      toast(n?`Scan complete \u2014 ${n} finding${n===1?'':'s'} pinned to clauses`:'Scan complete \u2014 no issues found');
    }, 1100);
  });
  host.querySelector('#scan-rerun')?.addEventListener('click',()=>{
    scanUI.running=true; renderScanSection(c);
    setTimeout(()=>{ runScan(c); scanUI.running=false; persist(c); renderScanSection(c); renderSignButton(c); toast('Re-scan complete \u2014 findings refreshed'); }, 700);
  });
  host.querySelectorAll('[data-scan-filter]').forEach(b=>b.addEventListener('click',()=>{ scanUI.filter=b.getAttribute('data-scan-filter'); renderScanSection(c); }));
  host.querySelectorAll('[data-scan-toggle]').forEach(b=>b.addEventListener('click',()=>{
    const id=b.getAttribute('data-scan-toggle');
    scanUI.expanded.has(id)?scanUI.expanded.delete(id):scanUI.expanded.add(id);
    renderScanSection(c);
  }));
  host.querySelectorAll('[data-scan-dismiss]').forEach(b=>b.addEventListener('click',()=>{
    c.scan.dismissed.push(b.getAttribute('data-scan-dismiss'));
    persist(c);
    renderScanSection(c); renderSignButton(c);
  }));
  host.querySelectorAll('[data-scan-goto]').forEach(b=>b.addEventListener('click',()=>{
    const anchor=b.getAttribute('data-scan-goto');
    const el=anchor==='doc' ? document.querySelector('#doc-canvas [data-anchor="doc"]') : document.querySelector(`#doc-canvas [data-anchor="${anchor}"]`);
    if(!el) return;
    el.scrollIntoView({behavior:'smooth',block:'center'});
    el.classList.remove('anchor-flash'); void el.offsetWidth; el.classList.add('anchor-flash');
  }));
}

const ai = { open:false, history:[] };
const AI_SUGGESTIONS = [
  'What is pending counterparty action?',
  'Total value of signed contracts',
  'Which contract has the highest value?',
  'Find contracts with Naivas',
  'How many drafts do I have?',
  'Which contracts have open risk findings?',
  'What expires in the next 90 days?',
];

function openAI(prefill){
  document.getElementById('ai-panel').classList.add('open');
  document.getElementById('ai-scrim').classList.add('open');
  ai.open=true;
  if(!ai.history.length){
    aiPush('assistant',{text:`Habari! I'm your contract intelligence assistant. I can search, aggregate and summarize everything in your HaTi workspace — try one of the suggestions below, or ask in your own words.`});
  }
  renderAIFeed(); renderAISuggest();
  const inp=document.getElementById('ai-input');
  if(prefill){ inp.value=prefill; aiSubmit(); } else inp.focus();
}
function closeAI(){
  document.getElementById('ai-panel').classList.remove('open');
  document.getElementById('ai-scrim').classList.remove('open');
  ai.open=false;
}
function aiPush(role,payload){ ai.history.push({role,...payload}); }

function renderAISuggest(){
  const el=document.getElementById('ai-suggest');
  el.innerHTML=AI_SUGGESTIONS.map(q=>`<button data-sug="${q}" class="text-[11px] rounded-full border border-brand-100 bg-canvas hover:bg-brand-50 hover:border-brand-300 px-2.5 py-1 text-brand-700 transition">${q}</button>`).join('');
  el.querySelectorAll('[data-sug]').forEach(b=>b.addEventListener('click',()=>{ document.getElementById('ai-input').value=b.getAttribute('data-sug'); aiSubmit(); }));
}
function renderAIFeed(typing=false){
  const feed=document.getElementById('ai-feed');
  feed.innerHTML=ai.history.map(m=>{
    if(m.role==='user'){
      return `<div class="ai-msg flex justify-end"><div class="max-w-[85%] rounded-2xl rounded-br-md bg-brand-900 text-white px-4 py-2.5 text-sm">${m.text}</div></div>`;
    }
    return `<div class="ai-msg flex gap-2.5">
      <div class="h-7 w-7 shrink-0 grid place-items-center rounded-lg bg-gold-500/15 text-gold-600 mt-0.5">${icon('sparkle','w-3.5 h-3.5')}</div>
      <div class="max-w-[88%] space-y-2">
        ${m.text?`<div class="rounded-2xl rounded-tl-md bg-canvas border border-brand-100 px-4 py-2.5 text-sm text-brand-900 leading-relaxed">${m.text}</div>`:''}
        ${m.cards?m.cards:''}
      </div>
    </div>`;
  }).join('') + (typing?`
    <div class="ai-msg flex gap-2.5">
      <div class="h-7 w-7 shrink-0 grid place-items-center rounded-lg bg-gold-500/15 text-gold-600 mt-0.5">${icon('sparkle','w-3.5 h-3.5')}</div>
      <div class="rounded-2xl rounded-tl-md bg-canvas border border-brand-100 px-4 py-3 typing"><span></span><span></span><span></span></div>
    </div>`:'');

function aiContractCard(c){
  return `
  <button data-ai-open="${c.id}" class="w-full text-left flex items-center gap-2.5 rounded-xl border border-brand-100 bg-white hover:border-brand-300 hover:shadow-sm px-3 py-2.5 transition group">

      <span class="block text-xs font-medium text-brand-900 truncate group-hover:text-brand-600 transition">${c.name}</span>
      <span class="block text-[10px] font-mono text-brand-800/65 truncate">${c.counterparty||'—'} · ${!isMonetary(c)?'non-monetary':(c.value?fmtKESshort(c.value):'no value')}</span>
    </span>
    ${statusChip(c.status)}
  </button>`;

const aiCards = list => `<div class="space-y-1.5">${list.map(aiContractCard).join('')}</div>`;

/* --- the intent engine --- */
function aiAnswer(qRaw){
  const q=qRaw.toLowerCase();
  const cs=state.contracts;
  const has=(...words)=>words.some(w=>q.includes(w));

  // 1) direct contract-ID summary
  const idMatch=qRaw.match(/MK-\d+/i);
  if(idMatch||has('summarize','summary','brief me','tell me about')){
    let c=null;
    if(idMatch) c=getContract(idMatch[0].toUpperCase());
    if(!c) c=cs.find(x=>q.includes(x.counterparty.toLowerCase().split(' ')[0]) && x.counterparty);
    if(!c) c=cs.find(x=>x.name.toLowerCase().split(' ').some(w=>w.length>4&&q.includes(w)));
    if(c){
      return { text:`<strong>${c.name}</strong> (${c.id}) is ${isUpload(c)?'an uploaded <strong>external document</strong>':`a ${cKind(c)}`} with <strong>${c.counterparty||'no counterparty yet'}</strong>, filed under ${FOLDERS[c.folder].name}. Value: <strong>${!isMonetary(c)?'non-monetary (no consideration passes)':(c.value?fmtKES(c.value)+(c.valueType==='estimated'?' (estimated)':''):'not set')}</strong> · Status: <strong>${c.status}</strong> · Last action ${c.lastAction}. ${c.status==='Signed'?'It is fully executed with an SHA-256 seal and verified IPRS + PKI compliance.':c.status==='Under Review'?'It is waiting on counterparty action — compliance checks are '+((c.compliance.iprs&&c.compliance.pki)?'complete':'still open')+'.':c.status==='Draft'?'It is still in draft — fill the counterparty and value to move it into review.':'It was declined and is closed without signature.'} There are ${c.comments.length} comments on the thread.${(()=>{ if(!c.scan) return ' It has not been AI-scanned yet.'; const o=openFindings(c); return o.length?` The AI scan shows <strong>${o.length} open finding${o.length===1?'':'s'}</strong> (worst: ${SEV_META[worstSevOf(o)].label.toLowerCase()}).`:' The AI scan is clean — no open findings.'; })()}`,
        cards:aiCards([c]) };
    }
  }

  // 1a) expiry / renewal queries
  if(has('expir','renew','lapse','ending','due soon')){
    const exp=cs.filter(c=>c.expiry && c.status!=='Declined')
      .map(c=>({c,d:Math.ceil((new Date(c.expiry+'T00:00:00')-Date.now())/86400000)}))
      .filter(x=>x.d>=0&&x.d<=90).sort((a,b)=>a.d-b.d);
    if(!exp.length) return { text:`Nothing in the active book lapses in the next 90 days.` };
    const soon=exp.filter(x=>x.d<=30).length;
    return { text:`<strong>${exp.length} contract${exp.length===1?'':'s'}</strong> lapse within 90 days${soon?`, including <strong>${soon} inside 30 days</strong>`:''}. Closest first — ${exp[0].c.name} with ${exp[0].c.counterparty} in <strong>${exp[0].d} days</strong>:`, cards:aiCards(exp.map(x=>x.c)) };
  }
  // 1b) risk / findings / scan queries
  if(has('risk','finding','findings','issue','issues','problem','scan','red flag','exposure')){
    const scanned=cs.filter(c=>c.scan);
    if(!scanned.length) return { text:`No contracts have been scanned yet. Open any contract and hit <strong>Run AI scan</strong> in the workspace — I’ll check its clauses against Kenyan practice and pin every finding to the clause it concerns.` };
    const withOpen=scanned.filter(c=>openFindings(c).length).sort((a,b)=>SEV_RANK[worstSevOf(openFindings(b))]-SEV_RANK[worstSevOf(openFindings(a))]);
    if(!withOpen.length) return { text:`${scanned.length} contract${scanned.length===1?' has':'s have'} been scanned and every finding is resolved or dismissed — the reviewed book is clean.`, cards:aiCards(scanned) };
    const high=withOpen.reduce((s,c)=>s+openFindings(c).filter(x=>x.sev==='high').length,0);
    return { text:`<strong>${withOpen.length} contract${withOpen.length===1?'':'s'}</strong> ${withOpen.length===1?'has':'have'} open scan findings${high?`, including <strong>${high} high-severity</strong>`:''}. Sorted by worst exposure:`, cards:aiCards(withOpen) };
  }
  // 2) pending / under review
  if(has('pending','under review','waiting','counterparty action','awaiting')){
    const list=cs.filter(c=>c.status==='Under Review');
    const val=list.reduce((s,c)=>s+Number(c.value||0),0);
    return { text:`You have <strong>${list.length} contracts pending counterparty action</strong>, worth ${fmtKES(val)} combined. Tap any to open its workspace:`, cards:aiCards(list) };
  }
  // 3) drafts
  if(has('draft')){
    const list=cs.filter(c=>c.status==='Draft');
    return { text:`There are <strong>${list.length} drafts</strong> in your workspace. Drafts move to "Under Review" automatically once a counterparty and value are set.`, cards:aiCards(list) };
  }
  // 4) signed / executed
  if(has('signed','executed','sealed','completed')){
    const list=cs.filter(c=>c.status==='Signed');
    const val=list.reduce((s,c)=>s+Number(c.value||0),0);
    return { text:`<strong>${list.length} contracts are signed and executed</strong> this month, totalling <strong>${fmtKES(val)}</strong>. All carry SHA-256 document seals with IPRS and CAK PKI verification.`, cards:aiCards(list) };
  }
  // 5) declined
  if(has('declined','expired','rejected','lost')){
    const list=cs.filter(c=>c.status==='Declined');
    return { text:`${list.length} contract${list.length===1?'':'s'} closed without signature. Worth a follow-up call:`, cards:aiCards(list) };
  }
  // 6) totals / value analytics
  if(has('total','value','worth','how much','portfolio')){
    const m=metrics();
    const byFolder=Object.values(FOLDERS).map(f=>{
      const v=folderContracts(f.id).filter(c=>c.status!=='Declined').reduce((s,c)=>s+Number(c.value||0),0);
      return `<div class="flex items-center justify-between text-xs py-1.5 border-b border-brand-100/60 last:border-0"><span class="text-brand-800/70">${f.name}</span><span class="font-mono font-medium text-brand-900">${fmtKESshort(v)}</span></div>`;
    }).join('');
    return { text:`Your active portfolio is worth <strong>${fmtKES(m.totalValue)}</strong> across ${cs.filter(c=>c.status!=='Declined').length} live agreements. Breakdown by folder:`,
      cards:`<div class="rounded-xl border border-brand-100 bg-white px-3.5 py-1.5">${byFolder}</div>` };
  }
  // 7) highest / largest
  if(has('highest','largest','biggest','top contract','most valuable')){
    const sorted=[...cs].filter(c=>c.status!=='Declined').sort((a,b)=>b.value-a.value).slice(0,3);
    return { text:`Your highest-value agreement is <strong>${sorted[0].name}</strong> at <strong>${fmtKES(sorted[0].value)}</strong>. Top three by value:`, cards:aiCards(sorted) };
  }
  // 8) counterparty / free-text search
  const terms=q.replace(/[?.,!]/g,'').split(/\s+/).filter(w=>w.length>2&&!['the','and','for','with','find','show','search','contracts','contract','any','all','have','what','which'].includes(w));
  if(terms.length){
    const list=cs.filter(c=>terms.some(t=>(c.name+' '+c.counterparty+' '+FOLDERS[c.folder].name+' '+cKind(c)).toLowerCase().includes(t)));
    if(list.length){
      return { text:`Found <strong>${list.length} contract${list.length===1?'':'s'}</strong> matching "${terms.join(', ')}":`, cards:aiCards(list) };
    }
  }
  // fallback
  return { text:`I couldn't match that to your contract data. I can help with things like: <em>"show pending contracts"</em>, <em>"total value of signed"</em>, <em>"summarize MK-103"</em>, or searching by counterparty name (e.g. <em>"Naivas"</em>).` };
}

function aiSubmit(){
  const inp=document.getElementById('ai-input');
  const q=inp.value.trim(); if(!q) return;
  inp.value='';
  aiPush('user',{text:q});
  renderAIFeed(true);
  setTimeout(()=>{
    const ans=aiAnswer(q);
    aiPush('assistant',ans);
    renderAIFeed();
  }, 650+Math.random()*500);
}

document.getElementById('ai-send').addEventListener('click',aiSubmit);
document.getElementById('ai-input').addEventListener('keydown',e=>{if(e.key==='Enter')aiSubmit();});
document.getElementById('ai-close').addEventListener('click',closeAI);
document.getElementById('ai-scrim').addEventListener('click',closeAI);
document.getElementById('ai-open-side').addEventListener('click',()=>openAI());
document.addEventListener('keydown',e=>{
  const appHidden=document.getElementById('app-shell').classList.contains('hidden');
  if(e.key==='/'&&!appHidden&&!ai.open&&!['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)){ e.preventDefault(); openAI(); }
  if(e.key==='Escape'&&ai.open) closeAI();
});

    toast(threshold>0?`Approval required at ≥ ${fmtKESshort(threshold)}`:'Approvals disabled');
  });
  document.getElementById('bk-export')?.addEventListener('click',()=>{
    downloadFile(`hati-backup-${new Date().toISOString().slice(0,10)}.json`,
      JSON.stringify({ kind:'hati-backup', v:1, exportedAt:nowISO(), org:getOrg(), users:getUsers(),
        data:{ uid, contracts:state.contracts } },null,2));
    toast('Backup downloaded');
  });
  document.getElementById('bk-import')?.addEventListener('change',e=>{
    const f=e.target.files[0]; if(!f) return;
    const rd=new FileReader();
    rd.onload=()=>{ try{
        const b=JSON.parse(rd.result);
        if(b.kind!=='hati-backup'||!b.org||!b.users) throw new Error('bad');
        if(!confirm('Restoring replaces this workspace, its users and contracts with the backup. Continue?')) return;
        lsSet(LS.org,b.org); saveUsers(b.users); if(b.data) lsSet(LS.data,b.data);
        localStorage.removeItem(LS.session); location.reload();
      }catch(err){ toast('That file is not a valid HaTi backup','err'); } };
    rd.readAsText(f);
  });
  document.getElementById('bk-reset')?.addEventListener('click',()=>{
    if(confirm('This permanently erases the workspace, all users and contracts stored in this browser. Continue?')){
      Object.values(LS).forEach(k=>localStorage.removeItem(k)); location.reload();
    }
  });
  setActiveNav('team');
}

/* ============================================================
   VIEW: REGISTER (global filterable / sortable table + bulk select)
   Client-side over the loaded working set, consistent with the folder
   view. Filters: search, lifecycle stage, contract type (folder), sort.
   ============================================================ */
const REG_PAGE=40;
const REG_STAGES=[
  {k:'all',label:'All stages'},
  {k:'Draft',label:'Drafting'},
  {k:'Under Review',label:'In Review'},
  {k:'Signed',label:'Executed'},
  {k:'Declined',label:'Closed'},
];
const REG_TYPES=[
  {k:'all',label:'All types'},
  {k:'proc',label:'Procurement'},
  {k:'mfg',label:'Manufacturing'},
  {k:'dist',label:'Distribution'},
  {k:'sales',label:'Sales'},
  {k:'mktg',label:'Marketing'},
  {k:'corp',label:'Corporate'},
];
const REG_SORTS=[
  {k:'updated',label:'Recently updated'},
  {k:'value',label:'Value (high → low)'},
  {k:'expiry',label:'Expiring soonest'},
  {k:'name',label:'Name (A → Z)'},
];
function regState(){ if(!state.reg) state.reg={query:'',stage:'all',type:'all',sort:'updated',shown:REG_PAGE,sel:{}}; return state.reg; }
function regFiltered(){
  const R=regState(); let cs=state.contracts.slice();
  if(R.stage!=='all') cs=cs.filter(c=>c.status===R.stage);
  if(R.type!=='all') cs=cs.filter(c=>c.folder===R.type);
  const q=R.query.trim().toLowerCase();
  if(q) cs=cs.filter(c=>(c.name+' '+(c.counterparty||'')+' '+c.id).toLowerCase().includes(q));
  const upd=c=>{ const t=Date.parse(c.lastAction); return isNaN(t)?0:t; };
  if(R.sort==='updated') cs.sort((a,b)=>upd(b)-upd(a));
  else if(R.sort==='value') cs.sort((a,b)=>Number(b.value||0)-Number(a.value||0));
  else if(R.sort==='name') cs.sort((a,b)=>a.name.localeCompare(b.name));
  else if(R.sort==='expiry') cs.sort((a,b)=>{ const da=a.expiry?daysUntil(a.expiry):1e9, db=b.expiry?daysUntil(b.expiry):1e9; return da-db; });
  return cs;
}
function regOwnerInitials(){ const u=currentUser(); const n=(u&&u.name)||FIRST_PARTY||'HaTi'; return n.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function regRowsHtml(cs){

  if(!cs.length) return `<tr><td colspan="7" class="px-4 py-12 text-center text-sm text-brand-800/70">No contracts match the current filters.</td></tr>`;
  const shown=Math.min(cs.length, R.shown||REG_PAGE);

  return cs.slice(0,shown).map((c,i)=>`
    <tr data-open="${c.id}" class="group hover:bg-brand-50/50 transition cursor-pointer" style="box-shadow:inset 0 -1px 0 rgba(60,40,10,.05);animation-delay:${Math.min(i,14)*22}ms">
      <td class="pl-5 pr-1 py-3.5 w-8 align-middle" onclick="event.stopPropagation()"><input type="checkbox" data-sel="${c.id}" ${R.sel[c.id]?'checked':''} class="h-4 w-4 rounded border-brand-200 accent-brand-700 align-middle"/></td>
      <td class="px-2 py-3.5">
        <div class="min-w-0"><span class="block text-[14.5px] font-600 text-ink truncate group-hover:text-brand-600 transition">${c.name}</span><span class="block text-[11px] text-ink/65 truncate mt-0.5"><span class="font-mono">${c.id}</span> · ${c.counterparty||'—'}</span></div>
      </td>
      <td class="px-2 py-3.5 hidden md:table-cell"><span class="inline-flex items-center gap-1.5 text-[13px] text-ink/70">${icon(cIcon(c),'w-4 h-4 text-brand-500')}${cKind(c)}</span></td>
      <td class="px-2 py-3.5 hidden lg:table-cell"><span class="h-6 w-6 grid place-items-center rounded-full bg-brand-100 text-[9px] font-semibold text-brand-700 font-mono" title="${(currentUser()&&currentUser().name)||FIRST_PARTY}">${ini}</span></td>
      <td class="px-2 py-3.5 text-right whitespace-nowrap text-[13px] font-600 tnum ${isMonetary(c)?'text-ink':'text-ink/40'}">${!isMonetary(c)?'n/m':(c.value?fmtKESshort(c.value):'—')}</td>
      <td class="px-2 py-3.5 hidden sm:table-cell whitespace-nowrap text-[12px] tnum text-ink/65">${c.lastAction||'—'}</td>

      ? `<tr><td colspan="7"><button id="reg-more" class="w-full px-4 py-3.5 text-[13px] font-600 text-brand-600 hover:bg-brand-50 transition" style="box-shadow:inset 0 1px 0 rgba(60,40,10,.06)">Show ${Math.min(REG_PAGE,cs.length-shown)} more · ${cs.length-shown} remaining</button></td></tr>`
      : '');
}
function regSelCount(){ const R=regState(); return Object.keys(R.sel).filter(k=>R.sel[k]).length; }
function renderRegisterBody(){
  const cs=regFiltered();
  const tb=document.getElementById('reg-tbody'); if(tb){ tb.innerHTML=regRowsHtml(cs); wireRegRows(); }

function wireRegRows(){

function regExportSelectedCsv(){

/* ============================================================
   VIEW: PIPELINE (Kanban board — drag between lifecycle stages)
   Safe drag rules: Draft <-> Under Review move freely; dragging onto
   Executed opens the workspace to verify & sign (never force-signs);
   dragging onto Closed asks to confirm the decline. Executed cards are
   locked. Viewers cannot drag. Every move persists through the normal
   path (audit + optimistic-locked server save).
   ============================================================ */
const PIPE_COLS=[
  {k:'Draft',        label:'Drafting',  color:'#9A9484'},
  {k:'Under Review', label:'In Review', color:'#C79A3E'},
  {k:'Signed',       label:'Executed',  color:'#086B54'},
  {k:'Declined',     label:'Closed',    color:'#B23A2E'},
];
const PIPE_CAP=60;
let pipeDrag=null;
function pipeCard(c){
  const drag = canEdit() && c.status!=='Signed';
  return `
    <div data-card="${c.id}" ${drag?'draggable="true"':''} class="group bg-white rounded-xl elev-1 lift p-3.5 mb-3 ${drag?'cursor-grab active:cursor-grabbing':'cursor-pointer'}">
      <div class="flex items-center justify-between gap-2 mb-1.5">
        <span class="inline-flex items-center gap-1.5 text-[10px] font-mono text-brand-800/65">
          <span class="h-5 w-5 grid place-items-center rounded-md border ${isUpload(c)?'bg-gold-500/10 text-gold-600 border-gold-500/25':'bg-brand-50 text-brand-500 border-brand-100'}">${icon(cIcon(c),'w-3 h-3')}</span>${c.id}
        </span>
        ${(()=>{ const o=openFindings(c).filter(f=>f.sev==='high').length; return o?`<span class="inline-flex items-center gap-1 rounded-full px-1.5 py-0.5 text-[9px] font-semibold" style="background:#F4E2DD;color:#9A342A">${icon('scan','w-2.5 h-2.5')}${o}</span>`:''; })()}
      </div>
      <div class="text-sm font-medium text-brand-900 leading-snug line-clamp-2 group-hover:text-brand-600 transition">${c.name}</div>
      <div class="text-[11px] text-brand-800/65 truncate mt-0.5">${c.counterparty||'No counterparty yet'}</div>
      <div class="flex items-center justify-between gap-2 mt-2.5 pt-2.5 border-t border-brand-100/50">
        <span class="inline-flex items-center gap-1 text-[10px] text-brand-800/65 truncate">${icon('folder','w-3 h-3')}<span class="truncate">${FOLDERS[c.folder]?.name||''}</span></span>
        <span class="text-[11px] font-mono font-medium whitespace-nowrap ${isMonetary(c)?'text-brand-900':'text-brand-800/60'}">${!isMonetary(c)?'n/m':(c.value?fmtKESshort(c.value):'—')}</span>
      </div>
    </div>`;
}
function pipeColumnInner(col, list){
  const shown=list.slice(0,PIPE_CAP);
  const more=list.length>PIPE_CAP?`<button data-pipe-more="${col.k}" class="w-full mt-1 rounded-lg border border-brand-100 bg-white px-3 py-2 text-[11px] font-medium text-brand-600 hover:border-brand-300 transition">+${list.length-PIPE_CAP} more in Register →</button>`:'';
  const empty=list.length?'':`<div class="rounded-xl border border-dashed border-brand-100 px-3 py-8 text-center text-[11px] text-brand-800/60">Nothing here</div>`;
  return shown.map(pipeCard).join('')+empty+more;
}
function renderPipeline(){
  const cs=state.contracts;
  const valOf=arr=>arr.reduce((s,c)=>s+Number(c.value||0),0);
  const groups=PIPE_COLS.map(col=>{ const list=cs.filter(c=>c.status===col.k); return {col, list, val:valOf(list)}; });
  const total=cs.length;

  const columnsHtml=groups.map(g=>`
    <div class="flex flex-col min-w-0 min-h-0">
      <div class="shrink-0 flex items-center justify-between gap-2 px-1.5 pb-2.5">
        <div class="flex items-center gap-2 min-w-0">
          <span class="h-2.5 w-2.5 rounded-full shrink-0" style="background:${g.col.color}"></span>
          <span class="text-[11px] font-700 uppercase tracking-wider text-ink/70 truncate">${g.col.label}</span>
          <span class="text-[10px] font-600 tnum text-ink/65 bg-white elev-1 rounded-full px-1.5 py-0.5">${g.list.length}</span>
        </div>
        <span class="text-[11px] font-600 tnum text-ink/40 shrink-0">${fmtKESshort(g.val)}</span>
      </div>
      <div data-drop="${g.col.k}" class="pipe-col flex-1 min-h-0 overflow-y-auto scroll-thin rounded-2xl bg-brand-50/40 border border-transparent p-2.5 transition">
        ${pipeColumnInner(g.col, g.list)}
      </div>
    </div>`).join('');

  document.getElementById('content').innerHTML=`
  <div class="view-enter h-full flex flex-col">
    <header class="shrink-0 sticky top-0 z-20 bg-white/70 backdrop-blur-xl border-b border-hair">
      <div class="px-8 py-4 flex items-center justify-between gap-4 max-w-[1400px] mx-auto w-full">
        <div>
          <h1 class="font-display font-700 text-[26px] tracking-tight text-ink">My Queue</h1>
          <p class="text-[13px] text-ink/70"><span class="tnum">${total.toLocaleString('en-KE')}</span> contracts · ${canEdit()?'drag a card between stages to advance them':'read-only — you have viewer access'}</p>
        </div>
      </div>
    </header>
    <div class="flex-1 min-h-0 px-8 py-6 max-w-[1400px] mx-auto w-full">
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 h-full">${columnsHtml}</div>
    </div>
  </div>`;

  wirePipeline();
  setActiveNav('pipeline');
}
function pipeMove(id, target){
  const c=getContract(id); if(!c) return;
  if(!canEdit()){ toast('Viewers cannot move contracts','err'); return; }
  if(c.status===target) return;
  if(c.status==='Signed'){ toast('Executed contracts are sealed and cannot be moved','err'); return; }
  const label=(PIPE_COLS.find(x=>x.k===target)||{}).label||target;
  if(target==='Signed'){ toast('Open the contract to complete verification & signing'); openWorkspace(id); return; }
  if(target==='Declined'){
    if(!confirm(`Move “${c.name}” to Closed? This declines the contract.`)) return;
    c.status='Declined'; logAudit(c,'Declined','Moved to Closed on the pipeline board');
    toast(`${c.name.split(' —')[0]} moved to Closed`,'err');
  } else {
    const from=(PIPE_COLS.find(x=>x.k===c.status)||{}).label||c.status;
    c.status=target; logAudit(c,'Status changed',`${from} → ${label} (pipeline board)`);
    toast(`${c.name.split(' —')[0]} moved to ${label}`);
  }
  c.lastAction=todayStr(); persist(c);
  renderPipeline(); renderSideFolders();
}
function wirePipeline(){
  document.querySelectorAll('[data-card]').forEach(el=>{
    const id=el.getAttribute('data-card');
    el.addEventListener('click',()=>{ if(!el.getAttribute('draggable')||!pipeDrag) openWorkspace(id); });
    el.addEventListener('dragstart',e=>{ pipeDrag=id; el.classList.add('opacity-40'); try{e.dataTransfer.effectAllowed='move';}catch(_){} });
    el.addEventListener('dragend',()=>{ el.classList.remove('opacity-40'); pipeDrag=null; });
  });
  document.querySelectorAll('[data-drop]').forEach(col=>{
    col.addEventListener('dragover',e=>{ if(!pipeDrag) return; e.preventDefault(); col.classList.add('border-brand-300','bg-brand-50/70'); });
    col.addEventListener('dragleave',()=>col.classList.remove('border-brand-300','bg-brand-50/70'));
    col.addEventListener('drop',e=>{ e.preventDefault(); col.classList.remove('border-brand-300','bg-brand-50/70'); const id=pipeDrag; pipeDrag=null; if(id) pipeMove(id, col.getAttribute('data-drop')); });
  });
  document.querySelectorAll('[data-pipe-more]').forEach(el=>el.addEventListener('click',()=>{ regState().stage=el.getAttribute('data-pipe-more'); regState().type='all'; regState().sel={}; setView('register'); }));
}

/* ============================================================ NAV */
function setActiveNav(view){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.getAttribute('data-view')===view));
  // folder highlighting in sidebar
  document.querySelectorAll('[data-side-folder]').forEach(b=>{
    b.classList.toggle('bg-white/10',view==='folder'&&b.getAttribute('data-side-folder')===state.folderId);
    b.classList.toggle('text-white',view==='folder'&&b.getAttribute('data-side-folder')===state.folderId);
  });
}
function setView(view){
  state.view=view;
  if(view==='dashboard') renderDashboard();
  else if(view==='folder') renderFolder();
  else if(view==='intel') renderIntel();
  else if(view==='register') renderRegister();
  else if(view==='pipeline') renderPipeline();
  else if(view==='team') renderTeam();
  else renderWorkspace();
  if(getOrg()&&!API_MODE()) persist();
  else if(getOrg()) lsSet(LS.ui,{ view:state.view, activeId:state.activeId, folderId:state.folderId });
  window.scrollTo({top:0});
}
function openFolder(fid){ state.folderId=fid; state.folderQuery=''; state.folderShown=50; setView('folder'); }
function openWorkspace(id){ state.activeId=id; setView('workspace'); }
function createFromTemplate(tid){
  if(!canEdit()){ toast('Viewers cannot create contracts','err'); return; }
  const t=TEMPLATES[tid], u=currentUser();
  const c={ id:nextId(), name:t.name+' (Draft)', counterparty:'', value:0, status:'Draft',
    template:tid, folder:t.folder,
    lastAction:todayStr(),
    hash:null, signedAt:null, signatory:u?.name||'Authorized signatory',
    compliance:{iprs:false,pki:false},
    comments:[{author:'System',role:'Automation',side:'internal',text:`New ${t.kind} generated from Template ${tid} and filed under ${FOLDERS[t.folder].name}. Fill the highlighted fields to begin.`,ts:fmtDT(nowISO())}],
    fields:{}, scan:null, expiry:null, valueType:t.valueType,
    audit:[{at:nowISO(),user:u?.name||'System',action:'Created',detail:`Generated from Template ${tid} (${t.kind})`}],
    signatures:[] };
  c._loaded=true; c._light=false; c._v=0;
  state.contracts.unshift(c);
  state.activeId=c.id;
  persist(c);
  toast(`New ${t.kind} created and filed in ${FOLDERS[t.folder].name}`);
  setView('workspace');
  renderSideFolders();
}

/* BOOT
   1. #share=… in the URL → counterparty portal (no login needed)
   2. HaTi server present → API mode (central storage, live shares)
   3. No server → static mode backed by this browser's localStorage
   Either mode: no workspace → setup screen; no session → login. */
(async function boot(){
  const m=location.hash.match(/^#share=(.+)$/);
  if(m){ await portalEntry(m[1]); return; }
  const rs=location.hash.match(/^#reset=(.+)$/);
  let st=null;
  try{ const r=await fetch('api/status',{credentials:'same-origin'}); if(r.ok) st=await r.json(); }catch(e){}
  if(st && st.mode==='api'){
    REMOTE={ org:st.orgName?{name:st.orgName}:null, me:null, users:[] };
    if(rs){ renderAuth('reset:'+rs[1]); return; }
    if(!st.setup){ renderAuth('setup'); return; }
    if(!st.authed){ renderAuth('login'); return; }
    try{ await loadBootstrap(); startApp(); }
    catch(e){ renderAuth('login'); }
    return;
  }
  hydrate();
  if(!getOrg()){ renderAuth('setup'); return; }
  if(!getSession()||!currentUser()){ localStorage.removeItem(LS.session); renderAuth('login'); return; }
  startApp();
})();
