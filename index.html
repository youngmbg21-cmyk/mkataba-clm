<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mkataba — Contract Lifecycle Management</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: { extend: {
      fontFamily: {
        display: ['"Space Grotesk"','system-ui','sans-serif'],
        sans: ['Inter','system-ui','sans-serif'],
        mono: ['"JetBrains Mono"','ui-monospace','monospace'],
      },
      colors: {
        canvas:'#F4F7F5',
        brand:{50:'#EAF6F1',100:'#CFEAE0',200:'#9FD5C2',300:'#66BCA1',400:'#2E9F80',500:'#0B7A5F',600:'#086B54',700:'#075444',800:'#0A3B32',900:'#08211E'},
        gold:{300:'#EBD08C',400:'#E0BC63',500:'#C79A3E',600:'#A97D2A'},
      },
    }},
  };
</script>
<style>
  html { scroll-behavior: smooth; } body { background:#F4F7F5; }
  ::selection { background:#CFEAE0; }
  .view-enter { animation: viewIn .25s cubic-bezier(.22,.61,.36,1); }
  @keyframes viewIn { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }

  .field{font-family:'JetBrains Mono',monospace;font-size:.9em;color:#075444;background:#EAF6F1;border:none;border-bottom:1.5px dashed #66BCA1;padding:1px 6px;border-radius:4px 4px 0 0;min-width:90px;transition:background .15s,border-color .15s,box-shadow .15s;outline:none;}
  .field:hover{background:#DCF0E7;}
  .field:focus{background:#fff;border-bottom-color:#0B7A5F;box-shadow:0 2px 0 0 #0B7A5F,0 0 0 3px rgba(11,122,95,.12);}
  .field.field-date{min-width:140px;} .field.field-num{text-align:right;min-width:130px;}
  .field:disabled{color:#0A3B32;background:transparent;border-bottom:1.5px solid #CFEAE0;-webkit-text-fill-color:#0A3B32;opacity:1;cursor:default;font-weight:600;}

  .scroll-thin::-webkit-scrollbar{width:8px;height:8px;}
  .scroll-thin::-webkit-scrollbar-thumb{background:#CFEAE0;border-radius:8px;}
  .scroll-thin::-webkit-scrollbar-track{background:transparent;}

  .live-dot{position:relative;}
  .live-dot::after{content:'';position:absolute;inset:-4px;border-radius:9999px;background:currentColor;opacity:.4;animation:ping 1.8s cubic-bezier(0,0,.2,1) infinite;}
  @keyframes ping{75%,100%{transform:scale(2.2);opacity:0;}}

  .seal-in{animation:sealIn .5s cubic-bezier(.34,1.56,.64,1);}
  @keyframes sealIn{from{opacity:0;transform:scale(.9) rotate(-3deg);}to{opacity:1;transform:none;}}
  .toast-in{animation:toastIn .3s cubic-bezier(.22,.61,.36,1);}
  @keyframes toastIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}

  .nav-item.active{background:rgba(255,255,255,.08);color:#fff;}
  .nav-item.active .nav-rail{opacity:1;}

  /* AI panel slide-over */
  #ai-panel{transform:translateX(105%);transition:transform .3s cubic-bezier(.22,.61,.36,1);}
  #ai-panel.open{transform:none;}
  #ai-scrim{opacity:0;pointer-events:none;transition:opacity .25s;}
  #ai-scrim.open{opacity:1;pointer-events:auto;}
  .ai-msg{animation:viewIn .25s cubic-bezier(.22,.61,.36,1);}
  .typing span{display:inline-block;width:5px;height:5px;border-radius:9999px;background:#66BCA1;margin-right:3px;animation:blink 1.2s infinite;}
  .typing span:nth-child(2){animation-delay:.2s;} .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.25;transform:translateY(0);}40%{opacity:1;transform:translateY(-2px);}}

  .anchor-flash{animation:anchorFlash 1.8s ease;border-radius:8px;}
  @keyframes anchorFlash{0%{background:#FBF2DC;box-shadow:0 0 0 4px rgba(199,154,62,.30);}100%{background:transparent;box-shadow:0 0 0 4px transparent;}}
  .scan-pulse{animation:scanPulse 1s ease infinite;}
  @keyframes scanPulse{0%,100%{opacity:.45;}50%{opacity:1;}}

  .mlink{stroke:#C9D8D0;stroke-width:1.4;fill:none;opacity:.6;transition:stroke .15s,opacity .15s,stroke-width .15s;}
  .mlink.hi{stroke:#0B7A5F;opacity:1;stroke-width:2.2;}
  .mlink.dim{opacity:.08;}
  .mlabel{fill:#5c7a6e;font-size:9.5px;font-family:'JetBrains Mono',monospace;pointer-events:none;opacity:0;transition:opacity .15s;}
  .mlabel.show{opacity:1;}
  .mnode{cursor:pointer;}
  .mnode .chipbg{fill:#fff;stroke:#CFEAE0;stroke-width:1.4;transition:stroke .15s;}
  .mnode.hi .chipbg{stroke:#0B7A5F;stroke-width:2;}
  .mnode.sel .chipbg{stroke:#C79A3E;stroke-width:2.4;}
  .mnode.dim{opacity:.18;transition:opacity .15s;}
  #map-svg{cursor:grab;}
  #map-svg.panning{cursor:grabbing;}

  .qdot{cursor:pointer;transition:r .15s;}
  .qdot:hover{stroke:#08211E;stroke-width:2;}
  #party-scrim{opacity:0;pointer-events:none;transition:opacity .25s;}
  #party-scrim.open{opacity:1;pointer-events:auto;}

  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important;}}
</style>
</head>
<body class="font-sans text-brand-900 antialiased">

<div class="flex min-h-screen">

  <!-- ================= SIDEBAR ================= -->
  <aside class="w-[248px] shrink-0 bg-brand-900 text-brand-100/80 flex flex-col fixed inset-y-0 left-0 z-30">
    <div class="px-5 py-5 border-b border-white/10">
      <div class="flex items-center gap-2.5">
        <div class="h-9 w-9 rounded-lg bg-gold-500 grid place-items-center text-brand-900 shrink-0" id="brand-mark"></div>
        <div class="leading-tight">
          <div class="font-display font-700 text-white text-lg tracking-tight">Mkataba</div>
          <div class="text-[10px] uppercase tracking-[0.18em] text-brand-300">Contract Lifecycle</div>
        </div>
      </div>
    </div>

    <nav class="px-3 py-4 flex-1 overflow-y-auto scroll-thin" id="nav">
      <button data-view="dashboard" class="nav-item active w-full text-left flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-brand-100/70 hover:text-white hover:bg-white/5 transition relative">
        <span class="nav-rail absolute left-0 top-1.5 bottom-1.5 w-[3px] rounded-full bg-gold-500 opacity-0 transition"></span>
        <span data-ic="grid"></span> Dashboard
      </button>
      <button data-view="intel" class="nav-item w-full text-left flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-brand-100/70 hover:text-white hover:bg-white/5 transition relative mt-1">
        <span class="nav-rail absolute left-0 top-1.5 bottom-1.5 w-[3px] rounded-full bg-gold-500 opacity-0 transition"></span>
        <span data-ic="trend"></span> Portfolio Intelligence
      </button>
      <button data-view="workspace" class="nav-item w-full text-left flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-brand-100/70 hover:text-white hover:bg-white/5 transition relative mt-1">
        <span class="nav-rail absolute left-0 top-1.5 bottom-1.5 w-[3px] rounded-full bg-gold-500 opacity-0 transition"></span>
        <span data-ic="file"></span> Contract Workspace
      </button>

      <div class="pt-5 pb-2 px-3 text-[10px] font-semibold uppercase tracking-[0.16em] text-brand-300/70">Folders</div>
      <div id="side-folders" class="space-y-0.5"></div>

      <div class="pt-5 pb-2 px-3 text-[10px] font-semibold uppercase tracking-[0.16em] text-brand-300/70">Quick create</div>
      <div id="side-templates" class="space-y-0.5"></div>
    </nav>

    <div class="px-3 pb-3">
      <button id="ai-open-side" class="w-full flex items-center gap-2.5 rounded-xl bg-gradient-to-r from-gold-500 to-gold-400 text-brand-900 px-3.5 py-3 text-sm font-semibold hover:brightness-105 transition shadow-lg shadow-black/20">
        <span data-ic="sparkle"></span> Ask Mkataba AI
      </button>
    </div>

    <div class="px-4 py-4 border-t border-white/10">
      <div class="flex items-center gap-3">
        <div class="h-8 w-8 rounded-full bg-brand-700 grid place-items-center text-xs font-semibold text-brand-100">YM</div>
        <div class="text-xs leading-tight">
          <div class="text-white font-medium">Highland Corporate Ltd</div>
          <div class="text-brand-300">Nairobi · Enterprise</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ================= MAIN ================= -->
  <main class="flex-1 ml-[248px] min-w-0">
    <div id="content"></div>
  </main>
</div>

<!-- ================= AI ASSISTANT (slide-over) ================= -->
<div id="ai-scrim" class="fixed inset-0 bg-brand-900/30 backdrop-blur-[2px] z-40"></div>
<section id="ai-panel" class="fixed top-0 right-0 bottom-0 w-full max-w-[420px] bg-white z-50 flex flex-col border-l border-brand-100 shadow-2xl shadow-brand-900/20">
  <header class="px-5 py-4 border-b border-brand-100/70 flex items-center gap-3 bg-brand-900 text-white">
    <div class="h-9 w-9 rounded-xl bg-gold-500 text-brand-900 grid place-items-center shrink-0" data-ic-big="sparkle"></div>
    <div class="flex-1 leading-tight">
      <div class="font-display font-600">Mkataba AI</div>
      <div class="text-[11px] text-brand-200 flex items-center gap-1.5"><span class="h-1.5 w-1.5 rounded-full bg-brand-300 live-dot"></span>Searching your live contract data</div>
    </div>
    <button id="ai-close" class="h-8 w-8 grid place-items-center rounded-lg hover:bg-white/10 transition text-brand-100" data-ic-big="x"></button>
  </header>

  <div id="ai-feed" class="flex-1 overflow-y-auto scroll-thin px-5 py-4 space-y-4"></div>

  <div id="ai-suggest" class="px-5 pb-2 flex flex-wrap gap-1.5"></div>

  <footer class="px-5 pb-5 pt-2 border-t border-brand-100/70">
    <div class="flex items-center gap-2">
      <input id="ai-input" type="text" placeholder="Search, summarize, or ask about your contracts…" class="flex-1 rounded-xl border border-brand-100 bg-canvas px-3.5 py-2.5 text-sm outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-100 transition"/>
      <button id="ai-send" class="h-10 w-10 shrink-0 grid place-items-center rounded-xl bg-brand-900 text-white hover:bg-brand-800 transition" data-ic-big="send"></button>
    </div>
  </footer>
</section>

<div id="toast-root" class="fixed bottom-6 right-6 z-[60] space-y-2"></div>

<script>
/* ============================================================ ICONS */
const ICONS = {
  grid:'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>',
  file:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/>',
  folder:'<path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/>',
  folderOpen:'<path d="m6 14 1.5-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.54 6a2 2 0 0 1-1.95 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H18a2 2 0 0 1 2 2v2"/>',
  plus:'<path d="M12 5v14M5 12h14"/>',
  search:'<circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>',
  users:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  check2:'<path d="M20 6 9 17l-5-5"/>',
  seal:'<path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M12 2 4 6v6c0 5 3.5 8 8 10 4.5-2 8-5 8-10V6z"/>',
  ban:'<circle cx="12" cy="12" r="10"/><path d="m4.9 4.9 14.2 14.2"/>',
  clock:'<circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>',
  chevR:'<path d="m9 18 6-6-6-6"/>',
  msg:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
  send:'<path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/>',
  lock:'<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
  shield:'<path d="M20 13c0 5-3.5 7.5-7.7 9a1 1 0 0 1-.6 0C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.2-2.7a1 1 0 0 1 1.6 0C14.5 3.8 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/>',
  finger:'<path d="M12 10a2 2 0 0 0-2 2c0 1.02-.1 2.51-.26 4"/><path d="M14 13.12c0 2.38 0 6.38-1 8.88"/><path d="M17.29 21.02c.12-.6.43-2.3.5-3.02"/><path d="M2 12a10 10 0 0 1 18-6"/><path d="M2 16h.01"/><path d="M21.8 16c.2-2 .131-5.354 0-6"/><path d="M5 19.5C5.5 18 6 15 6 12a6 6 0 0 1 .34-2"/><path d="M8.65 22c.21-.66.45-1.32.57-2"/><path d="M9 6.8a6 6 0 0 1 9 5.2v2"/>',
  key:'<path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/>',
  building:'<rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01M16 6h.01M12 6h.01M12 10h.01M12 14h.01M16 10h.01M16 14h.01M8 10h.01M8 14h.01"/>',
  truck:'<path d="M14 18V6a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1v11a1 1 0 0 0 1 1h1"/><path d="M14 9h4l4 4v4a1 1 0 0 1-1 1h-1"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/>',
  scroll:'<path d="M19 17V5a2 2 0 0 0-2-2H4"/><path d="M8 21h12a2 2 0 0 0 2-2v-1a1 1 0 0 0-1-1H11a1 1 0 0 0-1 1v1a2 2 0 1 1-4 0V5a2 2 0 1 0-4 0v2a1 1 0 0 0 1 1h3"/>',
  sparkle:'<path d="M9.94 14.06 8 20l-1.94-5.94L0 12l6.06-2.06L8 4l1.94 5.94L16 12z"/><path d="M18 4v4M22 6h-4M18 16v4M22 18h-4"/>',
  arrowLeft:'<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>',
  coins:'<circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4M16.71 13.88l.7.71-2.82 2.82"/>',
  hash:'<path d="M4 9h16M4 15h16M10 3 8 21M16 3l-2 18"/>',
  x:'<path d="M18 6 6 18M6 6l12 12"/>',
  alert:'<path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4M12 17h.01"/>',
  scan:'<path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><circle cx="12" cy="12" r="3"/>',
  chevD:'<path d="m6 9 6 6 6-6"/>',
  target:'<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
  trend:'<path d="M22 7 13.5 15.5 8.5 10.5 2 17"/><path d="M16 7h6v6"/>',
  network:'<circle cx="12" cy="5" r="2.5"/><circle cx="5" cy="19" r="2.5"/><circle cx="19" cy="19" r="2.5"/><path d="M12 7.5V12m0 0-5.2 5m5.2-5 5.2 5"/>',
};
const icon = (n,cls='w-4 h-4',sw=2)=>`<svg xmlns="http://www.w3.org/2000/svg" class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round">${ICONS[n]||''}</svg>`;
document.getElementById('brand-mark').innerHTML = icon('scroll','w-5 h-5',2.2);
document.querySelectorAll('[data-ic]').forEach(el=>el.outerHTML=icon(el.getAttribute('data-ic')));
document.querySelectorAll('[data-ic-big]').forEach(el=>el.innerHTML=icon(el.getAttribute('data-ic-big'),'w-[18px] h-[18px]'));

/* ============================================================ STATE */
const FIRST_PARTY = 'Highland Corporate Ltd';

const FOLDERS = {
  nda:    { id:'nda',    name:'NDAs & Confidentiality', ic:'shield',   desc:'Mutual NDAs, DPAs and data confidentiality instruments.' },
  lease:  { id:'lease',  name:'Property & Leases',      ic:'building', desc:'Office, warehouse and commercial premises leases.' },
  supply: { id:'supply', name:'Supply Chain & Logistics', ic:'truck',  desc:'Freight forwarding, distribution and SLA agreements.' },
};
const TEMPLATES = {
  A:{ id:'A', name:'Non-Disclosure Agreement', kind:'NDA', ic:'shield', folder:'nda', valueType:'none', blurb:'Mutual confidentiality — vendor & partner onboarding.' },
  B:{ id:'B', name:'Commercial Property Lease', kind:'Lease', ic:'building', folder:'lease', valueType:'fixed', blurb:'Nairobi Tech Hub office premises lease.' },
  C:{ id:'C', name:'B2B Freight Forwarding Agreement', kind:'Supply Chain', ic:'truck', folder:'supply', valueType:'estimated', blurb:'Cross-border logistics & freight forwarding terms.' },
};

let uid = 100;
const nextId = () => 'MK-' + (++uid);
const seedComments = () => ([
  { author:'Wanjiku Kamau', role:'Legal (Internal)', side:'internal', text:'Flagged clause 4 — please confirm the governing-law reference stays Kenyan.', ts:'2d ago' },
  { author:'Counterparty', role:'Reviewer', side:'external', text:'Agreed on scope. We will need the value confirmed before counsel signs off.', ts:'1d ago' },
]);

const state = {
  view:'dashboard',        // dashboard | folder | workspace
  activeId:null,
  folderId:null,
  folderQuery:'',
  mapPos:{}, mapSel:null,
  contracts:[
    mk('Master Services Agreement','Safaricom PLC',4500000,'Under Review','A','12 Jul 2026','2026-09-15','estimated'),
    mk('Office Lease — Westlands Tech Park','Britam Holdings',3200000,'Draft','B','15 Jul 2026',null),
    mk('Freight Forwarding — Mombasa Corridor','Twiga Foods',8750000,'Signed','C','08 Jul 2026','2027-07-08'),
    mk('Vendor NDA — Payments Integration','Equity Bank Kenya',0,'Under Review','A','14 Jul 2026','2026-08-10'),
    mk('Cold-Chain Distribution Terms','Sendy Logistics',2100000,'Declined','C','02 Jul 2026',null),
    mk('Data Processing Addendum','M-KOPA Kenya',0,'Signed','A','06 Jul 2026','2026-10-01'),
    mk('Warehouse Lease — Industrial Area','Naivas Supermarkets',5400000,'Under Review','B','16 Jul 2026','2027-01-31'),
    mk('Distribution SLA — Coastal Region','Kenya Breweries Ltd',6800000,'Draft','C','17 Jul 2026',null),
    mk('Retail NDA — Loyalty Data Pilot','Carrefour Kenya',0,'Signed','A','04 Jul 2026','2026-08-30'),
    mk('Depot Lease — Nakuru Hub','KenGen Pension Scheme',2750000,'Under Review','B','13 Jul 2026','2028-07-01'),
    mk('Last-Mile Courier Agreement','Wasoko',1850000,'Draft','C','18 Jul 2026',null),
    mk('Confidentiality Deed — Audit Scope','Deloitte East Africa',0,'Draft','A','18 Jul 2026',null),
  ],
};
const isMonetary = c => c.valueType !== 'none';
function mk(name,cp,value,status,tmpl,date,expiry,valueType){
  const c = { id:nextId(), name, counterparty:cp, value, status, template:tmpl,
    folder:TEMPLATES[tmpl].folder, valueType:valueType||TEMPLATES[tmpl].valueType,
    lastAction:date, expiry:expiry||null, hash:null, signedAt:null,
    signatory:'A. Otieno, Director', compliance:{iprs:false,pki:false},
    comments:seedComments(), fields:{}, scan:null };
  if(status==='Signed'){ c.hash='PRE-SEEDED'; c.compliance={iprs:true,pki:true}; }
  return c;
}
const getContract = id => state.contracts.find(c=>c.id===id);
const folderContracts = fid => state.contracts.filter(c=>c.folder===fid);

/* ============================================================ HELPERS */
const fmtKES = n => 'KES ' + Number(n||0).toLocaleString('en-KE');
const fmtKESshort = n => { n=Number(n||0); if(n>=1e6) return 'KES '+(n/1e6).toFixed(2).replace(/\.00$/,'')+'M'; if(n>=1e3) return 'KES '+(n/1e3).toFixed(0)+'K'; return 'KES '+n; };
const STATUS_STYLES = {
  'Draft':{dot:'bg-slate-400',chip:'bg-slate-100 text-slate-700 border-slate-200'},
  'Under Review':{dot:'bg-gold-500',chip:'bg-gold-500/10 text-gold-600 border-gold-500/25'},
  'Signed':{dot:'bg-brand-500',chip:'bg-brand-50 text-brand-700 border-brand-200'},
  'Declined':{dot:'bg-rose-500',chip:'bg-rose-50 text-rose-700 border-rose-200'},
};
const statusChip = s => { const st=STATUS_STYLES[s]||STATUS_STYLES.Draft;
  return `<span class="inline-flex items-center gap-1.5 rounded-full border px-2.5 py-0.5 text-xs font-medium ${st.chip}"><span class="h-1.5 w-1.5 rounded-full ${st.dot}"></span>${s}</span>`; };

function toast(msg,kind='ok'){
  const root=document.getElementById('toast-root');
  const bg = kind==='ok'?'bg-brand-900 border-brand-700':'bg-rose-900 border-rose-700';
  const el=document.createElement('div');
  el.className=`toast-in flex items-center gap-2.5 rounded-xl border ${bg} text-white px-4 py-3 shadow-xl text-sm max-w-xs`;
  el.innerHTML=`<span class="text-gold-400">${icon(kind==='ok'?'check2':'ban')}</span><span>${msg}</span>`;
  root.appendChild(el);
  setTimeout(()=>{el.style.transition='opacity .3s, transform .3s';el.style.opacity=0;el.style.transform='translateY(8px)';setTimeout(()=>el.remove(),300);},3200);
}
async function sha256(str){
  try{ const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
    return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(e){ let h=0; for(let i=0;i<str.length;i++){h=(h*31+str.charCodeAt(i))>>>0;} return h.toString(16).padStart(8,'0').repeat(8).slice(0,64); }
}
const generatePseudo = seed => { let h=0; for(const ch of seed) h=(h*33+ch.charCodeAt(0))>>>0; return h.toString(16).padStart(60,'0').slice(0,60); };

function metrics(){
  const cs=state.contracts, active=cs.filter(c=>c.status!=='Declined');
  return {
    totalValue:active.reduce((s,c)=>s+Number(c.value||0),0),

    declined:cs.filter(c=>c.status==='Declined').length,
    drafts:cs.filter(c=>c.status==='Draft').length,
  };
}

/* ============================================================
   VIEW: DEAL MAP  (force-directed graph of the portfolio)
   ============================================================ */
const REL_SEEDS = [ // name-matched so IDs stay dynamic
  { from:'Cold-Chain Distribution Terms', to:'Freight Forwarding \u2014 Mombasa Corridor', label:'re-tendered as' },
  { from:'Vendor NDA \u2014 Payments Integration', to:'Master Services Agreement', label:'precedes' },
  { from:'Warehouse Lease \u2014 Industrial Area', to:'Last-Mile Courier Agreement', label:'supports' },
];
const STATUS_BAR = {'Draft':'#94a3b8','Under Review':'#C79A3E','Signed':'#0B7A5F','Declined':'#f43f5e'};
const KIND_TAG = {nda:{t:'NDA',c:'#7c3aed'},lease:{t:'LEASE',c:'#0369a1'},supply:{t:'SUPPLY',c:'#b45309'},party:{t:'PARTY',c:'#0B7A5F'}};

function buildGraph(){
  const nodes=[], edges=[];
  const trunc=(s,n=24)=>s.length>n?s.slice(0,n-1)+'\u2026':s;
  // contract nodes
  state.contracts.forEach(c=>{
    nodes.push({ id:c.id, type:'contract', c, label:trunc(c.name), sub:c.id+' \u00b7 '+(c.value?fmtKESshort(c.value):'\u2014'),
      kind:c.folder, bar:STATUS_BAR[c.status], w:0,h:0,x:0,y:0 });
  });
  // party nodes (aggregate)
  const parties={};
  state.contracts.forEach(c=>{ if(!c.counterparty) return;
    (parties[c.counterparty]||(parties[c.counterparty]=[])).push(c); });
  Object.entries(parties).forEach(([name,cs])=>{
    const val=cs.filter(x=>x.status!=='Declined').reduce((s,x)=>s+Number(x.value||0),0);
    nodes.push({ id:'p:'+name, type:'party', party:name, cs, label:trunc(name), sub:cs.length+' deal'+(cs.length===1?'':'s')+' \u00b7 '+fmtKESshort(val),
      kind:'party', bar:'#08211E', w:0,h:0,x:0,y:0 });
    cs.forEach(c=>edges.push({from:c.id, to:'p:'+name, label:'party to'}));
  });
  // seeded contract-to-contract relations
  REL_SEEDS.forEach(r=>{
    const a=state.contracts.find(c=>c.name===r.from), b=state.contracts.find(c=>c.name===r.to);
    if(a&&b) edges.push({from:a.id, to:b.id, label:r.label});
  });
  const byId=Object.fromEntries(nodes.map(n=>[n.id,n]));
  edges.forEach(e=>{e.s=byId[e.from]; e.t=byId[e.to];});
  const adj={}; nodes.forEach(n=>adj[n.id]=new Set());
  edges.forEach(e=>{adj[e.from].add(e.to); adj[e.to].add(e.from);});
  return {nodes, edges, adj};
}

function layoutGraph(nodes, edges, W, H){
  let seed=11; const rnd=()=>{seed=(seed*1103515245+12345)&0x7fffffff; return seed/0x7fffffff;};
  const groups=['nda','lease','supply','party'];
  const gA={}; groups.forEach((g,i)=>gA[g]=i/groups.length*Math.PI*2 - Math.PI/3);
  nodes.forEach(n=>{
    if(state.mapPos[n.id]){ n.x=state.mapPos[n.id].x; n.y=state.mapPos[n.id].y; n.pinned=true; return; }
    const a=gA[n.kind]+(rnd()-.5)*1.1, r=Math.min(W,H)*(n.type==='party'?0.18:0.34);
    n.x=W/2+Math.cos(a)*r+(rnd()-.5)*40; n.y=H/2+Math.sin(a)*r+(rnd()-.5)*40;
  });
  for(let it=0; it<340; it++){
    const cool=1-it/340;
    for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++){
      const a=nodes[i],b=nodes[j];
      let dx=a.x-b.x, dy=a.y-b.y; const d2=dx*dx+dy*dy+1, d=Math.sqrt(d2);
      const rep=Math.min(28, 14000/d2)*cool;
      dx/=d; dy/=d;
      if(!a.pinned){a.x+=dx*rep; a.y+=dy*rep;} if(!b.pinned){b.x-=dx*rep; b.y-=dy*rep;}
    }
    edges.forEach(e=>{
      let dx=e.t.x-e.s.x, dy=e.t.y-e.s.y; const d=Math.sqrt(dx*dx+dy*dy)+.01;
      const f=(d-165)*0.02*cool; dx/=d; dy/=d;
      if(!e.s.pinned){e.s.x+=dx*f*d*0.01+dx*f; e.s.y+=dy*f;} if(!e.t.pinned){e.t.x-=dx*f; e.t.y-=dy*f;}
    });
    nodes.forEach(n=>{ if(n.pinned) return;
      n.x+=(W/2-n.x)*0.006; n.y+=(H/2-n.y)*0.006;
      n.x=Math.max(110,Math.min(W-110,n.x)); n.y=Math.max(70,Math.min(H-70,n.y)); });
  }
}

/* ============================================================
   VIEW: PORTFOLIO INTELLIGENCE
   ============================================================ */
const SEV_WEIGHT = {high:5, med:2, low:1};
const riskScore = c => openFindings(c).reduce((s,f)=>s+SEV_WEIGHT[f.sev],0);
const daysUntil = iso => Math.ceil((new Date(iso+'T00:00:00') - Date.now())/86400000);
let intelUI = { scanning:false, scannedAt:null };

function scanPortfolio(){
  state.contracts.forEach(c=>runScan(c));
  intelUI.scannedAt = new Date().toLocaleString('en-KE',{dateStyle:'medium',timeStyle:'short'});
}

function renderIntel(){
  const cs = state.contracts;
  const scanned = cs.filter(c=>c.scan);
  const allScanned = scanned.length===cs.length && cs.length>0;

  /* ---- header stats ---- */
  const openAll = scanned.flatMap(c=>openFindings(c));
  const highN = openAll.filter(f=>f.sev==='high').length;
  const atRisk = scanned.filter(c=>openFindings(c).some(f=>f.sev==='high'))
                        .reduce((s,c)=>s+Number(c.value||0),0);

  /* ---- expiry radar (independent of scan) ---- */
  const expiring = cs.filter(c=>c.expiry && c.status!=='Declined')
    .map(c=>({c, d:daysUntil(c.expiry)}))
    .filter(x=>x.d>=0 && x.d<=90)
    .sort((a,b)=>a.d-b.d);

  /* ---- quadrant data (monetary scatter + non-monetary lane) ---- */
  const pts = scanned.filter(c=>isMonetary(c)).map(c=>({c, v:Number(c.value||0), r:riskScore(c)}));
  const nmPts = scanned.filter(c=>!isMonetary(c)).map((c,i)=>({c, i, r:riskScore(c)}));
  const maxV = Math.max(1, ...pts.map(p=>p.v));
  const maxR = Math.max(6, ...pts.map(p=>p.r), ...nmPts.map(p=>p.r));
  const vals = pts.map(p=>p.v).sort((a,b)=>a-b);
  const medV = vals.length ? vals[Math.floor(vals.length/2)] : 0;
  const CW=900, CH=400, P={l:64,r:24,t:30,b:44};
  const LANE = nmPts.length ? 70 : 0;
  const X = v => P.l+LANE + (v/maxV)*(CW-P.l-LANE-P.r);
  const Y = r => CH-P.b - (r/maxR)*(CH-P.t-P.b);
  const riskLine = 5; // any high finding crosses it

  const dotCol = c => { const o=openFindings(c);
    if(!o.length) return '#0B7A5F';
    const w=worstSevOf(o); return w==='high'?'#f43f5e':w==='med'?'#C79A3E':'#94a3b8'; };

  const chart = !allScanned ? `
    <div class="grid place-items-center h-[300px] text-center">
      <div>
        <div class="mx-auto h-12 w-12 grid place-items-center rounded-xl bg-canvas border border-brand-100 text-brand-300 mb-3">${icon('scan','w-5 h-5')}</div>
        <div class="text-sm font-medium text-brand-900">${scanned.length ? scanned.length+' of '+cs.length+' contracts scanned' : 'The portfolio hasn\u2019t been scanned yet'}</div>
        <div class="text-xs text-brand-800/50 mt-1 max-w-xs">Run a portfolio scan to place every contract on the risk\u2013value map and roll up findings across the book.</div>
      </div>
    </div>` : `
    <svg viewBox="0 0 ${CW} ${CH}" class="w-full">
      <rect x="${X(medV)}" y="${P.t}" width="${CW-P.r-X(medV)}" height="${Y(riskLine)-P.t}" fill="#f43f5e" opacity="0.045"/>
      <line x1="${P.l}" y1="${Y(riskLine)}" x2="${CW-P.r}" y2="${Y(riskLine)}" stroke="#C79A3E" stroke-width="1" stroke-dasharray="4 4" opacity=".6"/>
      <line x1="${X(medV)}" y1="${P.t}" x2="${X(medV)}" y2="${CH-P.b}" stroke="#9FD5C2" stroke-width="1" stroke-dasharray="4 4"/>

/* ---- counterparty relationship modal: local graph at honest scale ---- */
function closePartyModal(){ document.getElementById('party-scrim')?.classList.remove('open'); }
function openPartyModal(name){
  const scrim=document.getElementById('party-scrim'), modal=document.getElementById('party-modal');
  const own = state.contracts.filter(c=>c.counterparty===name);
  // pull in relation-linked contracts + their parties
  const ownIds=new Set(own.map(c=>c.id));
  const linked=[];
  REL_SEEDS.forEach(r=>{
    const a=state.contracts.find(c=>c.name===r.from), b=state.contracts.find(c=>c.name===r.to);
    if(!a||!b) return;
    if(ownIds.has(a.id)&&!ownIds.has(b.id)) linked.push(b);
    if(ownIds.has(b.id)&&!ownIds.has(a.id)) linked.push(a);
  });
  const nodes=[], edges=[];
  const trunc=(s,n=22)=>s.length>n?s.slice(0,n-1)+'\u2026':s;
  nodes.push({id:'p:'+name, type:'party', label:trunc(name), sub:own.length+' deals', bar:'#08211E', kind:'party'});
  const addC=c=>{ if(nodes.some(n=>n.id===c.id)) return;
    nodes.push({id:c.id, type:'contract', c, label:trunc(c.name), sub:!isMonetary(c)?'non-monetary':(c.value?fmtKESshort(c.value):c.status), bar:STATUS_BAR[c.status], kind:c.folder}); };
  own.forEach(c=>{ addC(c); edges.push({from:c.id,to:'p:'+name,label:'party to'}); });
  linked.forEach(c=>{ addC(c);
    if(c.counterparty && c.counterparty!==name){
      const pid='p:'+c.counterparty;
      if(!nodes.some(n=>n.id===pid)) nodes.push({id:pid,type:'party',label:trunc(c.counterparty),sub:'counterparty',bar:'#08211E',kind:'party'});
      edges.push({from:c.id,to:pid,label:'party to'});
    }});
  REL_SEEDS.forEach(r=>{
    const a=state.contracts.find(c=>c.name===r.from), b=state.contracts.find(c=>c.name===r.to);
    if(a&&b&&nodes.some(n=>n.id===a.id)&&nodes.some(n=>n.id===b.id)) edges.push({from:a.id,to:b.id,label:r.label});
  });
  const byId=Object.fromEntries(nodes.map(n=>[n.id,n]));
  edges.forEach(e=>{e.s=byId[e.from]; e.t=byId[e.to];});
  const W=640,H=340;
  nodes.forEach(n=>{ n.w=Math.max(104,Math.min(170,n.label.length*6.4+50)); n.h=38; n.x=0; n.y=0; });
  const savedPos=state.mapPos; state.mapPos={};   // fresh layout, don't reuse global cache
  layoutGraph(nodes, edges, W, H);
  state.mapPos=savedPos;

  const val=own.filter(x=>x.status!=='Declined').reduce((s,x)=>s+Number(x.value||0),0);
  modal.innerHTML=`
  <div class="view-enter bg-white rounded-2xl border border-brand-100 shadow-2xl shadow-brand-900/25 overflow-hidden">
    <div class="flex items-center gap-3 px-5 py-4 border-b border-brand-100/60">
      <span class="h-9 w-9 grid place-items-center rounded-lg bg-brand-900 text-gold-400">${icon('users')}</span>
      <div class="flex-1 min-w-0">
        <div class="font-display font-600 text-brand-900 truncate">${name}</div>
        <div class="text-[11px] font-mono text-brand-800/45">${own.length} agreements \u00b7 ${fmtKES(val)} exposure \u00b7 relationship neighborhood</div>
      </div>
      <button id="pm-close" class="h-8 w-8 grid place-items-center rounded-lg hover:bg-brand-50 text-brand-400 hover:text-brand-800 transition">${icon('x')}</button>
    </div>
    <svg viewBox="0 0 ${W} ${H}" class="w-full bg-canvas/60">
      ${edges.map((e,i)=>`<path class="mlink" d="M${e.s.x} ${e.s.y} L${e.t.x} ${e.t.y}"/>
        <text class="mlabel show" x="${(e.s.x+e.t.x)/2}" y="${(e.s.y+e.t.y)/2-3}" text-anchor="middle">${e.label}</text>`).join('')}
      ${nodes.map(n=>`
      <g class="mnode" ${n.type==='contract'?`data-open="${n.id}"`:''} transform="translate(${n.x},${n.y})">
        <rect class="chipbg" x="${-n.w/2}" y="${-n.h/2}" width="${n.w}" height="${n.h}" rx="8"/>
        <rect x="${-n.w/2}" y="${-n.h/2}" width="4" height="${n.h}" rx="2" fill="${n.bar}"/>
        <text x="${-n.w/2+10}" y="${-2}" font-size="10" font-weight="600" fill="#08211E">${n.label.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</text>
        <text x="${-n.w/2+10}" y="${10}" font-size="7.5" font-family="'JetBrains Mono',monospace" fill="#8aa198">${n.sub}</text>
      </g>`).join('')}
    </svg>
    <div class="px-5 py-3 border-t border-brand-100/60 text-[11px] text-brand-800/45 flex items-center justify-between">
      <span>Click a contract node to open its workspace</span>
      <span class="font-mono">${nodes.length} nodes \u00b7 bounded neighborhood</span>
    </div>
  </div>`;
  scrim.classList.add('open');
  modal.querySelector('#pm-close').addEventListener('click',closePartyModal);
  modal.querySelectorAll('[data-open]').forEach(el=>el.addEventListener('click',()=>{ closePartyModal(); openWorkspace(el.getAttribute('data-open')); }));
}

/* ============================================================
   AI CONTRACT SCAN  (rule engine over live contract data)
   ============================================================ */
const SEV_META = {
  high:{label:'High', chip:'bg-rose-50 text-rose-700 border-rose-200', dot:'bg-rose-500', text:'text-rose-600'},
  med:{label:'Medium', chip:'bg-gold-500/10 text-gold-600 border-gold-500/25', dot:'bg-gold-500', text:'text-gold-600'},
  low:{label:'Low', chip:'bg-slate-100 text-slate-600 border-slate-200', dot:'bg-slate-400', text:'text-slate-500'},
};
const SEV_RANK = {high:3, med:2, low:1};
const KIND_LABEL = {risk:'Risk', missing:'Missing', ambiguity:'Ambiguity'};

function scanRules(c){
  const F=[], f=c.fields||{};
  const add=(id,sev,kind,title,anchor,what,why,fix)=>F.push({id,sev,kind,title,anchor,what,why,fix});
  const valAnchor = c.template==='A' ? 'c1' : 'c2';

  // --- generic, data-driven (auto-clear when fixed) ---
  if(!c.counterparty) add('g-cp','high','missing','No counterparty named','recital',
    'The opening recital names Highland Corporate but leaves the counterparty blank.',
    'A contract with an unnamed party is unenforceable — there is no legal person to hold to its terms or serve notice on.',
    'Enter the counterparty\u2019s full registered name (as it appears on the BRS register) in the recital.');
  if(isMonetary(c) && !(Number(c.value)>0)) add('g-val','med','missing','Contract value not set',valAnchor,
    'The commercial value field reads KES 0 or is empty.',
    'Without a stated consideration the pricing clause is incomplete, and downstream stamp duty and approval thresholds cannot be assessed.',
    'Set the agreed KES value in the highlighted field \u2014 the deal summary and dashboard will sync automatically.');
  if(!f.effDate) add('g-date','med','missing','No effective date','recital',
    'The commencement date field in the recital is empty.',
    'Obligations, term length and notice periods all count from this date; leaving it open invites disputes about when duties began.',
    'Pick the effective date in the recital\u2019s date field.');
  if(c.status!=='Signed' && (!c.compliance.iprs || !c.compliance.pki)) add('g-comp','low','missing','Signature verification incomplete','sig',
    'IPRS identity verification and/or the CAK PKI token have not been completed.',
    'Under the Kenya Information & Communications Act an advanced e-signature needs verified identity and an accredited certificate to carry full evidentiary weight.',
    'Run the IPRS check and attach the PKI token in the verification panel before signing.');

  // --- template-specific ---
  if(c.template==='A'){
    const term=Number(f.termYears||3);
    if(term>5) add('a-term','med','ambiguity','Confidentiality term exceeds market norm','c3',
      `The term is set to ${term} years \u2014 well beyond the 2\u20135 years typical for commercial NDAs in Kenya.`,
      'Overlong terms are harder to enforce and may be read down by a court as an unreasonable restraint.',
      'Reduce the term to 3\u20135 years, or carve trade secrets out with an indefinite tail instead.');
    add('a-liab','high','risk','No limitation of liability clause','c4',
      'The template caps nothing \u2014 there is no ceiling on damages for breach of confidence.',
      'Exposure is unlimited: a Kenyan court will award whatever loss is proven, which for leaked pricing or customer data can dwarf the deal value.',
      'Add a liability cap (commonly the engagement value or a fixed KES amount), excluding deliberate breach.');
    add('a-inj','low','missing','No injunctive relief clause','c2',
      'The agreement is silent on equitable remedies.',
      'Damages arrive too late for a confidentiality breach \u2014 the value is in stopping disclosure fast.',
      'Add a clause acknowledging that breach causes irreparable harm and permitting interim injunctions in the High Court at Nairobi.');
  }
  if(c.template==='B'){
    if(!f.deposit) add('b-dep','high','missing','Security deposit not specified','c3',
      'Clause 3 references a deposit but the amount field is blank.',
      'Without a stated deposit the landlord has no defined security against dilapidations or arrears, and the refund obligation in clause 7 has nothing to bite on.',
      'Enter the deposit \u2014 market practice in Nairobi is 3 months\u2019 gross rent for commercial space.');
    if(!f.premises) add('b-prem','med','missing','Premises description incomplete','recital',
      'The demised premises field in the recital is empty.',
      'A lease must identify the land and unit with certainty; a vague description risks unenforceability and registration problems.',
      'State the building, floor/unit and LR number, e.g. \u201cNairobi Tech Hub, 4th Floor, LR No. 209/XXXX, Westlands\u201d.');
    add('b-stamp','med','risk','Stamp duty not evidenced','c4',
      'Nothing in the document records assessment or payment of stamp duty.',
      'Leases attract stamp duty under the Stamp Duty Act (Cap 480); an unstamped lease is inadmissible in evidence in Kenyan courts until duty and penalties are paid.',
      'Assess and pay stamp duty via iTax within 30 days of execution and attach the certificate to the record.');
    add('b-esc','low','missing','No rent escalation clause','c2',
      `Rent is fixed for the full ${Number(f.termYears||6)}-year term with no review mechanism.`,
      'On a multi-year Nairobi lease, flat rent shifts inflation risk entirely to the landlord \u2014 or, if renegotiated informally, creates dispute risk for the tenant.',
      'Add a periodic escalation (commonly 7.5% every 2 years) or an open-market rent review.');
  }
  if(c.template==='C'){
    const sla=Number(f.slaHrs||48);
    if(sla>72) add('c-sla','med','ambiguity','Clearance SLA above competitive benchmark','c3',
      `The clearance turnaround is set at ${sla} hours against a Mombasa market norm of 48\u201372 hours.`,
      'A loose SLA weakens the 98% reliability target and gives the client little contractual leverage on delays.',
      'Tighten to 48\u201372 hours, or tier the SLA by cargo class with service credits for misses.');
    if(!f.port) add('c-port','med','missing','Port of clearance unspecified','c1',
      'The customs clearance location field in clause 1 is empty.',
      'Scope, transit times and KRA/KPA documentation all hinge on the named port of entry.',
      'Name the port \u2014 typically \u201cPort of Mombasa\u201d or \u201cNaivasha ICD\u201d for Northern Corridor flows.');
    add('c-liab','med','ambiguity','Liability cap incorporated by reference only','c4',
      'Clause 4 caps liability \u201cper the Carriage of Goods rules\u201d without stating figures.',
      'The parties may hold different views of which regime and limits apply \u2014 per-package, per-kilo or per-container \u2014 which is exactly where freight disputes start.',
      'State the cap expressly (e.g. USD X per container or SDR-based per-kilo limit) and name the governing convention.');
    if(Number(c.value)>5000000) add('c-ins','low','risk','No cargo insurance obligation','c2',
      `At ${fmtKESshort(c.value)} of annual flows, the agreement is silent on who insures the cargo.`,
      'If neither party carries marine cargo cover, an uninsured loss lands as a dispute over the liability clause instead of a clean claim.',
      'Add an obligation for one party to maintain marine cargo insurance to the full consignment value, with the other noted as loss payee.');
  }
  return F;
}

const openFindings = c => !c.scan ? [] : c.scan.findings.filter(x=>!c.scan.dismissed.includes(x.id));
const worstSevOf = list => list.reduce((w,x)=>SEV_RANK[x.sev]>SEV_RANK[w]?x.sev:w,'low');
function runScan(c){
  const prev = c.scan ? c.scan.dismissed : [];
  c.scan = { at:new Date().toLocaleString('en-KE',{dateStyle:'medium',timeStyle:'short'}), findings:scanRules(c), dismissed:prev };
}

let scanUI = { running:false, filter:'all', expanded:new Set() };

function renderScanSection(c){
  const host = document.getElementById('scan-section'); if(!host) return;
  const open = openFindings(c);
  const worst = open.length ? worstSevOf(open) : null;

  let body;
  if(scanUI.running){
    body = `<div class="flex items-center gap-2.5 rounded-lg bg-brand-50 border border-brand-100 px-3 py-2.5 text-xs text-brand-700">
      <span class="scan-pulse text-brand-500">${icon('scan','w-4 h-4')}</span>
      <span>Scanning clauses against Kenyan practice checks\u2026</span></div>`;
  } else if(!c.scan){
    body = `
      <p class="text-xs text-brand-800/55 leading-relaxed">Review this contract against ${c.template==='A'?'NDA':'commercial'} risk checks tuned for Kenyan practice \u2014 missing clauses, enforceability gaps and market-norm deviations, each pinned to the clause it concerns.</p>
      <button id="scan-run" class="mt-3 w-full flex items-center justify-center gap-2 rounded-lg bg-brand-900 text-white py-2.5 text-sm font-medium hover:bg-brand-800 transition">${icon('scan')} Run AI scan</button>`;
  } else {
    const list = open.filter(x=>scanUI.filter==='all'||x.sev===scanUI.filter);
    const counts = s => open.filter(x=>x.sev===s).length;
    const chip = (key,label)=>`<button data-scan-filter="${key}" class="text-[10px] px-2 py-0.5 rounded-full border font-medium transition ${scanUI.filter===key?'bg-brand-900 text-white border-brand-900':'bg-white text-brand-700 border-brand-200 hover:border-brand-400'}">${label}</button>`;
    const cards = list.length ? list.map(x=>{
      const sm=SEV_META[x.sev], exp=scanUI.expanded.has(x.id);
      return `
      <div class="rounded-lg border ${exp?'border-brand-300':'border-brand-100'} bg-white overflow-hidden">
        <button data-scan-toggle="${x.id}" class="w-full text-left px-3 py-2.5 flex items-center gap-2 hover:bg-brand-50/50 transition">
          <span class="h-1.5 w-1.5 rounded-full ${sm.dot} shrink-0"></span>
          <span class="text-xs font-medium text-brand-900 flex-1 min-w-0 truncate">${x.title}</span>
          <span class="text-[9px] uppercase tracking-wider font-semibold ${sm.text}">${sm.label}</span>
          <span class="text-brand-300 transition ${exp?'rotate-180':''}">${icon('chevD','w-3.5 h-3.5')}</span>
        </button>
        ${exp?`
        <div class="px-3 pb-3 space-y-2 border-t border-brand-100/60 pt-2.5">
          <div><div class="text-[9px] font-semibold uppercase tracking-wider text-brand-800/45 mb-0.5">What it says</div><p class="text-[11px] leading-relaxed text-brand-800/80">${x.what}</p></div>
          <div><div class="text-[9px] font-semibold uppercase tracking-wider text-brand-800/45 mb-0.5">Why it matters</div><p class="text-[11px] leading-relaxed text-brand-800/80">${x.why}</p></div>
          <div><div class="text-[9px] font-semibold uppercase tracking-wider text-brand-800/45 mb-0.5">Suggested fix</div><p class="text-[11px] leading-relaxed text-brand-800/80">${x.fix}</p></div>
          <div class="flex items-center gap-2 pt-1">
            <button data-scan-goto="${x.anchor}" class="flex items-center gap-1 text-[11px] font-medium text-brand-600 hover:text-brand-800 transition">${icon('target','w-3 h-3')} Go to clause</button>
            <button data-scan-dismiss="${x.id}" class="ml-auto text-[11px] font-medium text-brand-800/45 hover:text-brand-800 transition">Dismiss</button>
          </div>
        </div>`:''}
      </div>`;
    }).join('') : `<div class="text-center text-[11px] text-brand-800/50 py-3">No ${scanUI.filter==='all'?'open':scanUI.filter+'-severity'} findings \u2014 looking clean.</div>`;

    body = `
      <div class="flex items-center gap-1.5 mb-2 flex-wrap">
        ${chip('all',`All ${open.length}`)}${chip('high',`High ${counts('high')}`)}${chip('med',`Med ${counts('med')}`)}${chip('low',`Low ${counts('low')}`)}
      </div>
      <div class="space-y-1.5 max-h-64 overflow-y-auto scroll-thin pr-0.5">${cards}</div>
      <div class="mt-2 flex items-center justify-between text-[10px] text-brand-800/40">
        <span>Scanned ${c.scan.at}</span>
        <button id="scan-rerun" class="font-medium text-brand-600 hover:text-brand-800 transition">Re-scan</button>
      </div>`;
  }

  host.innerHTML = `
    <div class="px-5 py-4">
      <div class="flex items-center gap-2 mb-3">
        <span class="text-gold-500">${icon('scan')}</span>
        <h3 class="text-sm font-display font-600 text-brand-900">AI Contract Scan</h3>
        ${(!scanUI.running && c.scan) ? `<span class="ml-auto inline-flex items-center gap-1.5 rounded-full border px-2 py-0.5 text-[10px] font-medium ${open.length?SEV_META[worst].chip:'bg-brand-50 text-brand-700 border-brand-200'}">${open.length?`${open.length} open`:'All clear'}</span>` : ''}
      </div>
      ${body}
    </div>`;

  // wiring
  host.querySelector('#scan-run')?.addEventListener('click',()=>{
    scanUI.running=true; renderScanSection(c);
    setTimeout(()=>{ runScan(c); scanUI.running=false; scanUI.filter='all'; scanUI.expanded=new Set();
      renderScanSection(c); renderSignButton(c);
      const n=openFindings(c).length;
      toast(n?`Scan complete \u2014 ${n} finding${n===1?'':'s'} pinned to clauses`:'Scan complete \u2014 no issues found');
    }, 1100);
  });
  host.querySelector('#scan-rerun')?.addEventListener('click',()=>{
    scanUI.running=true; renderScanSection(c);
    setTimeout(()=>{ runScan(c); scanUI.running=false; renderScanSection(c); renderSignButton(c); toast('Re-scan complete \u2014 findings refreshed'); }, 700);
  });
  host.querySelectorAll('[data-scan-filter]').forEach(b=>b.addEventListener('click',()=>{ scanUI.filter=b.getAttribute('data-scan-filter'); renderScanSection(c); }));
  host.querySelectorAll('[data-scan-toggle]').forEach(b=>b.addEventListener('click',()=>{
    const id=b.getAttribute('data-scan-toggle');
    scanUI.expanded.has(id)?scanUI.expanded.delete(id):scanUI.expanded.add(id);
    renderScanSection(c);
  }));
  host.querySelectorAll('[data-scan-dismiss]').forEach(b=>b.addEventListener('click',()=>{
    c.scan.dismissed.push(b.getAttribute('data-scan-dismiss'));
    renderScanSection(c); renderSignButton(c);
  }));
  host.querySelectorAll('[data-scan-goto]').forEach(b=>b.addEventListener('click',()=>{
    const el=document.querySelector(`#doc-canvas [data-anchor="${b.getAttribute('data-scan-goto')}"]`);
    if(!el) return;
    el.scrollIntoView({behavior:'smooth',block:'center'});
    el.classList.remove('anchor-flash'); void el.offsetWidth; el.classList.add('anchor-flash');
  }));
}

const ai = { open:false, history:[] };

  'What is pending counterparty action?',

  'Which contract has the highest value?',

  'How many drafts do I have?',

];

function openAI(prefill){

function aiContractCard(c){
  const t=TEMPLATES[c.template];
  return `
  <button data-ai-open="${c.id}" class="w-full text-left flex items-center gap-2.5 rounded-xl border border-brand-100 bg-white hover:border-brand-300 hover:shadow-sm px-3 py-2.5 transition group">
    <span class="h-7 w-7 shrink-0 grid place-items-center rounded-lg bg-brand-50 text-brand-500">${icon(t.ic,'w-3.5 h-3.5')}</span>

      <span class="block text-xs font-medium text-brand-900 truncate group-hover:text-brand-600 transition">${c.name}</span>

    </span>
    ${statusChip(c.status)}
  </button>`;
}
const aiCards = list => `<div class="space-y-1.5">${list.map(aiContractCard).join('')}</div>`;

/* --- the intent engine --- */
function aiAnswer(qRaw){
  const q=qRaw.toLowerCase();
  const cs=state.contracts;
  const has=(...words)=>words.some(w=>q.includes(w));

  // 1) direct contract-ID summary
  const idMatch=qRaw.match(/MK-\d+/i);
  if(idMatch||has('summarize','summary','brief me','tell me about')){
    let c=null;
    if(idMatch) c=getContract(idMatch[0].toUpperCase());
    if(!c) c=cs.find(x=>q.includes(x.counterparty.toLowerCase().split(' ')[0]) && x.counterparty);
    if(!c) c=cs.find(x=>x.name.toLowerCase().split(' ').some(w=>w.length>4&&q.includes(w)));
    if(c){
      const t=TEMPLATES[c.template];
      return { text:`<strong>${c.name}</strong> (${c.id}) is a ${t.kind} with <strong>${c.counterparty||'no counterparty yet'}</strong>, filed under ${FOLDERS[c.folder].name}. Value: <strong>${!isMonetary(c)?'non-monetary (no consideration passes)':(c.value?fmtKES(c.value)+(c.valueType==='estimated'?' (estimated)':''):'not set')}</strong> · Status: <strong>${c.status}</strong> · Last action ${c.lastAction}. ${c.status==='Signed'?'It is fully executed with an SHA-256 seal and verified IPRS + PKI compliance.':c.status==='Under Review'?'It is waiting on counterparty action — compliance checks are '+((c.compliance.iprs&&c.compliance.pki)?'complete':'still open')+'.':c.status==='Draft'?'It is still in draft — fill the counterparty and value to move it into review.':'It was declined and is closed without signature.'} There are ${c.comments.length} comments on the thread.${(()=>{ if(!c.scan) return ' It has not been AI-scanned yet.'; const o=openFindings(c); return o.length?` The AI scan shows <strong>${o.length} open finding${o.length===1?'':'s'}</strong> (worst: ${SEV_META[worstSevOf(o)].label.toLowerCase()}).`:' The AI scan is clean — no open findings.'; })()}`,
        cards:aiCards([c]) };
    }
  }

  // 1a) expiry / renewal queries
  if(has('expir','renew','lapse','ending','due soon')){
    const exp=cs.filter(c=>c.expiry && c.status!=='Declined')
      .map(c=>({c,d:Math.ceil((new Date(c.expiry+'T00:00:00')-Date.now())/86400000)}))
      .filter(x=>x.d>=0&&x.d<=90).sort((a,b)=>a.d-b.d);
    if(!exp.length) return { text:`Nothing in the active book lapses in the next 90 days.` };
    const soon=exp.filter(x=>x.d<=30).length;
    return { text:`<strong>${exp.length} contract${exp.length===1?'':'s'}</strong> lapse within 90 days${soon?`, including <strong>${soon} inside 30 days</strong>`:''}. Closest first — ${exp[0].c.name} with ${exp[0].c.counterparty} in <strong>${exp[0].d} days</strong>:`, cards:aiCards(exp.map(x=>x.c)) };
  }
  // 1b) risk / findings / scan queries
  if(has('risk','finding','findings','issue','issues','problem','scan','red flag','exposure')){
    const scanned=cs.filter(c=>c.scan);
    if(!scanned.length) return { text:`No contracts have been scanned yet. Open any contract and hit <strong>Run AI scan</strong> in the workspace — I’ll check its clauses against Kenyan practice and pin every finding to the clause it concerns.` };
    const withOpen=scanned.filter(c=>openFindings(c).length).sort((a,b)=>SEV_RANK[worstSevOf(openFindings(b))]-SEV_RANK[worstSevOf(openFindings(a))]);
    if(!withOpen.length) return { text:`${scanned.length} contract${scanned.length===1?' has':'s have'} been scanned and every finding is resolved or dismissed — the reviewed book is clean.`, cards:aiCards(scanned) };
    const high=withOpen.reduce((s,c)=>s+openFindings(c).filter(x=>x.sev==='high').length,0);
    return { text:`<strong>${withOpen.length} contract${withOpen.length===1?'':'s'}</strong> ${withOpen.length===1?'has':'have'} open scan findings${high?`, including <strong>${high} high-severity</strong>`:''}. Sorted by worst exposure:`, cards:aiCards(withOpen) };
  }
  // 2) pending / under review
  if(has('pending','under review','waiting','counterparty action','awaiting')){
    const list=cs.filter(c=>c.status==='Under Review');
    const val=list.reduce((s,c)=>s+Number(c.value||0),0);
    return { text:`You have <strong>${list.length} contracts pending counterparty action</strong>, worth ${fmtKES(val)} combined. Tap any to open its workspace:`, cards:aiCards(list) };
  }
  // 3) drafts
  if(has('draft')){
    const list=cs.filter(c=>c.status==='Draft');
    return { text:`There are <strong>${list.length} drafts</strong> in your workspace. Drafts move to "Under Review" automatically once a counterparty and value are set.`, cards:aiCards(list) };
  }
  // 4) signed / executed
  if(has('signed','executed','sealed','completed')){
    const list=cs.filter(c=>c.status==='Signed');
    const val=list.reduce((s,c)=>s+Number(c.value||0),0);
    return { text:`<strong>${list.length} contracts are signed and executed</strong> this month, totalling <strong>${fmtKES(val)}</strong>. All carry SHA-256 document seals with IPRS and CAK PKI verification.`, cards:aiCards(list) };
  }
  // 5) declined
  if(has('declined','expired','rejected','lost')){
    const list=cs.filter(c=>c.status==='Declined');
    return { text:`${list.length} contract${list.length===1?'':'s'} closed without signature. Worth a follow-up call:`, cards:aiCards(list) };
  }
  // 6) totals / value analytics
  if(has('total','value','worth','how much','portfolio')){
    const m=metrics();
    const byFolder=Object.values(FOLDERS).map(f=>{
      const v=folderContracts(f.id).filter(c=>c.status!=='Declined').reduce((s,c)=>s+Number(c.value||0),0);
      return `<div class="flex items-center justify-between text-xs py-1.5 border-b border-brand-100/60 last:border-0"><span class="text-brand-800/70">${f.name}</span><span class="font-mono font-medium text-brand-900">${fmtKESshort(v)}</span></div>`;
    }).join('');
    return { text:`Your active portfolio is worth <strong>${fmtKES(m.totalValue)}</strong> across ${cs.filter(c=>c.status!=='Declined').length} live agreements. Breakdown by folder:`,
      cards:`<div class="rounded-xl border border-brand-100 bg-white px-3.5 py-1.5">${byFolder}</div>` };
  }
  // 7) highest / largest
  if(has('highest','largest','biggest','top contract','most valuable')){
    const sorted=[...cs].filter(c=>c.status!=='Declined').sort((a,b)=>b.value-a.value).slice(0,3);
    return { text:`Your highest-value agreement is <strong>${sorted[0].name}</strong> at <strong>${fmtKES(sorted[0].value)}</strong>. Top three by value:`, cards:aiCards(sorted) };
  }
  // 8) counterparty / free-text search
  const terms=q.replace(/[?.,!]/g,'').split(/\s+/).filter(w=>w.length>2&&!['the','and','for','with','find','show','search','contracts','contract','any','all','have','what','which'].includes(w));
  if(terms.length){
    const list=cs.filter(c=>terms.some(t=>(c.name+' '+c.counterparty+' '+FOLDERS[c.folder].name+' '+TEMPLATES[c.template].kind).toLowerCase().includes(t)));
    if(list.length){
      return { text:`Found <strong>${list.length} contract${list.length===1?'':'s'}</strong> matching "${terms.join(', ')}":`, cards:aiCards(list) };
    }
  }
  // fallback
  return { text:`I couldn't match that to your contract data. I can help with things like: <em>"show pending contracts"</em>, <em>"total value of signed"</em>, <em>"summarize MK-103"</em>, or searching by counterparty name (e.g. <em>"Twiga"</em>).` };
}

function aiSubmit(){
  const inp=document.getElementById('ai-input');
  const q=inp.value.trim(); if(!q) return;
  inp.value='';
  aiPush('user',{text:q});
  renderAIFeed(true);
  setTimeout(()=>{
    const ans=aiAnswer(q);
    aiPush('assistant',ans);
    renderAIFeed();
  }, 650+Math.random()*500);
}

document.getElementById('ai-send').addEventListener('click',aiSubmit);
document.getElementById('ai-input').addEventListener('keydown',e=>{if(e.key==='Enter')aiSubmit();});

document.getElementById('ai-scrim').addEventListener('click',closeAI);

});

function createFromTemplate(tid){
  const t=TEMPLATES[tid];
  const c={ id:nextId(), name:t.name+' (Draft)', counterparty:'', value:0, status:'Draft',
    template:tid, folder:t.folder,
    lastAction:new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}),
    hash:null, signedAt:null, signatory:'A. Otieno, Director',
    compliance:{iprs:false,pki:false},

    fields:{}, scan:null, expiry:null, valueType:t.valueType };

  state.activeId=c.id;
  toast(`New ${t.kind} created and filed in ${FOLDERS[t.folder].name}`);
  setView('workspace');
  renderSideFolders();
}

/* sidebar: folders + templates */
function renderSideFolders(){
  document.getElementById('side-folders').innerHTML=Object.values(FOLDERS).map(f=>`
    <button data-side-folder="${f.id}" class="w-full text-left flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-brand-100/70 hover:text-white hover:bg-white/5 transition">
      <span class="text-brand-300">${icon('folder')}</span>
      <span class="truncate flex-1">${f.name}</span>
      <span class="text-[10px] font-mono text-brand-300/70">${folderContracts(f.id).length}</span>
    </button>`).join('');
  document.querySelectorAll('[data-side-folder]').forEach(b=>b.addEventListener('click',()=>openFolder(b.getAttribute('data-side-folder'))));
}
renderSideFolders();
document.getElementById('side-templates').innerHTML=Object.values(TEMPLATES).map(t=>`
  <button data-new-side="${t.id}" class="w-full text-left flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-brand-100/70 hover:text-white hover:bg-white/5 transition">
    <span class="text-gold-400">${icon(t.ic)}</span>
    <span class="truncate">Template ${t.id} — ${t.kind}</span>
  </button>`).join('');
document.querySelectorAll('[data-new-side]').forEach(b=>b.addEventListener('click',()=>createFromTemplate(b.getAttribute('data-new-side'))));

document.getElementById('nav').addEventListener('click',e=>{
  const btn=e.target.closest('[data-view]');
  if(btn) setView(btn.getAttribute('data-view'));
});

/* BOOT */
renderDashboard();

</script>
</body>
</html>
